l_english:
 # Norway (NOR) focus tree localisation
 # Root
 MD2026_NOR_nordic_power:0 "Nordic Power"
 MD2026_NOR_nordic_power_desc:0 "Norway stands at the intersection of the North Sea's vast energy wealth and the Arctic's strategic frontier. As the world order shifts and Russia's aggression reshapes European security, Norway must chart an ambitious course -- defending its Arctic territories, managing its unparalleled sovereign wealth, and leading the transition to a clean energy future."
 # Branch 1: High North Defense
 MD2026_NOR_high_north_strategy:0 "High North Strategy"
 MD2026_NOR_high_north_strategy_desc:0 "The High North is Norway's most important strategic priority. With Russia rearming its Arctic forces and tensions rising over Svalbard, Norway must assert its leadership of NATO's northern flank and ensure the Arctic remains a region of stability."
 MD2026_NOR_svalbard_defense:0 "Svalbard Arctic Garrison"
 MD2026_NOR_svalbard_defense_desc:0 "The Svalbard archipelago -- governed under the 1920 Svalbard Treaty -- is strategically vital and legally complex. Reinforcing the Norwegian garrison with modern sensors, communications, and rapid-reaction forces sends an unambiguous message: Norway's Arctic sovereignty is non-negotiable."
 MD2026_NOR_coast_defense:0 "Coastal Naval Modernization"
 MD2026_NOR_coast_defense_desc:0 "Norway's dramatic coastline of 100,000 kilometres of fjords and islands is both a strategic asset and a vulnerability. Modernizing the coastal naval defence network -- with updated mine systems, patrol vessels, and land-based anti-ship missiles -- turns geography into an impenetrable barrier."
 MD2026_NOR_f35_wing:0 "Full F-35 Wing Operational"
 MD2026_NOR_f35_wing_desc:0 "Norway ordered 52 F-35A fighters to replace its ageing F-16 fleet -- one of NATO's earliest F-35 adopters. Bringing the full wing to operational status, with integrated training, maintenance pipelines, and Arctic basing at Evenes, gives Norway fifth-generation air power over the Barents Sea."
 MD2026_NOR_arctic_nato:0 "Arctic NATO Command Role"
 MD2026_NOR_arctic_nato_desc:0 "With the elevation of NATO's attention to the High North, Norway is uniquely positioned to lead Arctic alliance operations. Assume the lead nation role for NATO's Arctic and North Atlantic domain -- coordinating allied naval patrols, exercises, and GIUK gap surveillance."
 MD2026_NOR_northern_sentinel:0 "Norway: Arctic Sentinel"
 MD2026_NOR_northern_sentinel_desc:0 "Norway has transformed itself into NATO's indispensable Arctic sentinel -- the nation that holds the line where the Atlantic meets the ice. From Svalbard's garrison to the fjords' missile batteries, from F-35 patrols over the Barents Sea to alliance command of the High North, Norway stands watch."
 # Branch 2: Defense Buildup
 MD2026_NOR_defense_investment:0 "Defense Investment Drive"
 MD2026_NOR_defense_investment_desc:0 "Russia's full-scale invasion of Ukraine shattered Norwegian complacency about European security. Defence spending must rise dramatically -- sustainably funded by Norway's vast sovereign wealth -- to rebuild a military capable of credible deterrence and NATO burden-sharing."
 MD2026_NOR_gdp_2pct:0 "2% GDP Defense Target"
 MD2026_NOR_gdp_2pct_desc:0 "Norway committed to reaching NATO's 2% GDP defence spending target by 2026 -- a major political and financial commitment for a nation accustomed to decades of defence underspending. Meeting this target requires sustained investment in equipment, personnel, and infrastructure."
 MD2026_NOR_submarine_replace:0 "Type 212CD Submarine Program"
 MD2026_NOR_submarine_replace_desc:0 "Norway signed a landmark agreement with Germany to jointly procure and build the new Type 212CD submarines -- replacing the ageing Ula-class boats. These state-of-the-art air-independent propulsion submarines will provide Norway with decisive undersea capability in the North Sea and North Atlantic."
 MD2026_NOR_army_reform:0 "Army Brigade Reform"
 MD2026_NOR_army_reform_desc:0 "Norway's army is being restructured around a heavier, more capable brigade-centric model. The Brigade Nord must be fully funded, manned, and equipped for high-intensity warfare against a peer adversary -- replacing the hollow force structure of the post-Cold War era."
 MD2026_NOR_joint_strike_missile:0 "Kongsberg Joint Strike Missile"
 MD2026_NOR_joint_strike_missile_desc:0 "The Kongsberg Joint Strike Missile is Norway's most successful defence export in decades -- a stealth cruise missile integrated with the F-35. Expanding JSM production capacity and winning new export contracts cements Norway's position as a world-class missile technology nation."
 MD2026_NOR_defense_power:0 "Capable NATO Contributor"
 MD2026_NOR_defense_power_desc:0 "Norway has transformed from a NATO free-rider to one of the alliance's most capable northern members -- bringing a fully-funded military, world-class submarine fleet, cutting-edge missile technology, and an army ready for high-intensity warfare."
 # Branch 3: Energy / Oil Fund
 MD2026_NOR_energy_strategy:0 "National Energy Strategy"
 MD2026_NOR_energy_strategy_desc:0 "Norway faces the central paradox of the 21st century: a nation that funds its future through fossil fuel wealth while committing to a green energy transition. Managing this paradox -- maximizing returns from remaining reserves while investing in the clean energy economy -- is the defining economic challenge of the generation."
 MD2026_NOR_oil_fund_management:0 "Optimal GPFG Management"
 MD2026_NOR_oil_fund_management_desc:0 "The Government Pension Fund Global -- the world's largest sovereign wealth fund at over $1.7 trillion -- is Norway's most powerful economic asset. Ensuring optimal management, responsible investment mandates, and disciplined withdrawal rules protects the fund's long-term real value for future generations."
 MD2026_NOR_north_sea_transition:0 "North Sea Energy Transition"
 MD2026_NOR_north_sea_transition_desc:0 "The North Sea's oil and gas fields have underpinned Norwegian prosperity for fifty years. Planning a managed transition -- maintaining production from existing fields while redirecting investment toward offshore wind and carbon capture -- ensures the North Sea remains an energy hub for decades to come."
 MD2026_NOR_hydrogen_export:0 "Green Hydrogen to Europe"
 MD2026_NOR_hydrogen_export_desc:0 "Norway's abundant hydropower and planned offshore wind capacity position it to become Europe's leading green hydrogen producer. Existing gas infrastructure -- pipelines, terminals, and processing facilities -- can be repurposed for hydrogen, creating a new export industry to replace fossil fuel revenues."
 MD2026_NOR_sovereign_wealth:0 "Strategic Sovereign Wealth Use"
 MD2026_NOR_sovereign_wealth_desc:0 "The oil fund is Norway's inheritance for future generations -- but it can also be a strategic instrument. Carefully targeted investments in Norwegian clean energy infrastructure, defence industrial capacity, and critical minerals processing can accelerate the transition while keeping wealth within Norway."
 MD2026_NOR_energy_superpower:0 "Norway: Energy Superpower"
 MD2026_NOR_energy_superpower_desc:0 "Norway has navigated the energy transition masterfully -- maintaining prosperity through the fossil fuel twilight while building a new clean energy empire. The sovereign wealth fund is intact, green hydrogen flows to European industry, and Norwegian offshore expertise leads the world in clean energy technology."
 # Branch 4: Fisheries / Maritime
 MD2026_NOR_maritime_strategy:0 "Maritime Nation Strategy"
 MD2026_NOR_maritime_strategy_desc:0 "Norway is fundamentally a maritime nation -- one of the world's largest shipping nations, the biggest salmon exporter, and a pioneer in offshore technology. Protecting fishing rights, expanding the maritime economy, and leading in offshore technology are central pillars of Norwegian prosperity."
 MD2026_NOR_fishing_rights:0 "EEZ Fishing Rights Enforcement"
 MD2026_NOR_fishing_rights_desc:0 "Norway's Exclusive Economic Zone covers 2.4 million square kilometres -- one of the largest in Europe. Enforcing fishing rights against illegal trawlers, managing sustainable fish stocks, and navigating complex bilateral fisheries agreements with the UK, EU, Russia, and Iceland requires a robust coast guard and determined political will."
 MD2026_NOR_merchant_fleet:0 "Merchant Shipping Expansion"
 MD2026_NOR_merchant_fleet_desc:0 "Norway has one of the world's largest merchant fleets by tonnage -- a crucial source of foreign exchange and maritime expertise. Expanding the fleet with green-certified vessels, securing favorable flag state agreements, and maintaining Norway's position among the world's leading shipping nations builds enduring maritime wealth."
 MD2026_NOR_aquaculture:0 "Salmon Aquaculture Dominance"
 MD2026_NOR_aquaculture_desc:0 "Norwegian salmon farming is a global industry success story -- producing nearly half the world's farmed Atlantic salmon. Investing in fish health technology, offshore aquaculture systems, and sustainable feed alternatives protects Norway's position as the undisputed world leader in salmon production."
 MD2026_NOR_maritime_tech:0 "Offshore Maritime Technology"
 MD2026_NOR_maritime_tech_desc:0 "Norwegian maritime technology companies -- Kongsberg Maritime, Vard, Ulstein, and hundreds of specialist suppliers -- lead the world in offshore vessel design, autonomous shipping systems, and subsea technology. Investing in next-generation maritime technology keeps Norway at the frontier of this strategically important sector."
 MD2026_NOR_ocean_economy:0 "Ocean Economy Champion"
 MD2026_NOR_ocean_economy_desc:0 "Norway has become the undisputed global champion of the ocean economy -- the world's largest salmon producer, a top maritime technology exporter, and a leader in sustainable offshore operations. The blue economy is the new foundation of Norwegian prosperity alongside the sovereign wealth fund."
