l_english:
 # CZE focus names and descriptions
 MD2026_CZE_central_europe_pivot:0 "Central European Pivot"
 MD2026_CZE_central_europe_pivot_desc:0 "The Czech Republic stands as a cornerstone of Central European stability. Under Prime Minister Fiala's government, Prague has emerged as one of the most pro-Western capitals in the EU — but must navigate economic pressures, political polarisation, and the shadow of the Babiš era."
 MD2026_CZE_arms_powerhouse:0 "Arms Manufacturing Powerhouse"
 MD2026_CZE_arms_powerhouse_desc:0 "The Czechoslovak Group (CSG) has made the Czech Republic Europe's most surprising defence industry success story. From CZ pistols and Bren machine guns to Pandur APCs and DANA howitzers, Czech arms are equipping armies from Ukraine to Africa."
 MD2026_CZE_small_arms_export:0 "CZ Small Arms Exports"
 MD2026_CZE_small_arms_export_desc:0 "CZ — Česká zbrojovka — has won the US Army's modular handgun contract and supplies rifles to NATO members across Europe. Expand production and secure new export contracts, cementing Czech small arms as the standard across allied militaries."
 MD2026_CZE_armored_vehicles:0 "Pandur and TITUS Armoured Vehicles"
 MD2026_CZE_armored_vehicles_desc:0 "The Czech TITUS 6x6 and Pandur wheeled APC platforms are in high demand across NATO as armies modernize away from Cold War tracked vehicles. Expand production lines and pursue contracts with Germany, Poland, and Baltic states."
 MD2026_CZE_nato_artillery:0 "NATO 155mm Artillery Contribution"
 MD2026_CZE_nato_artillery_desc:0 "The Dana and Zuzana 155mm self-propelled howitzers — Czechoslovak designs now modernized by CSG — have proven themselves in Ukraine. Ramp up production and offer the NATO standard artillery solution to alliance partners rebuilding their fires capability."
 MD2026_CZE_defense_tech:0 "Cybersecurity Defence Industry"
 MD2026_CZE_defense_tech_desc:0 "Build on Czech excellence in cybersecurity — Avast, Eset, and military-grade CESNET systems — to create a defence-oriented cyber industry. Contracts with NATO's CCDCOE and allied governments will transform Czech cyber expertise into a strategic export."
 MD2026_CZE_arms_champion:0 "European Arms Champion"
 MD2026_CZE_arms_champion_desc:0 "The Czech Republic has become Europe's preeminent arms exporter — supplying NATO with small arms, armoured vehicles, and artillery while earning billions in foreign revenue. Prague's defence industry is now a pillar of European security and Czech prosperity."
 MD2026_CZE_western_anchor:0 "Western Anchor"
 MD2026_CZE_western_anchor_desc:0 "The Czech Republic reaffirms its role as a firm anchor of the Western security order. Under Fiala's government, Prague has broken decisively with the Babiš-era ambiguity, championing NATO, the EU, and Ukraine's resistance against Russian aggression."
 MD2026_CZE_nato_reliability:0 "Exceed NATO Defence Spending"
 MD2026_CZE_nato_reliability_desc:0 "Commit to exceeding NATO's 2% GDP defence spending target, following Poland and the Baltic states in treating the 2% floor as a minimum rather than a goal. Prague's reliability on defence spending makes it a credible voice on European security architecture."
 MD2026_CZE_eu_deepening:0 "Deepen EU Integration"
 MD2026_CZE_eu_deepening_desc:0 "Accelerate Czech integration into EU structures — from the Eurozone roadmap to Schengen enhancement and EU defence cooperation. A deeply integrated Czech Republic is better protected and better positioned to shape European policy from within."
 MD2026_CZE_ukraine_support:0 "Ukraine Military Aid Programme"
 MD2026_CZE_ukraine_support_desc:0 "The Czech artillery ammunition initiative — sourcing 800,000 shells from non-EU suppliers for Ukraine — was a diplomatic and logistical triumph. Expand this programme into a sustained Czech-led Ukraine military support framework within NATO."
 MD2026_CZE_eu_industrial_policy:0 "EU Single Market Champion"
 MD2026_CZE_eu_industrial_policy_desc:0 "Champion EU industrial policy that benefits Czech manufacturers — auto industry support, semiconductor investment, and digital single market rules that play to Czech strengths. Prague will be the voice of Central European industrial interests in Brussels."
 MD2026_CZE_central_europe_leader:0 "Central European Leader"
 MD2026_CZE_central_europe_leader_desc:0 "With Poland focused on eastern defence and Hungary isolated by its Orbán-era alignment with Moscow, the Czech Republic has stepped into the vacuum as Central Europe's leading voice in NATO and the EU — a position Prague intends to consolidate."
 MD2026_CZE_democratic_resilience:0 "Democratic Resilience"
 MD2026_CZE_democratic_resilience_desc:0 "The Czech Republic's democracy faces pressure from the Babiš movement, disinformation campaigns, and economic discontent. The Fiala government has invested in institutional resilience — strengthening courts, independent media, and civic participation."
 MD2026_CZE_anti_corruption:0 "Anti-Corruption Campaign"
 MD2026_CZE_anti_corruption_desc:0 "Launch a comprehensive anti-corruption drive targeting oligarchic capture of the state, conflicts of interest in public procurement, and EU subsidy fraud. Cleaning up Czech governance is essential to building public trust and meeting EU rule-of-law standards."
 MD2026_CZE_media_freedom:0 "Independent Media Support"
 MD2026_CZE_media_freedom_desc:0 "Counter the Babiš-era media capture by strengthening public broadcasting, supporting investigative journalism, and establishing robust legal protections against SLAPP suits. A free press is the immune system of Czech democracy."
 MD2026_CZE_judicial_reform:0 "Judicial Independence"
 MD2026_CZE_judicial_reform_desc:0 "Reform the appointment and oversight of Czech judges to insulate the judiciary from political interference, learning lessons from Hungary and Poland's democratic backsliding. An independent judiciary is the last line of defence for Czech rule of law."
 MD2026_CZE_civic_society:0 "Civic Society Strengthening"
 MD2026_CZE_civic_society_desc:0 "Invest in civic education, NGO capacity, and participatory governance mechanisms that connect citizens to institutions. A robust civic society is the foundation that makes democracy resilient to populist assault."
 MD2026_CZE_democratic_consolidation:0 "Democratic Consolidation"
 MD2026_CZE_democratic_consolidation_desc:0 "Czech democracy has been stress-tested and has emerged stronger. With an independent judiciary, free press, anti-corruption framework, and active civic society, Prague has built a model of democratic resilience for the region."
 MD2026_CZE_energy_independence:0 "Energy Independence Drive"
 MD2026_CZE_energy_independence_desc:0 "Russia's weaponisation of gas has accelerated the Czech Republic's push for energy independence. With the largest nuclear share of electricity in Central Europe and ambitious plans for Dukovany expansion, Prague is building a sovereign energy future."
 MD2026_CZE_nuclear_expansion:0 "Dukovany Nuclear Expansion"
 MD2026_CZE_nuclear_expansion_desc:0 "The Czech Republic signs contracts for two new reactors at Dukovany — Europe's most significant new nuclear construction since Hinkley Point C. The decision to exclude Russian and Chinese bidders in favour of South Korean KHNP is a geopolitical statement as much as an energy decision."
 MD2026_CZE_gas_independence:0 "Russian Gas Independence"
 MD2026_CZE_gas_independence_desc:0 "Complete the transition away from Russian pipeline gas — secured through LNG terminal access in Germany and Poland, diversified pipeline supplies from Norway and Azerbaijan, and aggressive energy efficiency measures. Prague will never again be held hostage by Gazprom."
 MD2026_CZE_renewables_push:0 "Solar and Wind Expansion"
 MD2026_CZE_renewables_push_desc:0 "Launch an ambitious Czech renewables programme — solar panels on every viable rooftop and wind farms in Moravia and Bohemia — to reduce baseload gas demand and create a domestic clean energy industry. The energy transition creates jobs and sovereignty simultaneously."
 MD2026_CZE_energy_corridor:0 "Central European Energy Corridor"
 MD2026_CZE_energy_corridor_desc:0 "Lead the construction of a Central European energy interconnection corridor linking Czech, Slovak, Polish, and German grids, enabling the region to collectively balance renewable intermittency and share nuclear baseload. Prague as the hub of Central European energy security."
 MD2026_CZE_energy_sovereign:0 "Energy Sovereign Nation"
 MD2026_CZE_energy_sovereign_desc:0 "The transformation is complete. Czech electricity is clean, domestic, and no longer dependent on any foreign adversary. With Dukovany units online, renewables booming, and Russian gas a memory, Prague has achieved genuine energy sovereignty."
