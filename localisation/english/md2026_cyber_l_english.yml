l_english:
 md2026_cyber_warfare_category:0 "Cyber Warfare & Security"
 md2026_cyber_warfare_category_desc:0 "In the 21st century, the digital front is as critical as the physical battlefield. Developing offensive capabilities and fortifying our networks against intrusion is a strategic imperative."
 
 md2026_upgrade_cyber_defense:0 "Upgrade Cyber Defenses"
 md2026_upgrade_cyber_defense_desc:0 "Invest in next-generation firewalls, secure domestic servers, and train cybersecurity specialists to harden our critical infrastructure against foreign interference."
 
 md2026_launch_cyber_attack_infrastructure:0 "Cyberattack on [From.GetName]'s Infrastructure"
 md2026_launch_cyber_attack_infrastructure_desc:0 "Launch a coordinated cyber offensive to disrupt the enemy's power grid, logistics, and industrial capacity. This will cause tangible damage to their war effort."
 
 md2026_launch_cyber_espionage:0 "Cyber Espionage against [From.GetName]"
 md2026_launch_cyber_espionage_desc:0 "Attempt to breach secure government and corporate databases to steal sensitive technological data and intellectual property."
 
 md2026_cyber_defense_1:0 "Basic Cyber Security"
 md2026_cyber_defense_1_desc:0 "We have implemented baseline protections across critical government networks."
 md2026_cyber_defense_2:0 "Advanced Cyber Defense"
 md2026_cyber_defense_2_desc:0 "Our military and civilian infrastructure is shielded by state-of-the-art cybersecurity protocols."
 md2026_cyber_defense_3:0 "Impenetrable Digital Fortress"
 md2026_cyber_defense_3_desc:0 "A fully integrated, AI-driven cybersecurity net protects our nation, practically neutralizing external digital threats."
 
 md2026_cyber.1.t:0 "Critical Infrastructure Cyberattack"
 md2026_cyber.1.d:0 "Multiple sectors of our national infrastructure have experienced severe outages following a sophisticated cyberattack. Power grids have been disrupted, and several industrial complexes report damaged control systems. Security analysts confirm this was a coordinated offensive operation originating from a hostile actor."
 md2026_cyber.1.a:0 "We must harden our defenses immediately!"
 
 md2026_cyber.2.t:0 "Foreign Cyber Espionage Detected"
 md2026_cyber.2.d:0 "Our cybersecurity agencies have detected and isolated a major data breach attempt. Forensic analysis of the malware signatures points directly to state-sponsored hackers from [From.GetName]. While they managed to exfiltrate some data before being shut out, we have gathered enough evidence to publicly condemn their actions."
 md2026_cyber.2.a:0 "A blatant violation of our sovereignty."
 
 md2026_cyber.3.t:0 "Cyber Intrusion Detected"
 md2026_cyber.3.d:0 "Our cybersecurity agencies have detected and thwarted an attempted breach of our networks. Forensics suggest state-sponsored actors were behind the intrusion."
 md2026_cyber.3.a:0 "We must retaliate."
 
 md2026_cyber.4.t:0 "Data Exfiltration Successful"
 md2026_cyber.4.d:0 "Our cyber espionage campaign has paid off. We have successfully extracted valuable technological data that will accelerate our own research efforts."
 md2026_cyber.4.a:0 "Knowledge is power."
 
 md2026_cyber.5.t:0 "Espionage Operation Fails"
 md2026_cyber.5.d:0 "Our attempt to steal foreign technology has ended in failure. Our operatives were detected before they could extract any useful data, causing a minor diplomatic embarrassment."
 md2026_cyber.5.a:0 "Cover our tracks."
 
 md2026_cyber_attack_opinion:0 "Detected Cyber Espionage"

 # --- Extended Cyber Decisions ---

 md2026_cyber_financial_attack:0 "Attack Enemy Financial Systems"
 md2026_cyber_financial_attack_desc:0 "Launch a covert cyber offensive targeting the enemy's banking networks, stock exchanges, and payment infrastructure. Disrupting financial flows will erode their economic stability and sap public confidence."

 md2026_cyber_disinformation:0 "Disinformation Campaign"
 md2026_cyber_disinformation_desc:0 "Flood the enemy's social media landscape with fabricated news, deepfake footage, and coordinated bot networks to polarise their electorate, undermine trust in their institutions, and weaken their resolve to fight."

 md2026_cyber_nuclear_sabotage:0 "Cyber Sabotage of Nuclear Facility"
 md2026_cyber_nuclear_sabotage_desc:0 "Deploy a sophisticated worm targeting industrial control systems inside the enemy's nuclear enrichment or weapons programme. A successful operation could set their nuclear ambitions back by years without firing a single shot."

 md2026_cyber_counterintelligence:0 "Establish Cyber Counterintelligence Unit"
 md2026_cyber_counterintelligence_desc:0 "Even nations without offensive cyber capabilities can build dedicated teams to hunt foreign intruders, harden government networks, and detect state-sponsored espionage before it causes lasting damage."

 md2026_cyber_espionage_peacetime:0 "Peacetime Economic Espionage"
 md2026_cyber_espionage_peacetime_desc:0 "Task our cyber operatives with quietly penetrating foreign corporate and government research databases during peacetime. Stolen blueprints and scientific data can give our own programmes a decisive head start."

 md2026_cyber_power_grid_attack:0 "Power Grid Blackout Operation"
 md2026_cyber_power_grid_attack_desc:0 "Strike the enemy's national power grid during active hostilities. A successful blackout will cripple their factories, disrupt military logistics, and sow panic among the civilian population."

 md2026_cyber_upgrade_program:0 "Establish National Cyber Programme"
 md2026_cyber_upgrade_program_desc:0 "Commit significant state resources to building an offensive cyber capability from the ground up — recruiting elite hackers, procuring zero-day exploits, and establishing a dedicated cyber warfare command."

 # --- New Ideas ---

 md2026_cyber_counterintel_active:0 "Active Cyber Counterintelligence"
 md2026_cyber_counterintel_active_desc:0 "Specialised teams continuously monitor our networks for foreign intrusion, dramatically improving our ability to detect and expel enemy operatives."

 md2026_cyber_grid_disruption:0 "Grid Disruption (Cyber)"
 md2026_cyber_grid_disruption_desc:0 "Our power infrastructure is suffering the aftershocks of a cyberattack. Factories and dockyards are operating well below capacity while engineers race to restore normal operation."
