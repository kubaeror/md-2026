l_english:
 # Finland (FIN) focus tree localisation
 # Root
 MD2026_FIN_nordic_sentinel:0 "Nordic Sentinel"
 MD2026_FIN_nordic_sentinel_desc:0 "Finland stands as the newest and most exposed member of NATO's eastern flank. As Russia continues its war of aggression, Finland must define its strategic posture — fortress state, alliance anchor, and Nordic beacon."
 # Branch 1: Border Defense
 MD2026_FIN_eastern_border:0 "Eastern Border Doctrine"
 MD2026_FIN_eastern_border_desc:0 "Finland shares over 1,300 kilometres of border with Russia — the longest NATO-Russia land border. Establishing a comprehensive Eastern Border Doctrine is the foundation of Finnish national security."
 MD2026_FIN_border_fortifications:0 "New Mannerheim Line"
 MD2026_FIN_border_fortifications_desc:0 "Revive the spirit of the original Mannerheim Line with modern fortifications — anti-tank ditches, concrete bunkers, and smart sensors — transforming Finland's eastern border into an impenetrable defensive barrier."
 MD2026_FIN_mine_barrier:0 "Anti-Tank Mine Barrier"
 MD2026_FIN_mine_barrier_desc:0 "Deploy a comprehensive anti-tank mine barrier along critical approach routes, supported by pre-positioned demolitions charges on bridges and roads, making any armoured advance through Finnish terrain catastrophically costly."
 MD2026_FIN_forest_warfare:0 "Finnish Forest Warfare Doctrine"
 MD2026_FIN_forest_warfare_desc:0 "Codify Finland's legendary forest warfare expertise into official military doctrine. Finnish soldiers will fight in the terrain they know — exploiting the boreal forest to bleed any invader white before they reach the first town."
 MD2026_FIN_reserve_system:0 "Maximize Reserve Mobilization"
 MD2026_FIN_reserve_system_desc:0 "Finland's reserve-based military model can field nearly 280,000 trained reservists on mobilization. Maximize this potential with improved call-up systems, refresher training programs, and pre-positioned equipment."
 MD2026_FIN_fortress_finland:0 "Fortress Finland"
 MD2026_FIN_fortress_finland_desc:0 "Finland has transformed itself into a formidable military power — a fortress nation that any adversary would pay a catastrophic price to attack. The eastern border is fortified, the reservists are ready, and the doctrine is proven."
 # Branch 2: NATO Integration
 MD2026_FIN_nato_role:0 "Finland's NATO Role"
 MD2026_FIN_nato_role_desc:0 "As a new NATO member, Finland must define its role within the alliance. Geography and capability point toward a specific mission — leadership of NATO's northern and eastern flank."
 MD2026_FIN_nato_eastern_flank:0 "Lead NATO's Eastern Flank"
 MD2026_FIN_nato_eastern_flank_desc:0 "Take the lead role in coordinating NATO's eastern flank defence alongside the Baltic states and Poland. Finland's experience, geography, and military capability make it the natural northern anchor of the alliance's most exposed front."
 MD2026_FIN_us_bilateral:0 "US Bilateral Defense Agreement"
 MD2026_FIN_us_bilateral_desc:0 "Negotiate a bilateral defence and security agreement with the United States, securing pre-positioned American equipment, increased joint exercises, and a formal commitment to Finland's defence beyond NATO's Article 5."
 MD2026_FIN_f35_program:0 "F-35 Integration Program"
 MD2026_FIN_f35_program_desc:0 "Complete the integration of Finland's 64 F-35A Lightning II fighters into full operational service, establishing interoperability with allied air forces and giving the Finnish Air Force a generational leap in capability."
 MD2026_FIN_joint_exercises:0 "Nordic-NATO Joint Exercises"
 MD2026_FIN_joint_exercises_desc:0 "Launch a comprehensive program of joint exercises with Nordic partners and NATO allies — from large-scale combined arms manoeuvres to cyber defence drills — building genuine interoperability across the alliance."
 MD2026_FIN_nato_anchor:0 "NATO's Arctic Anchor"
 MD2026_FIN_nato_anchor_desc:0 "Finland has cemented its position as NATO's indispensable Arctic anchor — the keystone of the alliance's northern defence, providing geography, capability, and leadership that no other member can offer."
 # Branch 3: Economy and Innovation
 MD2026_FIN_economic_resilience:0 "Economic Resilience"
 MD2026_FIN_economic_resilience_desc:0 "Finland's economy must be as resilient as its military. Diversifying away from dependence on any single sector and strengthening the foundations of Finnish prosperity will sustain the nation through any crisis."
 MD2026_FIN_nokia_renaissance:0 "Nokia Renaissance"
 MD2026_FIN_nokia_renaissance_desc:0 "Nokia was once the world's dominant mobile phone maker. While that era has passed, Nokia's pivot to telecommunications infrastructure and 5G/6G technology presents a genuine opportunity to reclaim global leadership in the next generation of connectivity."
 MD2026_FIN_forest_industry:0 "Sustainable Forestry Industry"
 MD2026_FIN_forest_industry_desc:0 "Finland's forests are an economic and strategic resource. Developing sustainable forestry practices, expanding high-value wood products, and pioneering biomass energy will sustain this traditional Finnish industry for generations."
 MD2026_FIN_tech_hub:0 "Nordic Tech Hub"
 MD2026_FIN_tech_hub_desc:0 "Build on Helsinki's growing reputation as a European technology hub — home to companies like Supercell, Wolt, and a thriving deep tech ecosystem. Invest in R&D, talent retention, and startup infrastructure to make Finland a beacon of Nordic innovation."
 MD2026_FIN_export_push:0 "Export Diversification"
 MD2026_FIN_export_push_desc:0 "Reduce Finland's export dependence on a narrow range of sectors by actively promoting Finnish manufacturing, clean technology, and services to new markets across Asia, the Americas, and the Middle East."
 MD2026_FIN_innovation_economy:0 "Innovation-Driven Economy"
 MD2026_FIN_innovation_economy_desc:0 "Finland has achieved a fundamental economic transformation — a small nation of five million punching far above its weight as a global innovation leader. Research, education, and technology excellence form the permanent foundation of Finnish prosperity."
 # Branch 4: Society and Demographics
 MD2026_FIN_social_resilience:0 "Social Resilience"
 MD2026_FIN_social_resilience_desc:0 "Finland's greatest national security asset is not its military or its geography — it is the resilience of Finnish society. A unified, informed, and psychologically prepared citizenry is the ultimate guarantor of national survival."
 MD2026_FIN_total_defense:0 "Total Defence Concept"
 MD2026_FIN_total_defense_desc:0 "Implement Finland's comprehensive Total Defence concept — integrating military, civil defence, government, and private sector into a unified national resilience framework. Every ministry, every company, every citizen has a role in national defence."
 MD2026_FIN_skilled_immigration:0 "Selective Immigration Policy"
 MD2026_FIN_skilled_immigration_desc:0 "Address Finland's demographic challenge through targeted skilled immigration — attracting engineers, healthcare workers, and researchers from allied nations who share Finnish values and can integrate into Finnish society."
 MD2026_FIN_psychological_resilience:0 "Societal Resilience Training"
 MD2026_FIN_psychological_resilience_desc:0 "Launch a comprehensive national resilience program — teaching Finns how to recognise disinformation, survive disruptions to critical infrastructure, and maintain social cohesion under the psychological pressure of a hostile neighbour."
 MD2026_FIN_birth_rate_support:0 "Pro-Natalist Family Policy"
 MD2026_FIN_birth_rate_support_desc:0 "Finland's birth rate has fallen below replacement level. A comprehensive package of family support — longer parental leave, affordable childcare, housing subsidies for young families — aims to reverse the demographic decline before it becomes irreversible."
 MD2026_FIN_sisu_nation:0 "Nation of Sisu"
 MD2026_FIN_sisu_nation_desc:0 "Sisu — the untranslatable Finnish concept of grit, determination, and resilience under adversity. Finland has built its society on this foundation, producing a nation that does not break, does not surrender, and does not yield. Let our adversaries learn this lesson at their peril."
