l_english:
 # Denmark (DEN) focus tree localisation
 # Root
 MD2026_DEN_nordic_bastion:0 "Nordic Bastion"
 MD2026_DEN_nordic_bastion_desc:0 "Denmark occupies a position of unique strategic importance in 2026 -- guardian of the Baltic Sea approaches, sovereign of the world's largest island, and one of NATO's most committed defence spenders. From the Greenland crisis to the Baltic's contested waters, Denmark must rise to the moment and define what it means to be a Nordic bastion in a dangerous world."
 # Branch 1: Greenland Policy
 MD2026_DEN_greenland_strategy:0 "Greenland Strategy"
 MD2026_DEN_greenland_strategy_desc:0 "Trump's repeated demands to acquire Greenland -- and the explicit threats that followed -- forced Denmark to confront the geopolitical reality of governing the world's largest island. Greenland is not for sale. But holding it, developing it, and navigating Greenlandic autonomy demands a comprehensive strategy."
 MD2026_DEN_greenland_sovereignty:0 "Assert Greenland Sovereignty"
 MD2026_DEN_greenland_sovereignty_desc:0 "Denmark will assert, clearly and without ambiguity, that Greenland is Danish sovereign territory -- not subject to purchase, coercion, or unilateral American action. Denmark will rally European partners and NATO allies behind a unified position: the principle of territorial integrity applies equally to all members."
 MD2026_DEN_greenland_investment:0 "Greenland Development Investment"
 MD2026_DEN_greenland_investment_desc:0 "The most effective answer to Greenlandic separatism and American pressure is to make Danish stewardship indisputably valuable. A massive investment package -- infrastructure, education, healthcare, and rare earth mineral development -- demonstrates that Denmark can deliver what Greenland needs without American interference."
 MD2026_DEN_arctic_presence:0 "Arctic Military Presence"
 MD2026_DEN_arctic_presence_desc:0 "Denmark's military presence in Greenland is being transformed. Thule Air Base is expanded into a full Danish-American joint facility. The Arctic Command in Nuuk receives new patrol vessels, surveillance drones, and a rapid-reaction force capable of responding to any incursion from any direction."
 MD2026_DEN_greenland_autonomy:0 "Expanded Autonomy Negotiations"
 MD2026_DEN_greenland_autonomy_desc:0 "The Greenlandic people's aspirations for greater self-governance are legitimate and must be taken seriously. A new constitutional framework -- expanding Greenlandic autonomy within the Danish Realm, with a generous financial settlement and shared control over natural resource revenues -- builds the partnership that holds the Realm together."
 MD2026_DEN_arctic_kingdom:0 "The Arctic Kingdom of Denmark"
 MD2026_DEN_arctic_kingdom_desc:0 "Denmark has secured its Arctic future -- Greenland remains part of the Realm on terms both peoples can accept, the military presence deters any coercive pressure, and the development investments have begun to transform Greenlandic society. The Kingdom of Denmark has emerged from the Greenland crisis stronger, more united, and internationally respected."
 # Branch 2: Defense
 MD2026_DEN_defense_buildup:0 "Historic Defense Buildup"
 MD2026_DEN_defense_buildup_desc:0 "Denmark's 2024 decision to reach 2% GDP defence spending -- the highest level in decades -- marked a fundamental break with post-Cold War complacency. Converting this political commitment into genuine military capability requires sustained investment across all domains: air, sea, land, and cyber."
 MD2026_DEN_f35_integration:0 "F-35 Full Integration"
 MD2026_DEN_f35_integration_desc:0 "Denmark's 27 F-35A fighters are among the most capable aircraft in European service. Completing full integration -- with trained pilots, maintained aircraft, integrated weapons systems, and interoperability with allied F-35 operators -- delivers an air combat capability that dwarfs the F-16s they replaced."
 MD2026_DEN_naval_expansion:0 "Baltic Frigate Fleet"
 MD2026_DEN_naval_expansion_desc:0 "The Royal Danish Navy is being rebuilt as a serious Baltic Sea combat force. New frigates with anti-submarine warfare capability, mine-countermeasure vessels, and fast patrol craft -- equipped with anti-ship missiles and modern sensors -- create a fleet capable of contesting the Baltic in any scenario."
 MD2026_DEN_home_guard_reform:0 "Hjemmevaernet Reform"
 MD2026_DEN_home_guard_reform_desc:0 "The Danish Home Guard -- the Hjemmevaernet -- is one of Europe's largest reserve forces with 40,000 volunteers. A comprehensive reform modernizes training, updates equipment, and integrates the Home Guard into total defence planning, transforming a ceremonial force into a genuine wartime reserve that can hold critical infrastructure and free regulars for combat."
 MD2026_DEN_bornholm_defense:0 "Bornholm Island Fortress"
 MD2026_DEN_bornholm_defense_desc:0 "Bornholm -- the Danish island at the strategic centre of the Baltic Sea -- was occupied by the Soviet Union after World War II and is now one of NATO's most strategically valuable pieces of real estate. A permanent military garrison, anti-ship missile batteries, and hardened infrastructure transforms Bornholm from a vulnerability into a fortress."
 MD2026_DEN_nato_pillar:0 "NATO Baltic Pillar"
 MD2026_DEN_nato_pillar_desc:0 "Denmark has established itself as one of NATO's most capable and committed Baltic members -- operating a credible air force over the Baltic Sea, a frigate fleet that can challenge any adversary's naval ambitions, and a reinforced Bornholm garrison that anchors the southern approaches. Denmark is the Baltic's western pillar."
 # Branch 3: Green Energy
 MD2026_DEN_green_revolution:0 "Green Energy Revolution"
 MD2026_DEN_green_revolution_desc:0 "Denmark leads the world in wind energy and is pioneering Power-to-X technology that can turn renewable electricity into green fuels. Oersted -- the world's largest offshore wind company -- is a Danish national champion. Building on these foundations, Denmark aims to become the global model for clean energy transition."
 MD2026_DEN_offshore_wind:0 "Oersted Offshore Wind Expansion"
 MD2026_DEN_offshore_wind_desc:0 "Oersted is already the world's leading offshore wind developer -- but Denmark wants more. An ambitious expansion of North Sea and Baltic offshore wind capacity, combined with accelerated permitting and grid connection investment, will make Danish-developed wind turbines the backbone of European clean electricity."
 MD2026_DEN_power_to_x:0 "Power-to-X: Green Fuels"
 MD2026_DEN_power_to_x_desc:0 "Power-to-X -- converting surplus renewable electricity into green hydrogen, e-methanol, and synthetic aviation fuel -- is Denmark's next green energy frontier. Building the world's most advanced Power-to-X industrial cluster, fed by offshore wind power, positions Denmark as the supplier of green fuels to hard-to-decarbonize sectors across Europe."
 MD2026_DEN_north_sea_energy:0 "North Sea Energy Hub"
 MD2026_DEN_north_sea_energy_desc:0 "Denmark's existing North Sea infrastructure -- pipelines, platforms, and ports built for oil and gas -- can be repurposed as the backbone of a new clean energy economy. An integrated North Sea energy hub, combining offshore wind, hydrogen electrolysis, and carbon storage, makes Denmark a clean energy exporter to all of Northwestern Europe."
 MD2026_DEN_eu_green_leader:0 "EU Green Energy Leader"
 MD2026_DEN_eu_green_leader_desc:0 "Denmark's green energy leadership must be amplified at the EU level. Leading negotiations on green hydrogen infrastructure, advocating for the most ambitious emissions targets, and offering Danish technology and expertise to transition partner countries establishes Denmark as the EU's undisputed champion of the clean energy economy."
 MD2026_DEN_clean_energy_champion:0 "World's Green Energy Champion"
 MD2026_DEN_clean_energy_champion_desc:0 "Denmark has achieved what seemed impossible -- a prosperous, industrialised nation powered almost entirely by clean energy, exporting green technology and green fuels to the world. Oersted, Power-to-X, and Danish wind turbine manufacturers have made Denmark the global model for the energy transition."
 # Branch 4: Domestic / Economy
 MD2026_DEN_flexicurity_2026:0 "Flexicurity for 2026"
 MD2026_DEN_flexicurity_2026_desc:0 "Denmark's famous flexicurity model -- combining flexible labour markets with generous unemployment protection -- has been the envy of European social democrats for a generation. Updating this model for the age of AI, automation, and green transition requires bold reforms that protect workers without protecting jobs that no longer exist."
 MD2026_DEN_labor_market_reform:0 "Labour Market Modernization"
 MD2026_DEN_labor_market_reform_desc:0 "Denmark's labour market must adapt to automation, AI, and the green economy. A reformed flexicurity system -- with enhanced retraining rights, shorter working time trials, and stronger support for workers transitioning between sectors -- maintains Danish productivity while ensuring the benefits of technological change are widely shared."
 MD2026_DEN_pharma_biotech:0 "Novo Nordisk Pharma Cluster"
 MD2026_DEN_pharma_biotech_desc:0 "Novo Nordisk's GLP-1 weight-loss drugs turned a Danish pharmaceutical company into one of the world's most valuable corporations. Building a broader life sciences cluster around Novo Nordisk -- attracting biotech companies, clinical research organisations, and pharmaceutical talent -- ensures this success extends beyond one company."
 MD2026_DEN_shipping_tech:0 "Maersk Green Shipping Technology"
 MD2026_DEN_shipping_tech_desc:0 "AP Moller-Maersk -- the world's largest container shipping company -- is betting its future on green shipping fuels: e-methanol, ammonia, and eventually hydrogen. Supporting Maersk's green transition with Danish-produced Power-to-X fuels, port infrastructure investment, and maritime technology R&D keeps Denmark at the frontier of global shipping."
 MD2026_DEN_life_sciences_hub:0 "Copenhagen Life Sciences Hub"
 MD2026_DEN_life_sciences_hub_desc:0 "Copenhagen's Medicon Valley -- straddling the Oresund between Denmark and Sweden -- is already one of Europe's leading life sciences clusters. A targeted investment in research infrastructure, biotech park expansion, and regulatory fast-tracking transforms the region into a globally competitive hub for the next generation of medical breakthroughs."
 MD2026_DEN_innovation_economy:0 "Innovation-Driven Economy"
 MD2026_DEN_innovation_economy_desc:0 "Denmark has achieved a complete economic transformation -- from a traditional Nordic economy to a dynamic innovation powerhouse. Pharmaceutical excellence, green energy leadership, digital shipping, and a modernized labour market have made Denmark one of the world's most competitive small economies."
