 ### EVENTS - CLIMATE & ENERGY CRISIS ###
 md2026_climate.1.t:0 "Record Heat Wave"
 md2026_climate.1.d:0 "An unprecedented heat wave is sweeping across the nation, shattering temperature records and straining infrastructure to breaking point. Wildfires rage across parched landscapes, power grids buckle under record cooling demand, and agricultural losses mount daily. Scientists warn this is a preview of the new climate reality. We must decide how to respond."
 md2026_climate.1.o1:0 "Declare a climate emergency"
 md2026_climate.1.o2:0 "Invest in climate adaptation infrastructure"

 md2026_climate.2.t:0 "Energy Transition Crossroads"
 md2026_climate.2.d:0 "The global energy transition has reached a critical juncture. Fossil fuel prices remain volatile, renewable costs continue to fall, and our industrial base demands reliable power. We stand at a crossroads: accelerate the transition to green energy at significant upfront cost, or maintain a pragmatic energy mix that keeps fossil fuels in the picture for decades to come."
 md2026_climate.2.o1:0 "Accelerate the green transition"
 md2026_climate.2.o2:0 "Maintain a pragmatic energy mix"

 md2026_climate.3.t:0 "Critical Mineral Race"
 md2026_climate.3.d:0 "The race for critical minerals — lithium, cobalt, rare earth elements — has intensified dramatically. These materials are essential for batteries, electronics, and defense systems. Our competitors are aggressively securing supply chains across Africa and South America. We must act to ensure our access to these strategic resources."
 md2026_climate.3.o1:0 "Secure mineral supply chains through partnerships"
 md2026_climate.3.o2:0 "Invest in recycling and synthetic alternatives"

 md2026_climate.10.t:0 "Catastrophic Flooding"
 md2026_climate.10.d:0 "Devastating monsoon floods have inundated vast areas of the country. Rivers have burst their banks, displacing millions and destroying critical infrastructure. Cropland is submerged, threatening food security. The scale of destruction requires an urgent national response."
 md2026_climate.10.o1:0 "Appeal for international humanitarian aid"
 md2026_climate.10.o2:0 "Handle disaster response domestically"

 md2026_climate_news.1.t:0 "Record Heat Wave Devastates Region"
 md2026_climate_news.1.d:0 "A record-breaking heat wave has struck multiple countries, causing widespread wildfires, infrastructure damage, and heat-related casualties. Scientists attribute the extreme temperatures to accelerating climate change and call for urgent action."
 md2026_climate_news.1.o1:0 "The planet is burning"

 md2026_climate_news.2.t:0 "Catastrophic Floods in Asia"
 md2026_climate_news.2.d:0 "Unprecedented monsoon flooding has devastated large parts of South and Southeast Asia, displacing millions and destroying critical infrastructure. International aid organizations mobilize as the humanitarian crisis deepens."
 md2026_climate_news.2.o1:0 "A humanitarian catastrophe"

 ### EVENTS - AI & TECHNOLOGY REVOLUTION ###
 md2026_tech.1.t:0 "AI Breakthrough"
 md2026_tech.1.d:0 "Our research institutions have achieved a major breakthrough in artificial intelligence. A new large-scale AI system demonstrates capabilities far exceeding current models, with profound implications for both civilian and military applications. This technology could revolutionize our economy and defense — but the path we choose will shape its impact."
