 ### EVENTS - RUSSIA-UKRAINE ###
 md2026_ru_ukr.1.t:0 "Ceasefire Proposal"
 md2026_ru_ukr.1.d:0 "The war in Ukraine has reached a stalemate. Our forces hold the territories we have claimed, but further advances prove costly. Some voices in Moscow suggest it is time to propose a ceasefire along current lines of control. This would allow us to consolidate our gains while easing the economic burden of continued war."
 md2026_ru_ukr.1.o1:0 "Propose a ceasefire along current lines"
 md2026_ru_ukr.1.o2:0 "The war continues - no negotiations"

 md2026_ru_ukr.2.t:0 "Russia Proposes Ceasefire"
 md2026_ru_ukr.2.d:0 "Russia has formally proposed a ceasefire along current lines of control. This would effectively mean accepting the loss of Crimea and parts of Donbas. The international community watches closely. Our allies urge caution, but our people are weary of war."
 md2026_ru_ukr.2.o1:0 "Accept negotiations - we must end the bloodshed"
 md2026_ru_ukr.2.o2:0 "Reject - we will not surrender our land"

 md2026_ru_ukr.3.t:0 "Negotiating the Terms"
 md2026_ru_ukr.3.d:0 "Ukraine has agreed to negotiations. Now we must decide the terms. We can accept a demilitarized zone along the current front line, creating a frozen conflict, or we can push for full international recognition of our territorial claims, which risks collapsing the talks."
 md2026_ru_ukr.3.o1:0 "Accept a demilitarized zone - frozen conflict"
 md2026_ru_ukr.3.o2:0 "Demand full recognition of annexed territories"

 md2026_ru_ukr.4.t:0 "Ceasefire Established"
 md2026_ru_ukr.4.d:0 "A ceasefire has been established along the front lines. The guns have fallen silent, but the war is not truly over. Our territory remains divided, with Russian forces occupying our land. We must now decide our path forward - focus on rebuilding what we have, or prepare for the next fight."
 md2026_ru_ukr.4.o1:0 "Focus on reconstruction and healing"
 md2026_ru_ukr.4.o2:0 "This is only a pause - prepare for what comes next"

 md2026_ru_ukr.5.t:0 "Ukraine Rejects Ceasefire"
 md2026_ru_ukr.5.d:0 "Ukraine has rejected our ceasefire proposal. They believe their Western allies will continue to support them indefinitely, and that time is on their side. We must now decide how to respond to this rejection."
 md2026_ru_ukr.5.o1:0 "Escalate - they will regret this decision"
 md2026_ru_ukr.5.o2:0 "Maintain current strategy and wait"

 md2026_ru_ukr.6.t:0 "Negotiations Collapse"
 md2026_ru_ukr.6.d:0 "Russia's demand for full recognition of all annexed territories has proven too much. The negotiations have collapsed, and the war will continue. Our people are frustrated but defiant - we will not accept terms that legitimize the occupation of our land."
 md2026_ru_ukr.6.o1:0 "Rally the nation - we fight on!"
 md2026_ru_ukr.6.o2:0 "Appeal to the international community for support"

 md2026_ru_ukr.10.t:0 "US-Mediated Peace Proposal"
 md2026_ru_ukr.10.d:0 "The United States has proposed a peace settlement for the Ukraine conflict. President Trump's envoy presents terms that would freeze the conflict along current lines, with security guarantees for both sides. This could be an opportunity to end the war on favorable terms, or it could be seen as American interference."
 md2026_ru_ukr.10.o1:0 "Accept US mediation"
 md2026_ru_ukr.10.o2:0 "Reject American interference in our affairs"

 md2026_ru_ukr.11.t:0 "The American Peace Plan"
 md2026_ru_ukr.11.d:0 "Russia has accepted US mediation. The proposed settlement would require Ukraine to accept the loss of territories currently controlled by Russia, in exchange for security guarantees and a path to Western integration. This is a bitter pill, but it could end the war."
 md2026_ru_ukr.11.o1:0 "Accept the deal - end the war"
 md2026_ru_ukr.11.o2:0 "Reject - we will not surrender our territory"

 md2026_ru_ukr.12.t:0 "Peace Deal Achieved"
 md2026_ru_ukr.12.d:0 "The Ukraine peace deal has been signed. Both sides have made concessions, but the war is over. This is a major diplomatic victory for the United States and a demonstration that American leadership can still resolve the world's most dangerous conflicts."
 md2026_ru_ukr.12.o1:0 "A triumph of American diplomacy"

 md2026_ru_ukr.13.t:0 "Peace Efforts Have Failed"
 md2026_ru_ukr.13.d:0 "Our peace initiative for Ukraine has failed. One or both sides rejected the terms we proposed. The war will continue, and American credibility as a mediator has taken a hit. We must now reconsider our approach to the conflict."
 md2026_ru_ukr.13.o1:0 "We tried. The war goes on."

 md2026_ru_ukr_news.1.t:0 "Ceasefire in Ukraine!"
 md2026_ru_ukr_news.1.d:0 "After years of brutal fighting, a ceasefire has been declared between Russia and Ukraine. The guns have fallen silent along the front lines, though the underlying conflict remains unresolved. The international community cautiously welcomes the development."
 md2026_ru_ukr_news.1.o1:0 "A fragile peace..."

 md2026_ru_ukr_news.2.t:0 "Peace Talks Collapse"
 md2026_ru_ukr_news.2.d:0 "Negotiations between Russia and Ukraine have collapsed. The two sides could not agree on terms for ending the conflict. The war will continue, raising fears of further escalation and humanitarian suffering."
 md2026_ru_ukr_news.2.o1:0 "The war goes on..."

 md2026_ru_ukr_news.3.t:0 "US-Brokered Peace Deal Signed!"
 md2026_ru_ukr_news.3.d:0 "In a historic moment, Russia and Ukraine have signed a US-brokered peace agreement, ending years of devastating warfare. The deal freezes the conflict along current lines of control and establishes security guarantees for both parties."
 md2026_ru_ukr_news.3.o1:0 "A new chapter begins"

 ### EVENTS - TAIWAN ###
 md2026_taiwan.1.t:0 "The Taiwan Decision"
 md2026_taiwan.1.d:0 "Our military buildup opposite Taiwan is complete. The People's Liberation Army stands ready to enforce reunification by any means necessary. The moment of decision has arrived. We can impose a naval blockade to force Taipei's submission, launch a full amphibious invasion, or demonstrate our strength through military exercises while keeping our options open."
 md2026_taiwan.1.o1:0 "Impose a naval blockade on Taiwan"
 md2026_taiwan.1.o2:0 "Launch a full-scale invasion"
 md2026_taiwan.1.o3:0 "Military exercises only - demonstrate strength"

 md2026_taiwan.2.t:0 "China Blockades Taiwan"
 md2026_taiwan.2.d:0 "China has imposed a naval blockade on Taiwan, cutting off the island's maritime trade. This is an act of aggression that threatens a key ally and the global semiconductor supply chain. The US Navy is capable of breaking the blockade, but doing so risks direct military confrontation with China."
 md2026_taiwan.2.o1:0 "Send the Navy to break the blockade"
 md2026_taiwan.2.o2:0 "Diplomatic protest and sanctions only"
 md2026_taiwan.2.o3:0 "Accept the new status quo"

 md2026_taiwan.3.t:0 "China Blockades Taiwan"
 md2026_taiwan.3.d:0 "China has imposed a naval blockade on Taiwan, directly threatening regional stability and Japanese security interests. Our Self-Defense Forces could support American naval operations to break the blockade, but this would mark a historic shift in Japan's post-war defense posture."
 md2026_taiwan.3.o1:0 "Support US naval operations"
 md2026_taiwan.3.o2:0 "Maintain neutrality for now"

 md2026_taiwan.4.t:0 "China Invades Taiwan!"
 md2026_taiwan.4.d:0 "China has launched a full-scale amphibious invasion of Taiwan. This is the most dangerous military crisis since World War II. The Taiwan Relations Act obliges us to help Taiwan defend itself, but direct intervention means war with a nuclear-armed power."
 md2026_taiwan.4.o1:0 "Defend Taiwan - we go to war"
 md2026_taiwan.4.o2:0 "Provide weapons and support, but no direct intervention"
 md2026_taiwan.4.o3:0 "This is not our fight"

 md2026_taiwan.5.t:0 "China Invades Taiwan!"
 md2026_taiwan.5.d:0 "China has launched a full-scale invasion of Taiwan. The largest amphibious operation since D-Day threatens to reshape the entire Indo-Pacific order. Japan faces an existential question: do we intervene to defend a neighboring democracy, or protect ourselves by staying out?"
 md2026_taiwan.5.o1:0 "Join the defense of Taiwan"
 md2026_taiwan.5.o2:0 "Strengthen our defenses, but do not intervene"

 md2026_taiwan.6.t:0 "The Americans Challenge Our Blockade"
 md2026_taiwan.6.d:0 "The United States Navy has deployed carrier strike groups toward Taiwan, directly challenging our blockade. If we confront them, we risk a war between nuclear powers. If we back down, we lose face and our Taiwan strategy collapses."
 md2026_taiwan.6.o1:0 "Confront the US Navy"
 md2026_taiwan.6.o2:0 "Back down and lift the blockade"
 md2026_taiwan.6.o3:0 "Maintain blockade but avoid direct confrontation"

 md2026_taiwan_news.1.t:0 "China Blockades Taiwan!"
 md2026_taiwan_news.1.d:0 "The People's Republic of China has imposed a naval blockade around Taiwan, cutting off maritime trade to the island. Global markets plunge as the world's semiconductor supply chain faces disruption. International leaders call for restraint."
 md2026_taiwan_news.1.o1:0 "The world watches anxiously"

 md2026_taiwan_news.2.t:0 "China Invades Taiwan!"
 md2026_taiwan_news.2.d:0 "China has launched a full-scale amphibious invasion of Taiwan. Hundreds of thousands of PLA troops are crossing the Taiwan Strait in the largest military operation since World War II. The world holds its breath as the risk of global war rises dramatically."
 md2026_taiwan_news.2.o1:0 "God help us all"

 md2026_taiwan_news.3.t:0 "China Lifts Taiwan Blockade"
 md2026_taiwan_news.3.d:0 "Faced with American naval pressure, China has lifted its blockade of Taiwan. The crisis has passed for now, but tensions in the Taiwan Strait remain dangerously high. Global markets recover as shipping lanes reopen."
 md2026_taiwan_news.3.o1:0 "Crisis averted... for now"

 ### EVENTS - MIDDLE EAST ###
 md2026_mideast.1.t:0 "Rebuilding Syria"
 md2026_mideast.1.d:0 "The Assad regime has fallen, and Syria faces the monumental task of reconstruction. The new government must decide the direction of the country: pursue a secular, inclusive model that might attract Western support, adopt an Islamic governance framework reflecting the values of the revolution, or accept a fragmented power-sharing arrangement."
 md2026_mideast.1.o1:0 "Pursue secular reconstruction"
 md2026_mideast.1.o2:0 "Islamic-oriented governance"
 md2026_mideast.1.o3:0 "Accept power-sharing fragmentation"

 md2026_mideast.2.t:0 "International Aid Conference"
 md2026_mideast.2.d:0 "The international community is prepared to provide reconstruction aid to Syria, but different donors come with different conditions. Western nations demand democratic reforms and human rights guarantees, while regional Arab states offer support with fewer strings attached."
 md2026_mideast.2.o1:0 "Accept Western aid with conditions"
 md2026_mideast.2.o2:0 "Seek regional Arab support"

 md2026_mideast.10.t:0 "The Gaza Question"
 md2026_mideast.10.d:0 "The situation in Gaza demands a strategic decision. Our military operations have achieved their initial objectives, but the humanitarian and diplomatic costs continue to mount. We must chart a path forward that balances security needs with international pressure and regional diplomacy."
 md2026_mideast.10.o1:0 "Continue military operations"
 md2026_mideast.10.o2:0 "Pursue ceasefire and negotiations"
 md2026_mideast.10.o3:0 "Focus on expanding the Abraham Accords"

 md2026_mideast.20.t:0 "Nuclear Crossroads"
 md2026_mideast.20.d:0 "Our nuclear program has reached a critical juncture. We possess the technical capability to enrich uranium to weapons-grade levels within months. The Supreme Leader must decide: push toward nuclear breakout capability as the ultimate deterrent, negotiate a new agreement with the West to ease sanctions, or maintain strategic ambiguity."
 md2026_mideast.20.o1:0 "Accelerate enrichment - pursue breakout capability"
 md2026_mideast.20.o2:0 "Negotiate a new agreement with the West"
 md2026_mideast.20.o3:0 "Maintain strategic ambiguity"

 md2026_mideast.21.t:0 "Iran Approaches Nuclear Breakout"
 md2026_mideast.21.d:0 "Intelligence reports confirm that Iran is rapidly approaching nuclear weapons capability. This poses an existential threat to Israel. We must decide how to respond: launch a preemptive strike on Iranian nuclear facilities, pursue maximum diplomatic pressure through allies, or accelerate our own deterrence capabilities."
 md2026_mideast.21.o1:0 "Preemptive strike on nuclear facilities"
 md2026_mideast.21.o2:0 "Maximum diplomatic pressure through allies"
 md2026_mideast.21.o3:0 "Accelerate our own deterrence"

 md2026_mideast.22.t:0 "Iran Nuclear Crisis"
 md2026_mideast.22.d:0 "Iran is approaching nuclear weapons capability. This threatens the entire non-proliferation regime and regional stability. We must decide how to respond to this growing threat."
 md2026_mideast.22.o1:0 "Maximum pressure sanctions campaign"
 md2026_mideast.22.o2:0 "Support Israeli action if necessary"
 md2026_mideast.22.o3:0 "Accept Iran as a threshold nuclear state"

 md2026_mideast.30.t:0 "Yemen's Path Forward"
 md2026_mideast.30.d:0 "Yemen stands at a crossroads. The Houthi movement has consolidated control over much of the country, but international pressure and Saudi intervention have taken their toll. A national unity government could bring stability, or the Houthis could double down on their alliance with Iran."
 md2026_mideast.30.o1:0 "Form a national unity government"
 md2026_mideast.30.o2:0 "Continue under Houthi dominance"

 md2026_mideast_news.1.t:0 "Israel-Palestine Ceasefire"
 md2026_mideast_news.1.d:0 "Israel has agreed to a ceasefire in the Gaza conflict and opened negotiations for a broader peace settlement. The international community welcomes the development, though many remain skeptical about lasting peace."
 md2026_mideast_news.1.o1:0 "Hope for peace in the Middle East"

 md2026_mideast_news.2.t:0 "Iran Nuclear Crisis Escalates"
