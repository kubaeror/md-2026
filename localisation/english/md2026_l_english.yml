 MD2026_BOOKMARK_NAME:0 "Modern Day 2026"
 MD2026_BOOKMARK_DESC:0 "The year is 2026. The world stands at a precipice. In Eastern Europe, the brutal war in Ukraine grinds on, heavily depleting Russian forces while straining Western military stockpiles. In the Indo-Pacific, an assertive China ramps up pressure on Taiwan. In the Middle East, the fallout of the Gaza War threatens regional stability. Meanwhile, in Washington, a newly elected administration seeks to fundamentally alter the global world order.\n\nWill you navigate the multipolar chaos, or lead the world into the abyss?"
 MD2026_USA_DESC:0 "The United States enters 2026 highly polarized. With Donald Trump back in the White House, the focus shifts entirely to "America First" policies: high tariffs, deregulation via DOGE, and a demand for European nations to handle their own defense. The Ukraine war has drained American resources, leading to a strong push for a negotiated settlement."
 MD2026_SOV_DESC:0 "The Russian Federation is locked in a grinding war of attrition in Ukraine. Despite severe Western sanctions, the economy has pivoted toward war production and strengthened ties with China, Iran, and North Korea. Will you escalate the conflict to a decisive victory, or consolidate your gains in a frozen conflict?"
 MD2026_CHI_DESC:0 "The People's Republic of China views 2026 as a critical window for national rejuvenation. The PLA is at the peak of its modernization, and the "Taiwan Question" looms larger than ever. However, a slowing economy and a semiconductor war with the West threaten the timeline of the Chinese Dream."
 MD2026_UKR_DESC:0 "Ukraine has fought valiantly for four years, holding the line against the Russian colossus. The nation is heavily reliant on Western aid, which is increasingly in doubt. You must rebuild your military-industrial complex, harness drone warfare, and either fight on for total victory or secure the best possible peace."
 MD2026_TAI_DESC:0 "Taiwan, the Republic of China, is the epicenter of the new Cold War. Armed with the "Silicon Shield" of TSMC and an asymmetric "porcupine" defense doctrine, the island nation must navigate escalating Chinese military exercises and the unreliability of American intervention."
 MD2026_GER_DESC:0 "Germany has undergone a 'Zeitenwende' (turning point) since the invasion of Ukraine, slowly rebuilding the Bundeswehr and pivoting away from Russian gas. Now, it must take the mantle of European defense leadership as the United States pulls back."
 MD2026_ISR_DESC:0 "Israel remains on high alert following the prolonged conflict in Gaza. Surrounded by hostile proxies and facing the existential threat of an Iranian nuclear breakout, the IDF must maintain its qualitative military edge while navigating complex regional diplomacy."
 MD2026_POL_DESC:0 "Poland has rapidly transformed into the military powerhouse of Europe. Acting as the "Eastern Shield," Warsaw has acquired massive amounts of modern weaponry and leads the call for European rearmament against the Russian threat."
