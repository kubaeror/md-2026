 md2026_zaf_brics_ties:0 "Deepen BRICS Ties"
 md2026_zaf_brics_ties_desc:0 "Strengthen our economic and political relations with the BRICS bloc."
 md2026_zaf_mining_sector:0 "Mining Sector Reform"
 md2026_zaf_mining_sector_desc:0 "Revitalize our crucial mining industry."
 md2026_zaf_regional_power:0 "Regional Power"
 md2026_zaf_regional_power_desc:0 "Reassert South Africa's role as the powerhouse of the continent."

 md2026_proxy_support_sov:0 "Support African Proxies"
 md2026_proxy_support_sov_desc:0 "Increase funding, military equipment and training for our proxy forces operating in the Sahel and other parts of Africa. This will project our power but cost resources and draw the ire of the West."
 md2026_proxy_support_usa:0 "Support Democratic Proxies"
 md2026_proxy_support_usa_desc:0 "Funnel resources to democratic rebels and allied militias in key conflict zones like Syria to counterbalance authoritarian influence."
 md2026_proxy_support_per:0 "Arm the Axis of Resistance"
 md2026_proxy_support_per_desc:0 "Step up military aid to our proxy network across the Middle East, including Hezbollah, Hamas, and the Houthis, to exert maximum pressure on our regional rivals."
 
 md2026_proxy_warfare_cost:0 "Proxy War Support"
 md2026_proxy_warfare_cost_desc:0 "Our government is dedicating significant resources and political capital to support proxy forces abroad."
 
 md2026_cyber_attack_infrastructure:0 "Cyberattack on Enemy Infrastructure"
 md2026_cyber_attack_infrastructure_desc:0 "Utilize our cyber warfare capabilities to disrupt the industrial and military infrastructure of our enemies."
 md2026_cyber_steal_technology:0 "Cyber Espionage Campaign"
 md2026_cyber_steal_technology_desc:0 "Launch a targeted campaign to infiltrate foreign databases and steal cutting-edge research."
 md2026_cyber_defense_upgrade:0 "Upgrade Cyber Defenses"
 md2026_cyber_defense_upgrade_desc:0 "Invest in patching vulnerabilities and strengthening our digital perimeter against foreign intrusions."
 md2026_cyber_defense_active:0 "Active Cyber Defenses"
 md2026_cyber_defense_active_desc:0 "Our networks are currently operating under heightened security protocols."
