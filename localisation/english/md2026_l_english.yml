 ### SANCTIONS DECISIONS ###
 md2026_tighten_russia_sanctions:0 "Tighten Sanctions on Russia"
 md2026_tighten_russia_sanctions_desc:0 "Impose additional economic sanctions on Russia in response to its ongoing aggression. This will further damage the Russian economy but may have minor diplomatic costs."
 md2026_lift_russia_sanctions:0 "Lift Sanctions on Russia"
 md2026_lift_russia_sanctions_desc:0 "Remove the economic sanctions regime against Russia. This will anger our allies but could open diplomatic channels. Only possible if the Russia-Ukraine conflict has ended."
 md2026_escalate_iran_sanctions:0 "Escalate Iran Sanctions"
 md2026_escalate_iran_sanctions_desc:0 "Tighten sanctions on Iran's nuclear program and economic activities, further isolating Tehran from the global economy."
