l_english:

 ### BOOKMARK ###
 MD_2026:0 "Millennium Dawn 2026"
 MD_2026_DESC:0 "The world stands at a crossroads. Russia's war in Ukraine grinds on into its fourth year, reshaping European security. China's rise challenges American hegemony across the Pacific. The Middle East remains in flux after the fall of Assad and the Gaza conflict. NATO has expanded to 32 members, BRICS+ seeks to reshape the global order, and populism surges across democracies. The old world order is dying, and the new one struggles to be born."

 ### BOOKMARK COUNTRY DESCRIPTIONS ###
 USA_MD2026_DESC:0 "President Donald Trump has returned to the White House for a second term, promising to end the Ukraine war, impose sweeping tariffs, and pursue 'America First' policies. The United States faces deep political polarization while maintaining its position as the world's preeminent military and economic power."
 SOV_MD2026_DESC:0 "Russia's war in Ukraine continues with no end in sight. President Putin has consolidated power but faces mounting economic pressure from Western sanctions. Russia pivots eastward toward China and BRICS+ while maintaining its nuclear arsenal as the ultimate guarantor of the regime's survival."
 CHI_MD2026_DESC:0 "Under Xi Jinping's continued leadership, China pursues the 'great rejuvenation of the Chinese nation.' Economic growth has slowed, but military modernization accelerates. The Taiwan question looms large as China builds the world's largest navy and expands its global influence through Belt and Road."
 UKR_MD2026_DESC:0 "Ukraine fights for its survival against Russian aggression. President Zelensky leads a nation that has lost territory but gained unprecedented Western support. The question remains: will the war end through military victory, frozen conflict, or a negotiated settlement that may require painful concessions?"
 ISR_MD2026_DESC:0 "Israel operates on a wartime footing following the October 2023 attacks and subsequent military operations. The Abraham Accords offer diplomatic normalization with Arab states, but the Palestinian question remains unresolved. Iran's nuclear program poses an existential threat."
 TUR_MD2026_DESC:0 "President Erdogan has consolidated power in Turkey, balancing between NATO membership and closer ties with Russia and China. Turkey controls key straits, hosts millions of refugees, and plays a pivotal role in Middle Eastern and Central Asian geopolitics."
 POL_MD2026_DESC:0 "Poland has emerged as NATO's eastern shield, dramatically increasing military spending to become Europe's strongest conventional force. Bordering Ukraine and Russia's Kaliningrad exclave, Poland stands at the frontline of European security."
 JAP_MD2026_DESC:0 "Japan faces growing security challenges from China's military buildup, North Korea's nuclear program, and Russia's aggression. Under PM Ishiba, Japan continues its historic shift toward a more assertive defense posture while navigating economic challenges."
 GER_MD2026_DESC:0 "Germany undergoes its Zeitenwende - a turning point in defense and energy policy. Chancellor Merz leads Europe's largest economy as it reckons with Russian energy dependence, military underinvestment, and the challenge of EU leadership."
 FRA_MD2026_DESC:0 "France under President Macron maintains its nuclear deterrent and UN Security Council seat while pushing for European strategic autonomy. Domestic political fragmentation and social tensions complicate France's ambitious foreign policy."
 ENG_MD2026_DESC:0 "The United Kingdom under PM Starmer navigates post-Brexit realities while maintaining its special relationship with the United States and its commitment to NATO. Britain remains a nuclear power with global military reach."
 ITA_MD2026_DESC:0 "Italy grapples with migration pressures from across the Mediterranean, economic stagnation, and its role within NATO and the EU. A key Southern European power with strategic Mediterranean positioning."
 RAJ_MD2026_DESC:0 "India under PM Modi balances between Western alignment and BRICS+ membership, pursuing strategic autonomy. The world's most populous nation modernizes rapidly while managing border tensions with China and Pakistan."
 BRA_MD2026_DESC:0 "Brazil under President Lula returns to active multilateral diplomacy as a BRICS+ founding member. Latin America's largest economy seeks to leverage its agricultural and resource wealth while addressing domestic inequality."
 PER_MD2026_DESC:0 "Iran under Supreme Leader Khamenei faces international sanctions and domestic pressures. Its nuclear program approaches breakout capability while its regional proxy network has been weakened. The regime's survival depends on navigating between confrontation and compromise."
 KOR_MD2026_DESC:0 "South Korea faces the dual threat of North Korea's nuclear arsenal and China's growing regional assertiveness. A technological powerhouse and key US ally in the Indo-Pacific."
 NKO_MD2026_DESC:0 "North Korea under Kim Jong-un has achieved de facto nuclear state status. Totally isolated but armed with ICBMs, the regime maintains its grip through repression while deploying troops alongside Russia in Ukraine."
 SAU_MD2026_DESC:0 "Saudi Arabia under Crown Prince MBS pursues Vision 2030 economic transformation while navigating regional rivalries with Iran and complex relationships with both the US and China."
 SYR_MD2026_DESC:0 "Syria enters a new era after the fall of the Assad regime. The country faces the monumental task of reconstruction while various factions compete for influence in the post-war order."
 CAN_MD2026_DESC:0 "Canada maintains its commitment to NATO and Western alliances while facing Arctic sovereignty challenges from Russia and economic pressures from US trade policies."
 SWE_MD2026_DESC:0 "Sweden has joined NATO, ending decades of neutrality in response to Russia's aggression in Ukraine. A strong economy and advanced defense industry strengthen the alliance's northern flank."
 FIN_MD2026_DESC:0 "Finland joined NATO in 2023, adding 1,340 km of border with Russia to the alliance. One of Europe's most capable militaries with deep experience in Arctic warfare."
 NOR_MD2026_DESC:0 "Norway guards NATO's Arctic flank while benefiting from high energy prices as Europe's key natural gas supplier following the cutoff of Russian energy."
 HUN_MD2026_DESC:0 "Hungary under PM Orban pursues an independent foreign policy within NATO and the EU, maintaining closer ties with Russia and China than its allies prefer."
 ROM_MD2026_DESC:0 "Romania sits at the strategic junction of NATO's eastern and southern flanks, hosting allied forces and monitoring the Black Sea as the war in Ukraine continues."
 AST_MD2026_DESC:0 "Australia deepens its security ties with the US through AUKUS while managing complex economic relations with China, its largest trading partner."
 SUD_MD2026_DESC:0 "Sudan is engulfed in a devastating civil war between the army and the Rapid Support Forces, creating one of the world's worst humanitarian crises."
 BRM_MD2026_DESC:0 "Myanmar remains under military junta rule following the 2021 coup, facing widespread resistance and economic collapse."
 OTHER_MD2026_DESC:0 "A nation navigating the turbulent geopolitics of 2026."

 ### NATIONAL SPIRITS ###
 md2026_sov_western_sanctions:0 "Western Sanctions"
 md2026_sov_western_sanctions_desc:0 "Comprehensive Western sanctions target Russia's financial system, energy exports, and technology imports. While the economy has adapted, long-term growth is severely constrained."
 md2026_sov_war_mobilization:0 "War Mobilization"
 md2026_sov_war_mobilization_desc:0 "Russia has shifted to a war economy, with military production taking priority over civilian needs. Partial mobilization has been implemented to sustain frontline forces."
 md2026_ukr_western_military_aid:0 "Western Military Aid"
 md2026_ukr_western_military_aid_desc:0 "Ukraine receives substantial military aid from NATO allies, including advanced weapons systems, training, and intelligence support."
 md2026_ukr_western_aid_tt:0 "Receiving Western military equipment and training"
 md2026_ukr_defensive_mobilization:0 "Defensive Mobilization"
 md2026_ukr_defensive_mobilization_desc:0 "The entire Ukrainian nation is mobilized for defense. Conscription has been expanded and civil society actively supports the war effort."
 md2026_usa_political_polarization:0 "Political Polarization"
 md2026_usa_political_polarization_desc:0 "American society is deeply divided along political lines. Congressional gridlock, media polarization, and social tensions undermine governance and national unity."
 md2026_usa_america_first:0 "America First"
 md2026_usa_america_first_desc:0 "The Trump administration's 'America First' doctrine prioritizes domestic interests, bilateral deal-making, and skepticism toward multilateral institutions and alliances."
 md2026_chi_economic_slowdown:0 "Economic Slowdown"
 md2026_chi_economic_slowdown_desc:0 "China's economic growth has decelerated amid a property crisis, demographic decline, and trade tensions with the West. The era of double-digit growth is over."
 md2026_chi_military_modernization:0 "Military Modernization"
 md2026_chi_military_modernization_desc:0 "The PLA undergoes rapid modernization with a focus on naval power, missile technology, and preparing for potential operations against Taiwan."
 md2026_ger_zeitenwende:0 "Zeitenwende"
 md2026_ger_zeitenwende_desc:0 "Germany's 'turning point' in defense policy has led to increased military spending, energy diversification away from Russia, and a more assertive foreign policy stance."
 md2026_eng_post_brexit:0 "Post-Brexit Britain"
 md2026_eng_post_brexit_desc:0 "The UK continues to adjust to life outside the EU. Trade friction, regulatory divergence, and questions about the union's future shape domestic politics."
 md2026_isr_wartime_footing:0 "Wartime Footing"
 md2026_isr_wartime_footing_desc:0 "Israel maintains heightened military readiness following the October 2023 attacks and ongoing regional security threats from Iran and its proxies."
 md2026_tur_erdogan_autocracy:0 "Erdogan's Consolidation"
 md2026_tur_erdogan_autocracy_desc:0 "President Erdogan has concentrated power through constitutional changes. Press freedom and judicial independence have eroded, but Turkey remains a strategic NATO member."
 md2026_per_international_sanctions:0 "International Sanctions"
 md2026_per_international_sanctions_desc:0 "Iran faces comprehensive international sanctions targeting its nuclear program, missile development, and support for regional proxies."
 md2026_nko_total_isolation:0 "Total Isolation"
 md2026_nko_total_isolation_desc:0 "North Korea is the world's most isolated state, subject to maximum sanctions while maintaining a nuclear arsenal and deploying forces to support Russia."
 md2026_pol_eastern_shield:0 "Eastern Shield"
 md2026_pol_eastern_shield_desc:0 "Poland has embarked on the largest military buildup in Europe, aiming to field the continent's strongest conventional force to deter Russian aggression."

 ### FOCUS TREES ###

 ## USA Focuses ##
 MD2026_USA_trump_second_term:0 "Trump's Second Term"
 MD2026_USA_trump_second_term_desc:0 "Donald Trump has returned to the White House with a sweeping mandate. His 'America First' agenda will reshape domestic and foreign policy for years to come."
 MD2026_USA_mass_deportations:0 "Mass Deportations"
 MD2026_USA_mass_deportations_desc:0 "The administration launches an unprecedented mass deportation campaign targeting millions of undocumented immigrants, straining law enforcement and sparking social unrest."
 MD2026_USA_border_security:0 "Secure the Border"
 MD2026_USA_border_security_desc:0 "New border security measures including expanded wall construction and enhanced surveillance aim to stem illegal crossings."
 MD2026_USA_radical_tax_cuts:0 "Radical Tax Cuts"
 MD2026_USA_radical_tax_cuts_desc:0 "Sweeping tax cuts for corporations and high earners aim to stimulate economic growth, though critics warn of ballooning deficits."
 MD2026_USA_trade_tariffs:0 "Impose Tariffs"
 MD2026_USA_trade_tariffs_desc:0 "Broad tariffs on imported goods aim to protect American industry but risk triggering retaliatory measures from trading partners."
 MD2026_USA_trade_war_china:0 "Trade War with China"
 MD2026_USA_trade_war_china_desc:0 "Escalating tariffs and export controls on China target semiconductors, rare earths, and advanced technology in a full-scale economic confrontation."
 MD2026_USA_trade_war_eu:0 "Trade War with EU"
 MD2026_USA_trade_war_eu_desc:0 "Tariffs extended to European allies strain the transatlantic relationship and threaten NATO cohesion."
 MD2026_USA_energy_dominance:0 "Energy Dominance"
 MD2026_USA_energy_dominance_desc:0 "The administration prioritizes maximum fossil fuel extraction to achieve energy independence and leverage exports as a geopolitical tool."
 MD2026_USA_drill_baby_drill:0 "Drill, Baby, Drill"
 MD2026_USA_drill_baby_drill_desc:0 "Opening federal lands and offshore areas to drilling dramatically increases oil and gas production, rolling back environmental protections."
 MD2026_USA_lng_exports:0 "LNG Export Expansion"
 MD2026_USA_lng_exports_desc:0 "Expanding LNG export terminals enables America to supply allies in Europe and Asia, reducing their dependence on Russian and Middle Eastern energy."
 MD2026_USA_nato_pressure:0 "Pressure NATO Allies"
 MD2026_USA_nato_pressure_desc:0 "The administration demands NATO allies meet defense spending obligations or face reduced American security commitments."
 MD2026_USA_pentagon_budget:0 "Pentagon Budget Increase"
 MD2026_USA_pentagon_budget_desc:0 "A massive increase in defense spending funds modernization of all military branches and expansion of force projection capabilities."
 MD2026_USA_space_force_expansion:0 "Expand Space Force"
 MD2026_USA_space_force_expansion_desc:0 "The Space Force receives major funding for orbital defense systems, satellite constellations, and counter-space capabilities."
 MD2026_USA_deal_with_russia:0 "The Deal with Russia"
 MD2026_USA_deal_with_russia_desc:0 "Pursuing direct diplomacy with Moscow to negotiate a resolution to the Ukraine conflict, potentially at the cost of Ukrainian territorial integrity."
 MD2026_USA_ukraine_peace_deal:0 "Ukraine Peace Deal"
 MD2026_USA_ukraine_peace_deal_desc:0 "A negotiated settlement is brokered between Russia and Ukraine, aiming to end the war through territorial compromise and security guarantees."
 MD2026_USA_abandon_ukraine:0 "Abandon Ukraine"
 MD2026_USA_abandon_ukraine_desc:0 "The US withdraws military aid to Ukraine, effectively pressuring Kyiv to accept Russian terms. European allies scramble to fill the gap."

 ## Russia Focuses ##
 MD2026_SOV_war_crossroads:0 "War at the Crossroads"
 MD2026_SOV_war_crossroads_desc:0 "Russia's war in Ukraine has reached a critical juncture. The Kremlin must decide whether to escalate, freeze the conflict, or pivot eastward for new alliances."
 MD2026_SOV_escalation:0 "Escalate the War"
 MD2026_SOV_escalation_desc:0 "Moscow commits to a military escalation, pouring additional resources and manpower into the Ukrainian front at great cost to stability and the economy."
 MD2026_SOV_total_mobilization:0 "Total Mobilization"
 MD2026_SOV_total_mobilization_desc:0 "A full national mobilization puts Russia on a war footing, dramatically expanding the army but creating severe domestic strain."
 MD2026_SOV_nuclear_threats:0 "Nuclear Saber-Rattling"
 MD2026_SOV_nuclear_threats_desc:0 "Russia issues explicit nuclear threats to deter Western intervention, raising global tensions to their highest level since the Cold War."
 MD2026_SOV_frozen_conflict:0 "Frozen Conflict"
 MD2026_SOV_frozen_conflict_desc:0 "Russia seeks to freeze the conflict along current lines, consolidating territorial gains while reducing the economic burden of active war."
 MD2026_SOV_consolidate_territories:0 "Consolidate Territories"
 MD2026_SOV_consolidate_territories_desc:0 "Focus on integrating occupied Ukrainian territories into the Russian administrative and economic system."
 MD2026_SOV_economic_autarky:0 "Economic Autarky"
 MD2026_SOV_economic_autarky_desc:0 "Faced with Western sanctions, Russia pursues self-sufficiency through import substitution and domestic production expansion."
 MD2026_SOV_import_substitution:0 "Import Substitution"
 MD2026_SOV_import_substitution_desc:0 "Accelerated development of domestic industrial capacity to replace sanctioned Western imports, particularly in technology and manufacturing."
 MD2026_SOV_sanctions_circumvention:0 "Sanctions Circumvention"
 MD2026_SOV_sanctions_circumvention_desc:0 "Establishing parallel trade networks and shell companies to circumvent Western sanctions through third countries."
 MD2026_SOV_eastern_pivot:0 "Pivot to the East"
 MD2026_SOV_eastern_pivot_desc:0 "Russia reorients its economic and diplomatic focus toward China, India, and the Global South as Western relations deteriorate."
 MD2026_SOV_china_trade:0 "Deepen China Trade"
 MD2026_SOV_china_trade_desc:0 "Expanding bilateral trade with China in energy, agriculture, and technology to offset the loss of European markets."
 MD2026_SOV_brics_leadership:0 "Lead BRICS+"
 MD2026_SOV_brics_leadership_desc:0 "Russia seeks to transform BRICS+ into a viable counterweight to Western institutions, promoting dedollarization and a multipolar world order."

 ## Ukraine Focuses ##
 MD2026_UKR_war_path:0 "Ukraine's War Path"
 MD2026_UKR_war_path_desc:0 "Ukraine faces the defining challenge of its existence: continue fighting for territorial integrity or pursue a diplomatic resolution to end the bloodshed."
 MD2026_UKR_counteroffensive:0 "Launch Counteroffensive"
 MD2026_UKR_counteroffensive_desc:0 "Ukraine prepares a major counteroffensive to reclaim occupied territories, requiring maximum Western support and military commitment."
 MD2026_UKR_western_weapons:0 "Western Weapons"
 MD2026_UKR_western_weapons_desc:0 "Securing advanced Western weapons systems including long-range missiles, modern tanks, and fighter aircraft to shift the battlefield balance."
 MD2026_UKR_liberate_donbas:0 "Liberate the Donbas"
 MD2026_UKR_liberate_donbas_desc:0 "A determined push to liberate the occupied Donbas region, the heart of Ukraine's industrial base and a symbol of national sovereignty."
 MD2026_UKR_diplomatic_path:0 "Diplomatic Path"
 MD2026_UKR_diplomatic_path_desc:0 "Ukraine pursues a negotiated settlement, seeking to end the war through diplomacy while preserving as much sovereignty as possible."
 MD2026_UKR_nato_membership:0 "NATO Membership"
 MD2026_UKR_nato_membership_desc:0 "Ukraine's ultimate security goal: full NATO membership with Article 5 guarantees, requiring the end of active hostilities."
 MD2026_UKR_eu_integration:0 "EU Integration"
 MD2026_UKR_eu_integration_desc:0 "Accelerating EU accession reforms to integrate Ukraine's economy and institutions with the European Union."
 MD2026_UKR_reconstruction:0 "National Reconstruction"
 MD2026_UKR_reconstruction_desc:0 "Massive reconstruction effort to rebuild war-damaged infrastructure, cities, and industrial capacity with international aid."
 MD2026_UKR_defense_industry:0 "Defense Industry"
 MD2026_UKR_defense_industry_desc:0 "Developing a domestic defense industry capable of producing drones, armored vehicles, and ammunition to reduce dependence on foreign supplies."
 MD2026_UKR_counter_offensive:0 "Counter-Offensive"
 MD2026_UKR_counter_offensive_desc:0 "Launch a major counter-offensive to retake occupied territories, leveraging Western arms and battle-hardened forces."
 MD2026_UKR_peace_negotiations:0 "Peace Negotiations"
 MD2026_UKR_peace_negotiations_desc:0 "Enter peace negotiations to end the war, accepting a compromise to stop the bloodshed and begin reconstruction."
 MD2026_UKR_frozen_conflict:0 "Frozen Conflict"
 MD2026_UKR_frozen_conflict_desc:0 "Accept a frozen conflict status along current lines of control, focusing on rebuilding and Western integration."

 ## China Focuses ##
 MD2026_CHI_great_rejuvenation:0 "Great Rejuvenation"
 MD2026_CHI_great_rejuvenation_desc:0 "Xi Jinping's vision of the Great Rejuvenation of the Chinese Nation enters its decisive phase, asserting China's role as a global superpower."
 MD2026_CHI_taiwan_question:0 "The Taiwan Question"
 MD2026_CHI_taiwan_question_desc:0 "Beijing increases pressure on Taiwan, viewing reunification as a core national interest. Military exercises and diplomatic isolation intensify."
 MD2026_CHI_taiwan_escalation:0 "Taiwan Escalation"
 MD2026_CHI_taiwan_escalation_desc:0 "China prepares for a military resolution of the Taiwan question, risking war with the United States and its Pacific allies."
 MD2026_CHI_taiwan_diplomacy:0 "Taiwan Diplomacy"
 MD2026_CHI_taiwan_diplomacy_desc:0 "China pursues a diplomatic approach to Taiwan, using economic incentives and political pressure rather than military force."
 MD2026_CHI_belt_road_2:0 "Belt & Road 2.0"
 MD2026_CHI_belt_road_2_desc:0 "The next phase of the Belt and Road Initiative focuses on digital infrastructure, green energy, and deeper economic integration across the Global South."
 MD2026_CHI_global_infrastructure:0 "Global Infrastructure"
 MD2026_CHI_global_infrastructure_desc:0 "Massive infrastructure investments across Africa, Central Asia, and Southeast Asia expand Chinese economic influence worldwide."
 MD2026_CHI_tech_dominance:0 "Technological Dominance"
 MD2026_CHI_tech_dominance_desc:0 "China pursues technological self-sufficiency and global leadership in AI, quantum computing, and advanced manufacturing."
 MD2026_CHI_semiconductor_war:0 "Semiconductor War"
 MD2026_CHI_semiconductor_war_desc:0 "Massive investment in domestic semiconductor manufacturing to break dependence on Taiwanese and Western chip suppliers."
 MD2026_CHI_space_program:0 "Space Program"
 MD2026_CHI_space_program_desc:0 "China's space program expands with a permanent space station, lunar base plans, and military space capabilities."
 MD2026_CHI_naval_expansion:0 "Naval Expansion"
 MD2026_CHI_naval_expansion_desc:0 "The PLA Navy continues its rapid expansion with new aircraft carriers, destroyers, and submarines to project power across the Pacific."
 MD2026_CHI_south_china_sea:0 "South China Sea"
 MD2026_CHI_south_china_sea_desc:0 "China asserts control over disputed South China Sea territories, building military installations and challenging freedom of navigation."
 MD2026_CHI_blue_water_navy:0 "Blue Water Navy"
 MD2026_CHI_blue_water_navy_desc:0 "Developing a true blue-water navy capable of global power projection, with overseas bases and long-range carrier strike groups."

 ## Germany Focuses ##
 MD2026_GER_zeitenwende_2026:0 "Zeitenwende 2026"
 MD2026_GER_zeitenwende_2026_desc:0 "Germany's historic turning point continues as Berlin grapples with rearmament, energy transition, and its role as Europe's leading power."
 MD2026_GER_bundeswehr_reform:0 "Bundeswehr Reform"
 MD2026_GER_bundeswehr_reform_desc:0 "Overhaul the Bundeswehr's command structure and readiness after decades of underfunding. Germany must be able to fight."
 MD2026_GER_leopard_program:0 "Leopard Tank Program"
 MD2026_GER_leopard_program_desc:0 "Accelerate production of the next-generation Leopard main battle tank and provide the Heer with world-class armored capability."
 MD2026_GER_eurofighter_upgrade:0 "Eurofighter Upgrade"
 MD2026_GER_eurofighter_upgrade_desc:0 "Upgrade the Eurofighter Typhoon fleet with advanced radar and weapons systems to maintain air superiority over European skies."
 MD2026_GER_european_army_corps:0 "European Army Corps"
 MD2026_GER_european_army_corps_desc:0 "Establish a joint Franco-German army corps as the nucleus of a future European defense force, deepening military integration."
 MD2026_GER_air_defense_shield:0 "Air Defense Shield"
 MD2026_GER_air_defense_shield_desc:0 "Deploy an integrated air and missile defense shield over Germany, closing the critical gap exposed by Russia's war in Ukraine."
 MD2026_GER_nato_commitment:0 "NATO Commitment"
 MD2026_GER_nato_commitment_desc:0 "Reaffirm Germany's commitment to NATO and the transatlantic alliance as the cornerstone of European security."
 MD2026_GER_atlantic_solidarity:0 "Atlantic Solidarity"
 MD2026_GER_atlantic_solidarity_desc:0 "Strengthen the transatlantic bond with Washington, ensuring American commitment to European defense remains firm."
 MD2026_GER_european_defense_pillar:0 "European Defense Pillar"
 MD2026_GER_european_defense_pillar_desc:0 "Build a European defense pillar within NATO, enabling the EU to act independently when American support is uncertain."
 MD2026_GER_defense_spending:0 "Defense Spending Increase"
 MD2026_GER_defense_spending_desc:0 "Raise defense spending beyond the NATO 2% target, funding new arms factories and military procurement programs."
 MD2026_GER_energy_transition:0 "Energiewende 2.0"
 MD2026_GER_energy_transition_desc:0 "Launch the next phase of Germany's energy transition, breaking free from fossil fuel dependency once and for all."
 MD2026_GER_renewables_expansion:0 "Renewables Expansion"
 MD2026_GER_renewables_expansion_desc:0 "Massively expand wind and solar capacity across Germany, building the industrial base for a green energy economy."
 MD2026_GER_lng_terminals:0 "LNG Terminal Network"
 MD2026_GER_lng_terminals_desc:0 "Complete the network of LNG terminals along the North Sea coast to diversify gas supplies away from Russian pipelines."
 MD2026_GER_hydrogen_economy:0 "Hydrogen Economy"
 MD2026_GER_hydrogen_economy_desc:0 "Invest in green hydrogen technology as the fuel of the future for German industry and transportation."
 MD2026_GER_industrial_resilience:0 "Industrial Resilience"
 MD2026_GER_industrial_resilience_desc:0 "Rebuild Germany's industrial base with resilient supply chains and domestic production capacity for critical goods."
 MD2026_GER_eu_leadership:0 "EU Leadership"
 MD2026_GER_eu_leadership_desc:0 "Assert Germany's natural leadership role in the European Union, steering the bloc through an era of geopolitical upheaval."
 MD2026_GER_eu_enlargement:0 "EU Enlargement"
 MD2026_GER_eu_enlargement_desc:0 "Champion EU enlargement to bring Ukraine and other candidate states into the European fold, strengthening the bloc's eastern flank."
 MD2026_GER_franco_german_engine:0 "Franco-German Engine"
 MD2026_GER_franco_german_engine_desc:0 "Revitalize the Franco-German partnership as the driving force behind European integration and strategic policy."
 MD2026_GER_balkans_accession:0 "Balkans Accession"
 MD2026_GER_balkans_accession_desc:0 "Accelerate EU accession for Western Balkan states to consolidate stability and counter external influence in the region."
 MD2026_GER_eu_defense_fund:0 "EU Defense Fund"
 MD2026_GER_eu_defense_fund_desc:0 "Establish a joint EU defense procurement fund to pool resources and build a more capable European military."
 MD2026_GER_wirtschaftswunder:0 "Wirtschaftswunder 2.0"
 MD2026_GER_wirtschaftswunder_desc:0 "Ignite a new economic miracle through investment in research, innovation, and a revitalized Mittelstand."
 MD2026_GER_ai_leadership:0 "AI Leadership"
 MD2026_GER_ai_leadership_desc:0 "Position Germany at the forefront of artificial intelligence research and deployment in industry and governance."
 MD2026_GER_mittelstand_innovation:0 "Mittelstand Innovation"
 MD2026_GER_mittelstand_innovation_desc:0 "Empower Germany's small and medium enterprises with cutting-edge technology and modernized production methods."
 MD2026_GER_digital_sovereignty:0 "Digital Sovereignty"
 MD2026_GER_digital_sovereignty_desc:0 "Achieve digital sovereignty by building European cloud infrastructure and reducing dependence on foreign tech platforms."
 MD2026_GER_green_technology:0 "Green Technology Export"
 MD2026_GER_green_technology_desc:0 "Export German green technology worldwide, turning climate leadership into economic advantage."
 MD2026_GER_leading_europe:0 "Leading Europe"
 MD2026_GER_leading_europe_desc:0 "Germany assumes its full responsibility as Europe's leading power — economically, diplomatically, and militarily."

 ### EVENTS - RUSSIA-UKRAINE ###
 md2026_ru_ukr.1.t:0 "Ceasefire Proposal"
 md2026_ru_ukr.1.d:0 "The war in Ukraine has reached a stalemate. Our forces hold the territories we have claimed, but further advances prove costly. Some voices in Moscow suggest it is time to propose a ceasefire along current lines of control. This would allow us to consolidate our gains while easing the economic burden of continued war."
 md2026_ru_ukr.1.o1:0 "Propose a ceasefire along current lines"
 md2026_ru_ukr.1.o2:0 "The war continues - no negotiations"

 md2026_ru_ukr.2.t:0 "Russia Proposes Ceasefire"
 md2026_ru_ukr.2.d:0 "Russia has formally proposed a ceasefire along current lines of control. This would effectively mean accepting the loss of Crimea and parts of Donbas. The international community watches closely. Our allies urge caution, but our people are weary of war."
 md2026_ru_ukr.2.o1:0 "Accept negotiations - we must end the bloodshed"
 md2026_ru_ukr.2.o2:0 "Reject - we will not surrender our land"

 md2026_ru_ukr.3.t:0 "Negotiating the Terms"
 md2026_ru_ukr.3.d:0 "Ukraine has agreed to negotiations. Now we must decide the terms. We can accept a demilitarized zone along the current front line, creating a frozen conflict, or we can push for full international recognition of our territorial claims, which risks collapsing the talks."
 md2026_ru_ukr.3.o1:0 "Accept a demilitarized zone - frozen conflict"
 md2026_ru_ukr.3.o2:0 "Demand full recognition of annexed territories"

 md2026_ru_ukr.4.t:0 "Ceasefire Established"
 md2026_ru_ukr.4.d:0 "A ceasefire has been established along the front lines. The guns have fallen silent, but the war is not truly over. Our territory remains divided, with Russian forces occupying our land. We must now decide our path forward - focus on rebuilding what we have, or prepare for the next fight."
 md2026_ru_ukr.4.o1:0 "Focus on reconstruction and healing"
 md2026_ru_ukr.4.o2:0 "This is only a pause - prepare for what comes next"

 md2026_ru_ukr.5.t:0 "Ukraine Rejects Ceasefire"
 md2026_ru_ukr.5.d:0 "Ukraine has rejected our ceasefire proposal. They believe their Western allies will continue to support them indefinitely, and that time is on their side. We must now decide how to respond to this rejection."
 md2026_ru_ukr.5.o1:0 "Escalate - they will regret this decision"
 md2026_ru_ukr.5.o2:0 "Maintain current strategy and wait"

 md2026_ru_ukr.6.t:0 "Negotiations Collapse"
 md2026_ru_ukr.6.d:0 "Russia's demand for full recognition of all annexed territories has proven too much. The negotiations have collapsed, and the war will continue. Our people are frustrated but defiant - we will not accept terms that legitimize the occupation of our land."
 md2026_ru_ukr.6.o1:0 "Rally the nation - we fight on!"
 md2026_ru_ukr.6.o2:0 "Appeal to the international community for support"

 md2026_ru_ukr.10.t:0 "US-Mediated Peace Proposal"
 md2026_ru_ukr.10.d:0 "The United States has proposed a peace settlement for the Ukraine conflict. President Trump's envoy presents terms that would freeze the conflict along current lines, with security guarantees for both sides. This could be an opportunity to end the war on favorable terms, or it could be seen as American interference."
 md2026_ru_ukr.10.o1:0 "Accept US mediation"
 md2026_ru_ukr.10.o2:0 "Reject American interference in our affairs"

 md2026_ru_ukr.11.t:0 "The American Peace Plan"
 md2026_ru_ukr.11.d:0 "Russia has accepted US mediation. The proposed settlement would require Ukraine to accept the loss of territories currently controlled by Russia, in exchange for security guarantees and a path to Western integration. This is a bitter pill, but it could end the war."
 md2026_ru_ukr.11.o1:0 "Accept the deal - end the war"
 md2026_ru_ukr.11.o2:0 "Reject - we will not surrender our territory"

 md2026_ru_ukr.12.t:0 "Peace Deal Achieved"
 md2026_ru_ukr.12.d:0 "The Ukraine peace deal has been signed. Both sides have made concessions, but the war is over. This is a major diplomatic victory for the United States and a demonstration that American leadership can still resolve the world's most dangerous conflicts."
 md2026_ru_ukr.12.o1:0 "A triumph of American diplomacy"

 md2026_ru_ukr.13.t:0 "Peace Efforts Have Failed"
 md2026_ru_ukr.13.d:0 "Our peace initiative for Ukraine has failed. One or both sides rejected the terms we proposed. The war will continue, and American credibility as a mediator has taken a hit. We must now reconsider our approach to the conflict."
 md2026_ru_ukr.13.o1:0 "We tried. The war goes on."

 md2026_ru_ukr_news.1.t:0 "Ceasefire in Ukraine!"
 md2026_ru_ukr_news.1.d:0 "After years of brutal fighting, a ceasefire has been declared between Russia and Ukraine. The guns have fallen silent along the front lines, though the underlying conflict remains unresolved. The international community cautiously welcomes the development."
 md2026_ru_ukr_news.1.o1:0 "A fragile peace..."

 md2026_ru_ukr_news.2.t:0 "Peace Talks Collapse"
 md2026_ru_ukr_news.2.d:0 "Negotiations between Russia and Ukraine have collapsed. The two sides could not agree on terms for ending the conflict. The war will continue, raising fears of further escalation and humanitarian suffering."
 md2026_ru_ukr_news.2.o1:0 "The war goes on..."

 md2026_ru_ukr_news.3.t:0 "US-Brokered Peace Deal Signed!"
 md2026_ru_ukr_news.3.d:0 "In a historic moment, Russia and Ukraine have signed a US-brokered peace agreement, ending years of devastating warfare. The deal freezes the conflict along current lines of control and establishes security guarantees for both parties."
 md2026_ru_ukr_news.3.o1:0 "A new chapter begins"

 ### EVENTS - TAIWAN ###
 md2026_taiwan.1.t:0 "The Taiwan Decision"
 md2026_taiwan.1.d:0 "Our military buildup opposite Taiwan is complete. The People's Liberation Army stands ready to enforce reunification by any means necessary. The moment of decision has arrived. We can impose a naval blockade to force Taipei's submission, launch a full amphibious invasion, or demonstrate our strength through military exercises while keeping our options open."
 md2026_taiwan.1.o1:0 "Impose a naval blockade on Taiwan"
 md2026_taiwan.1.o2:0 "Launch a full-scale invasion"
 md2026_taiwan.1.o3:0 "Military exercises only - demonstrate strength"

 md2026_taiwan.2.t:0 "China Blockades Taiwan"
 md2026_taiwan.2.d:0 "China has imposed a naval blockade on Taiwan, cutting off the island's maritime trade. This is an act of aggression that threatens a key ally and the global semiconductor supply chain. The US Navy is capable of breaking the blockade, but doing so risks direct military confrontation with China."
 md2026_taiwan.2.o1:0 "Send the Navy to break the blockade"
 md2026_taiwan.2.o2:0 "Diplomatic protest and sanctions only"
 md2026_taiwan.2.o3:0 "Accept the new status quo"

 md2026_taiwan.3.t:0 "China Blockades Taiwan"
 md2026_taiwan.3.d:0 "China has imposed a naval blockade on Taiwan, directly threatening regional stability and Japanese security interests. Our Self-Defense Forces could support American naval operations to break the blockade, but this would mark a historic shift in Japan's post-war defense posture."
 md2026_taiwan.3.o1:0 "Support US naval operations"
 md2026_taiwan.3.o2:0 "Maintain neutrality for now"

 md2026_taiwan.4.t:0 "China Invades Taiwan!"
 md2026_taiwan.4.d:0 "China has launched a full-scale amphibious invasion of Taiwan. This is the most dangerous military crisis since World War II. The Taiwan Relations Act obliges us to help Taiwan defend itself, but direct intervention means war with a nuclear-armed power."
 md2026_taiwan.4.o1:0 "Defend Taiwan - we go to war"
 md2026_taiwan.4.o2:0 "Provide weapons and support, but no direct intervention"
 md2026_taiwan.4.o3:0 "This is not our fight"

 md2026_taiwan.5.t:0 "China Invades Taiwan!"
 md2026_taiwan.5.d:0 "China has launched a full-scale invasion of Taiwan. The largest amphibious operation since D-Day threatens to reshape the entire Indo-Pacific order. Japan faces an existential question: do we intervene to defend a neighboring democracy, or protect ourselves by staying out?"
 md2026_taiwan.5.o1:0 "Join the defense of Taiwan"
 md2026_taiwan.5.o2:0 "Strengthen our defenses, but do not intervene"

 md2026_taiwan.6.t:0 "The Americans Challenge Our Blockade"
 md2026_taiwan.6.d:0 "The United States Navy has deployed carrier strike groups toward Taiwan, directly challenging our blockade. If we confront them, we risk a war between nuclear powers. If we back down, we lose face and our Taiwan strategy collapses."
 md2026_taiwan.6.o1:0 "Confront the US Navy"
 md2026_taiwan.6.o2:0 "Back down and lift the blockade"
 md2026_taiwan.6.o3:0 "Maintain blockade but avoid direct confrontation"

 md2026_taiwan_news.1.t:0 "China Blockades Taiwan!"
 md2026_taiwan_news.1.d:0 "The People's Republic of China has imposed a naval blockade around Taiwan, cutting off maritime trade to the island. Global markets plunge as the world's semiconductor supply chain faces disruption. International leaders call for restraint."
 md2026_taiwan_news.1.o1:0 "The world watches anxiously"

 md2026_taiwan_news.2.t:0 "China Invades Taiwan!"
 md2026_taiwan_news.2.d:0 "China has launched a full-scale amphibious invasion of Taiwan. Hundreds of thousands of PLA troops are crossing the Taiwan Strait in the largest military operation since World War II. The world holds its breath as the risk of global war rises dramatically."
 md2026_taiwan_news.2.o1:0 "God help us all"

 md2026_taiwan_news.3.t:0 "China Lifts Taiwan Blockade"
 md2026_taiwan_news.3.d:0 "Faced with American naval pressure, China has lifted its blockade of Taiwan. The crisis has passed for now, but tensions in the Taiwan Strait remain dangerously high. Global markets recover as shipping lanes reopen."
 md2026_taiwan_news.3.o1:0 "Crisis averted... for now"

 ### EVENTS - MIDDLE EAST ###
 md2026_mideast.1.t:0 "Rebuilding Syria"
 md2026_mideast.1.d:0 "The Assad regime has fallen, and Syria faces the monumental task of reconstruction. The new government must decide the direction of the country: pursue a secular, inclusive model that might attract Western support, adopt an Islamic governance framework reflecting the values of the revolution, or accept a fragmented power-sharing arrangement."
 md2026_mideast.1.o1:0 "Pursue secular reconstruction"
 md2026_mideast.1.o2:0 "Islamic-oriented governance"
 md2026_mideast.1.o3:0 "Accept power-sharing fragmentation"

 md2026_mideast.2.t:0 "International Aid Conference"
 md2026_mideast.2.d:0 "The international community is prepared to provide reconstruction aid to Syria, but different donors come with different conditions. Western nations demand democratic reforms and human rights guarantees, while regional Arab states offer support with fewer strings attached."
 md2026_mideast.2.o1:0 "Accept Western aid with conditions"
 md2026_mideast.2.o2:0 "Seek regional Arab support"

 md2026_mideast.10.t:0 "The Gaza Question"
 md2026_mideast.10.d:0 "The situation in Gaza demands a strategic decision. Our military operations have achieved their initial objectives, but the humanitarian and diplomatic costs continue to mount. We must chart a path forward that balances security needs with international pressure and regional diplomacy."
 md2026_mideast.10.o1:0 "Continue military operations"
 md2026_mideast.10.o2:0 "Pursue ceasefire and negotiations"
 md2026_mideast.10.o3:0 "Focus on expanding the Abraham Accords"

 md2026_mideast.20.t:0 "Nuclear Crossroads"
 md2026_mideast.20.d:0 "Our nuclear program has reached a critical juncture. We possess the technical capability to enrich uranium to weapons-grade levels within months. The Supreme Leader must decide: push toward nuclear breakout capability as the ultimate deterrent, negotiate a new agreement with the West to ease sanctions, or maintain strategic ambiguity."
 md2026_mideast.20.o1:0 "Accelerate enrichment - pursue breakout capability"
 md2026_mideast.20.o2:0 "Negotiate a new agreement with the West"
 md2026_mideast.20.o3:0 "Maintain strategic ambiguity"

 md2026_mideast.21.t:0 "Iran Approaches Nuclear Breakout"
 md2026_mideast.21.d:0 "Intelligence reports confirm that Iran is rapidly approaching nuclear weapons capability. This poses an existential threat to Israel. We must decide how to respond: launch a preemptive strike on Iranian nuclear facilities, pursue maximum diplomatic pressure through allies, or accelerate our own deterrence capabilities."
 md2026_mideast.21.o1:0 "Preemptive strike on nuclear facilities"
 md2026_mideast.21.o2:0 "Maximum diplomatic pressure through allies"
 md2026_mideast.21.o3:0 "Accelerate our own deterrence"

 md2026_mideast.22.t:0 "Iran Nuclear Crisis"
 md2026_mideast.22.d:0 "Iran is approaching nuclear weapons capability. This threatens the entire non-proliferation regime and regional stability. We must decide how to respond to this growing threat."
 md2026_mideast.22.o1:0 "Maximum pressure sanctions campaign"
 md2026_mideast.22.o2:0 "Support Israeli action if necessary"
 md2026_mideast.22.o3:0 "Accept Iran as a threshold nuclear state"

 md2026_mideast.30.t:0 "Yemen's Path Forward"
 md2026_mideast.30.d:0 "Yemen stands at a crossroads. The Houthi movement has consolidated control over much of the country, but international pressure and Saudi intervention have taken their toll. A national unity government could bring stability, or the Houthis could double down on their alliance with Iran."
 md2026_mideast.30.o1:0 "Form a national unity government"
 md2026_mideast.30.o2:0 "Continue under Houthi dominance"

 md2026_mideast_news.1.t:0 "Israel-Palestine Ceasefire"
 md2026_mideast_news.1.d:0 "Israel has agreed to a ceasefire in the Gaza conflict and opened negotiations for a broader peace settlement. The international community welcomes the development, though many remain skeptical about lasting peace."
 md2026_mideast_news.1.o1:0 "Hope for peace in the Middle East"

 md2026_mideast_news.2.t:0 "Iran Nuclear Crisis Escalates"
 md2026_mideast_news.2.d:0 "Iran has accelerated its nuclear enrichment program toward weapons-grade levels, sending shockwaves through the international community. Israel and the United States are weighing their response options as the non-proliferation regime faces its greatest test."
 md2026_mideast_news.2.o1:0 "The world watches with dread"

 ### EVENTS - ELECTIONS ###
 md2026_elections.1.t:0 "National Elections"
 md2026_elections.1.d:0 "The time has come for national elections. The campaign has been fiercely contested between traditional parties and new political movements. Voters will decide the direction of the country for the coming years."
 md2026_elections.1.o1:0 "Center-right coalition wins"
 md2026_elections.1.o2:0 "Center-left coalition wins"
 md2026_elections.1.o3:0 "Populist surge shakes the establishment"
 md2026_elections.1.o4:0 "The incumbent retains power"

 md2026_elections.10.t:0 "2028 Midterm Elections"
 md2026_elections.10.d:0 "The 2028 midterm elections will determine the balance of power in Congress. Trump's policies have energized both his supporters and opponents. The outcome will shape the remainder of this presidential term."
 md2026_elections.10.o1:0 "Republicans hold Congress"
 md2026_elections.10.o2:0 "Democrats win back Congress"
 md2026_elections.10.o3:0 "Split Congress - legislative gridlock"

 md2026_elections.20.t:0 "French Presidential Election 2027"
 md2026_elections.20.d:0 "France goes to the polls to choose its next president. Macron's term ends, and the race is wide open. The center, the right under Marine Le Pen's Rassemblement National, and the left-wing coalition all vie for the Elysée Palace."
 md2026_elections.20.o1:0 "Center coalition maintains power"
 md2026_elections.20.o2:0 "Right-wing victory - Le Pen's moment"
 md2026_elections.20.o3:0 "Left coalition wins the presidency"

 ### EVENTS - BRICS ###
 md2026_brics.1.t:0 "BRICS+ Expansion Summit"
 md2026_brics.1.d:0 "The BRICS+ alliance holds its annual summit. As host, Russia pushes to expand the bloc's membership and influence as a counterweight to Western-dominated institutions. Several nations have expressed interest in joining, which could reshape the global economic order."
 md2026_brics.1.o1:0 "Push for rapid expansion"
 md2026_brics.1.o2:0 "Focus on economic cooperation among existing members"

 md2026_brics.2.t:0 "BRICS+ Membership Offer"
 md2026_brics.2.d:0 "Turkey has been invited to join BRICS+. This would represent a historic shift for a NATO member state, potentially straining Western alliances. The economic opportunities are significant, but the geopolitical implications are profound."
 md2026_brics.2.o1:0 "Join BRICS+"
 md2026_brics.2.o2:0 "Decline - stay focused on NATO and EU"
 md2026_brics.2.o3:0 "Observer status only"

 md2026_brics.3.t:0 "India's Role in BRICS+"
 md2026_brics.3.d:0 "The expanded BRICS+ alliance offers India an opportunity to shape the emerging multipolar world order. As the world's most populous nation, India can take a leading role in the economic agenda or balance between BRICS+ and Western alignment."
 md2026_brics.3.o1:0 "Lead the economic agenda"
 md2026_brics.3.o2:0 "Balance between BRICS+ and Western alignment"

 md2026_brics.10.t:0 "De-Dollarization Initiative"
 md2026_brics.10.d:0 "China proposes a bold initiative: a BRICS+ common currency or settlement mechanism that would reduce dependence on the US dollar in international trade. This could fundamentally reshape the global financial system."
 md2026_brics.10.o1:0 "Launch BRICS+ currency initiative"
 md2026_brics.10.o2:0 "Proceed with bilateral currency swaps instead"

 md2026_brics.11.t:0 "The De-Dollarization Challenge"
 md2026_brics.11.d:0 "China and Russia are promoting alternatives to the US dollar in international trade. While the dollar's dominance is not immediately threatened, the trend is concerning. We must respond to protect American economic interests."
 md2026_brics.11.o1:0 "Economic countermeasures and sanctions"
 md2026_brics.11.o2:0 "Strengthen the dollar through domestic policy"

 md2026_brics_news.1.t:0 "BRICS+ Expands!"
 md2026_brics_news.1.d:0 "The BRICS+ alliance has announced a major expansion, welcoming new member states. The bloc now represents a significant share of global GDP and population, positioning itself as an alternative to Western-led institutions."
 md2026_brics_news.1.o1:0 "A new world order takes shape"

 md2026_brics_news.2.t:0 "De-Dollarization Begins"
 md2026_brics_news.2.d:0 "BRICS+ nations have launched a formal initiative to reduce dependence on the US dollar in international trade. The global financial system faces its most significant challenge since the end of Bretton Woods."
 md2026_brics_news.2.o1:0 "The financial world will never be the same"

 ### EVENTS - NATO-RUSSIA ###
 md2026_nato_russia.1.t:0 "Border Incident"
 md2026_nato_russia.1.d:0 "A serious incident has occurred on our border with Russia. Russian military aircraft violated our airspace, and there was a brief confrontation between border forces. While no shots were fired, the situation is extremely tense. We must decide how to respond."
 md2026_nato_russia.1.o1:0 "Invoke Article 5 consultations"
 md2026_nato_russia.1.o2:0 "Handle it bilaterally with Russia"
 md2026_nato_russia.1.o3:0 "Increase border patrols and de-escalate"

 md2026_nato_russia.2.t:0 "NATO Article 5 Consultations"
 md2026_nato_russia.2.d:0 "A NATO ally has invoked Article 5 consultations following a border incident with Russia. As the alliance's leading power, we must decide how to respond. Deploying additional forces to the Eastern flank would deter Russia but risks escalation."
 md2026_nato_russia.2.o1:0 "Deploy additional forces to the Eastern flank"
 md2026_nato_russia.2.o2:0 "Issue a diplomatic warning to Russia"
 md2026_nato_russia.2.o3:0 "Downplay the incident"

 md2026_nato_russia.3.t:0 "NATO Deploys to Our Borders"
 md2026_nato_russia.3.d:0 "NATO has deployed additional forces to our western borders in response to the border incident. This military buildup represents a direct threat to Russian security. We must decide how to respond to this provocation."
 md2026_nato_russia.3.o1:0 "Match NATO buildup with our own forces"
 md2026_nato_russia.3.o2:0 "Nuclear saber-rattling"
 md2026_nato_russia.3.o3:0 "Propose de-escalation talks"

 md2026_nato_russia.4.t:0 "Bilateral Incident Discussion"
 md2026_nato_russia.4.d:0 "The affected NATO member has raised the border incident through bilateral channels rather than invoking Article 5. They are seeking an explanation and assurances that such incidents will not recur."
 md2026_nato_russia.4.o1:0 "Deny any involvement"
 md2026_nato_russia.4.o2:0 "Apologize and cooperate"

 md2026_nato_russia.10.t:0 "Major Cyber Attack"
 md2026_nato_russia.10.d:0 "Our critical infrastructure has been hit by a sophisticated cyber attack attributed to Russian state-sponsored hackers. Power grids, financial systems, and government networks have been compromised. This is an act of hybrid warfare that demands a response."
 md2026_nato_russia.10.o1:0 "Retaliate with cyber counter-operations"
 md2026_nato_russia.10.o2:0 "Strengthen cyber defenses"
 md2026_nato_russia.10.o3:0 "Public attribution and international condemnation"

 md2026_nato_russia_news.1.t:0 "NATO-Russia Border Incident"
 md2026_nato_russia_news.1.d:0 "A serious border incident between a NATO member state and Russia has raised tensions to their highest level since the Cold War. The alliance is consulting on its response as the world watches nervously."
 md2026_nato_russia_news.1.o1:0 "Tensions rise in Europe"

 md2026_nato_russia_news.2.t:0 "Major Cyber Attack Hits NATO Nation"
 md2026_nato_russia_news.2.d:0 "A devastating cyber attack has struck critical infrastructure in a NATO member state. Intelligence agencies attribute the attack to Russian state-sponsored hackers. The attack highlights the growing threat of hybrid warfare."
 md2026_nato_russia_news.2.o1:0 "The new battlefield is digital"

 ### EVENTS - MIGRATION ###
 md2026_migration.1.t:0 "Migration Surge"
 md2026_migration.1.d:0 "A new wave of migration from Africa and the Middle East is testing our borders and social systems. Thousands of people arrive daily, fleeing conflict, poverty, and climate change. Our response will define our country's identity and political direction for years to come."
 md2026_migration.1.o1:0 "Open borders - accept refugees"
 md2026_migration.1.o2:0 "Controlled immigration with quotas"
 md2026_migration.1.o3:0 "Close the borders"

 md2026_migration.2.t:0 "EU Migration Pact Crisis"
 md2026_migration.2.d:0 "The migration crisis has exposed deep divisions within the European Union. As the bloc's largest economy, Germany must decide whether to push for EU-wide burden sharing through mandatory quotas or accept that each nation will handle migration its own way."
 md2026_migration.2.o1:0 "Push for EU-wide burden sharing"
 md2026_migration.2.o2:0 "Accept national solutions"

 md2026_migration.3.t:0 "EU Migration Burden Sharing"
 md2026_migration.3.d:0 "Germany is pushing for mandatory EU migration quotas. Our country must decide whether to accept these quotas, offer financial contributions instead of taking in migrants, or refuse entirely in defense of national sovereignty."
 md2026_migration.3.o1:0 "Accept EU migration quotas"
 md2026_migration.3.o2:0 "Pay financial contribution instead"
 md2026_migration.3.o3:0 "Refuse entirely - sovereignty first"

 md2026_migration.10.t:0 "Populist Backlash"
 md2026_migration.10.d:0 "Our open border policy has triggered a populist backlash. Anti-immigration parties surge in polls, and public sentiment is turning against the government's migration policy. We must decide how to respond to this growing political pressure."
 md2026_migration.10.o1:0 "Address populist concerns with reforms"
 md2026_migration.10.o2:0 "Double down on progressive migration policy"
  md2026_migration.10.o3:0 "Shift right on immigration"

 ### FOCUS TREES - INDIA (RAJ) ###
 MD2026_RAJ_indias_century:0 "India's Century"
 MD2026_RAJ_indias_century_desc:0 "The 21st century belongs to India. With the world's largest population and a booming economy, it is time to claim our place on the world stage."
 MD2026_RAJ_make_in_india:0 "Make in India 2.0"
 MD2026_RAJ_make_in_india_desc:0 "Expand domestic manufacturing capacity and reduce dependence on foreign imports through massive industrial investment."
 MD2026_RAJ_digital_india:0 "Digital India Expansion"
 MD2026_RAJ_digital_india_desc:0 "Accelerate digital infrastructure development and build India's tech sector into a global powerhouse."
 MD2026_RAJ_semiconductor_push:0 "Semiconductor Push"
 MD2026_RAJ_semiconductor_push_desc:0 "Invest heavily in domestic semiconductor fabrication to reduce dependence on foreign chip supplies."
 MD2026_RAJ_strategic_autonomy:0 "Strategic Autonomy"
 MD2026_RAJ_strategic_autonomy_desc:0 "India charts its own course in the multipolar world, balancing relationships with all major powers."
 MD2026_RAJ_quad_deepening:0 "Deepen the Quad"
 MD2026_RAJ_quad_deepening_desc:0 "Strengthen the Quadrilateral Security Dialogue with the US, Japan, and Australia to counter Chinese influence in the Indo-Pacific."
 MD2026_RAJ_brics_balance:0 "BRICS+ Balance"
 MD2026_RAJ_brics_balance_desc:0 "Leverage India's position in BRICS+ while maintaining independence from Chinese and Russian agendas."
 MD2026_RAJ_china_border:0 "Border Fortification"
 MD2026_RAJ_china_border_desc:0 "Strengthen defenses along the Line of Actual Control after the Galwan clashes. India will not cede an inch."
 MD2026_RAJ_military_modernization:0 "Military Modernization"
 MD2026_RAJ_military_modernization_desc:0 "Transform India's armed forces with indigenous weapons systems and modern doctrine."
 MD2026_RAJ_space_power:0 "Space Superpower"
 MD2026_RAJ_space_power_desc:0 "Build on ISRO's successes — from Chandrayaan to Gaganyaan — to establish India as a leading space power."
 MD2026_RAJ_defense_production:0 "Defense Production"
 MD2026_RAJ_defense_production_desc:0 "Establish India as a global defense manufacturing hub, producing indigenous tanks, aircraft, and naval vessels at scale."
 MD2026_RAJ_green_energy:0 "Green Energy Revolution"
 MD2026_RAJ_green_energy_desc:0 "Invest in solar, wind, and hydrogen energy to power India's growth while reducing carbon dependency."
 MD2026_RAJ_multi_alignment:0 "Multi-Alignment Doctrine"
 MD2026_RAJ_multi_alignment_desc:0 "Formalize India's multi-alignment strategy, maintaining strategic relationships with all major powers on India's own terms."
 MD2026_RAJ_lac_fortification:0 "LAC Fortification"
 MD2026_RAJ_lac_fortification_desc:0 "Fortify the Line of Actual Control with bunkers, roads, and forward bases to prevent Chinese incursions."
 MD2026_RAJ_mountain_strike:0 "Mountain Strike Corps"
 MD2026_RAJ_mountain_strike_desc:0 "Raise and equip dedicated mountain strike corps capable of offensive operations in the Himalayas."
 MD2026_RAJ_agni_deterrent:0 "Agni Deterrent"
 MD2026_RAJ_agni_deterrent_desc:0 "Expand India's nuclear deterrent with advanced Agni-series missiles capable of reaching any adversary."
 MD2026_RAJ_blue_water_navy:0 "Blue Water Navy"
 MD2026_RAJ_blue_water_navy_desc:0 "Transform the Indian Navy into a blue-water force capable of projecting power across the Indian Ocean and beyond."
 MD2026_RAJ_carrier_program:0 "Carrier Program"
 MD2026_RAJ_carrier_program_desc:0 "Accelerate India's indigenous aircraft carrier program to field a multi-carrier fleet for power projection."
 MD2026_RAJ_submarine_fleet:0 "Submarine Fleet"
 MD2026_RAJ_submarine_fleet_desc:0 "Expand India's submarine fleet with nuclear and conventional boats to secure underwater dominance in the Indian Ocean."
 MD2026_RAJ_indian_ocean_dominance:0 "Indian Ocean Dominance"
 MD2026_RAJ_indian_ocean_dominance_desc:0 "Establish unchallenged Indian naval supremacy across the Indian Ocean, from the Strait of Hormuz to the Malacca Strait."
 MD2026_RAJ_andaman_command:0 "Andaman & Nicobar Command"
 MD2026_RAJ_andaman_command_desc:0 "Upgrade the Andaman and Nicobar Islands into a major forward naval base controlling the eastern approaches to the Indian Ocean."
 MD2026_RAJ_isro_expansion:0 "ISRO Expansion"
 MD2026_RAJ_isro_expansion_desc:0 "Expand ISRO's capabilities with heavier launch vehicles and a permanent human presence in space."
 MD2026_RAJ_ai_hub:0 "AI Research Hub"
