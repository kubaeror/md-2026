 md2026_pak_political_instability:0 "Political Instability"
 md2026_pak_political_instability_desc:0 "Pakistan faces chronic political crises, with civilian and military power centers in constant tension."
 md2026_pak_nuclear_deterrent:0 "Nuclear Deterrent"
 md2026_pak_nuclear_deterrent_desc:0 "Pakistan's nuclear arsenal provides a strategic deterrent against larger adversaries."
 md2026_tai_silicon_shield:0 "Silicon Shield"
 md2026_tai_silicon_shield_desc:0 "Taiwan's dominance in semiconductor manufacturing makes it an indispensable part of the global tech supply chain."
 md2026_tai_china_threat:0 "Chinese Threat"
 md2026_tai_china_threat_desc:0 "The constant threat of Chinese military action keeps Taiwan's society on a war footing."
 md2026_ast_aukus_partner:0 "AUKUS Partner"
 md2026_ast_aukus_partner_desc:0 "The AUKUS security pact with the US and UK provides Australia access to advanced military technology."
 md2026_can_nato_arctic:0 "NATO Arctic Defender"
 md2026_can_nato_arctic_desc:0 "Canada's strategic position in the Arctic and commitment to NATO's northern flank enhance its defense posture."
 md2026_spr_territorial_tensions:0 "Territorial Tensions"
 md2026_spr_territorial_tensions_desc:0 "Ongoing separatist movements in Catalonia and the Basque Country strain Spanish national unity."
 md2026_fin_new_nato_member:0 "New NATO Member"
 md2026_fin_new_nato_member_desc:0 "Finland's accession to NATO in 2023 ended decades of neutrality, bolstering European defense with a battle-ready military."
 md2026_swe_new_nato_member:0 "New NATO Member"
 md2026_swe_new_nato_member_desc:0 "Sweden's NATO membership strengthens the alliance's northern dimension and Baltic Sea defense."
 md2026_gre_economic_recovery:0 "Economic Recovery"
 md2026_gre_economic_recovery_desc:0 "Greece is gradually recovering from its prolonged debt crisis, with improving economic indicators."
 md2026_rom_frontline_nato:0 "Frontline NATO State"
 md2026_rom_frontline_nato_desc:0 "Romania's position on NATO's southeastern flank makes it critical for Black Sea security and defense."
 md2026_brm_civil_war_chaos:0 "Civil War Chaos"
 md2026_brm_civil_war_chaos_desc:0 "Myanmar's ongoing civil war has devastated the economy and fragmented the country between military and resistance forces."
 md2026_syr_post_assad:0 "Post-Assad Transition"
 md2026_syr_post_assad_desc:0 "The fall of the Assad regime has left Syria in a fragile transition period with uncertain governance."
 md2026_saf_load_shedding:0 "Energy Crisis"
 md2026_saf_load_shedding_desc:0 "South Africa's chronic power shortages and infrastructure decay are crippling industrial output."
 md2026_kaz_multi_vector_diplomacy:0 "Multi-Vector Diplomacy"
 md2026_kaz_multi_vector_diplomacy_desc:0 "Kazakhstan balances relations between Russia, China, and the West, leveraging its strategic position and resources."
 md2026_blr_russian_satellite:0 "Russian Satellite State"
 md2026_blr_russian_satellite_desc:0 "Belarus functions as a satellite state of Russia, with limited sovereignty in foreign and military policy."
 md2026_geo_eu_aspirations:0 "EU Aspirations"
 md2026_geo_eu_aspirations_desc:0 "Georgia's candidacy for EU membership drives democratic reform but creates tension with Russia."

 ### EVENTS - CLIMATE & ENERGY CRISIS ###
 md2026_climate.1.t:0 "Record Heat Wave"
 md2026_climate.1.d:0 "An unprecedented heat wave is sweeping across the nation, shattering temperature records and straining infrastructure to breaking point. Wildfires rage across parched landscapes, power grids buckle under record cooling demand, and agricultural losses mount daily. Scientists warn this is a preview of the new climate reality. We must decide how to respond."
 md2026_climate.1.o1:0 "Declare a climate emergency"
 md2026_climate.1.o2:0 "Invest in climate adaptation infrastructure"

 md2026_climate.2.t:0 "Energy Transition Crossroads"
 md2026_climate.2.d:0 "The global energy transition has reached a critical juncture. Fossil fuel prices remain volatile, renewable costs continue to fall, and our industrial base demands reliable power. We stand at a crossroads: accelerate the transition to green energy at significant upfront cost, or maintain a pragmatic energy mix that keeps fossil fuels in the picture for decades to come."
 md2026_climate.2.o1:0 "Accelerate the green transition"
 md2026_climate.2.o2:0 "Maintain a pragmatic energy mix"

 md2026_climate.3.t:0 "Critical Mineral Race"
 md2026_climate.3.d:0 "The race for critical minerals — lithium, cobalt, rare earth elements — has intensified dramatically. These materials are essential for batteries, electronics, and defense systems. Our competitors are aggressively securing supply chains across Africa and South America. We must act to ensure our access to these strategic resources."
 md2026_climate.3.o1:0 "Secure mineral supply chains through partnerships"
 md2026_climate.3.o2:0 "Invest in recycling and synthetic alternatives"

 md2026_climate.10.t:0 "Catastrophic Flooding"
 md2026_climate.10.d:0 "Devastating monsoon floods have inundated vast areas of the country. Rivers have burst their banks, displacing millions and destroying critical infrastructure. Cropland is submerged, threatening food security. The scale of destruction requires an urgent national response."
 md2026_climate.10.o1:0 "Appeal for international humanitarian aid"
 md2026_climate.10.o2:0 "Handle disaster response domestically"

 md2026_climate_news.1.t:0 "Record Heat Wave Devastates Region"
 md2026_climate_news.1.d:0 "A record-breaking heat wave has struck multiple countries, causing widespread wildfires, infrastructure damage, and heat-related casualties. Scientists attribute the extreme temperatures to accelerating climate change and call for urgent action."
 md2026_climate_news.1.o1:0 "The planet is burning"

 md2026_climate_news.2.t:0 "Catastrophic Floods in Asia"
 md2026_climate_news.2.d:0 "Unprecedented monsoon flooding has devastated large parts of South and Southeast Asia, displacing millions and destroying critical infrastructure. International aid organizations mobilize as the humanitarian crisis deepens."
 md2026_climate_news.2.o1:0 "A humanitarian catastrophe"

 ### EVENTS - AI & TECHNOLOGY REVOLUTION ###
 md2026_tech.1.t:0 "AI Breakthrough"
 md2026_tech.1.d:0 "Our research institutions have achieved a major breakthrough in artificial intelligence. A new large-scale AI system demonstrates capabilities far exceeding current models, with profound implications for both civilian and military applications. This technology could revolutionize our economy and defense — but the path we choose will shape its impact."
 md2026_tech.1.o1:0 "Prioritize military AI applications"
 md2026_tech.1.o2:0 "Focus on civilian economic applications"

 md2026_tech.2.t:0 "Major Cyber Attack"
 md2026_tech.2.d:0 "A sophisticated state-sponsored cyber attack has penetrated our critical infrastructure. Power grids, financial networks, and government databases have been compromised. Intelligence agencies have traced the attack to hostile state actors. The scale and sophistication of the intrusion demands a decisive response."
 md2026_tech.2.o1:0 "Publicly attribute and retaliate"
 md2026_tech.2.o2:0 "Strengthen cyber defenses quietly"

 md2026_tech.3.t:0 "Automation & Job Displacement"
 md2026_tech.3.d:0 "The rapid advance of AI and automation is reshaping the labor market. Millions of jobs in manufacturing, services, and transportation face elimination as intelligent systems become cheaper and more capable. Unemployment rises in affected sectors, and public anxiety grows. We must decide how to navigate this economic transformation."
 md2026_tech.3.o1:0 "Launch universal retraining programs"
 md2026_tech.3.o2:0 "Let the market adapt naturally"
 md2026_tech.3.o3:0 "Regulate AI deployment to protect jobs"

 md2026_tech.10.t:0 "Quantum Computing Milestone"
 md2026_tech.10.d:0 "Our scientists have achieved a significant quantum computing milestone, demonstrating quantum advantage over classical computers in practical applications. This breakthrough has profound implications for cryptography, drug discovery, materials science, and military intelligence. The race to harness quantum power is on."
 md2026_tech.10.o1:0 "Prioritize military applications — code-breaking"
 md2026_tech.10.o2:0 "Focus on scientific research applications"

 md2026_tech_news.1.t:0 "AI Breakthrough Shakes the World"
 md2026_tech_news.1.d:0 "A major breakthrough in artificial intelligence has been announced, with a new system demonstrating unprecedented capabilities. Experts debate whether this marks the beginning of an AI revolution that will reshape the global economy and military balance of power."
 md2026_tech_news.1.o1:0 "The age of AI is here"

 md2026_tech_news.2.t:0 "Massive Cyber Attack Hits Major Power"
 md2026_tech_news.2.d:0 "A devastating cyber attack has struck a major nation's critical infrastructure, disrupting power grids and financial systems. Intelligence agencies attribute the attack to state-sponsored hackers, marking a new escalation in the invisible war waged across digital networks."
 md2026_tech_news.2.o1:0 "The digital battlefield expands"

 ### EVENTS - DEMOGRAPHICS & POPULATION ###
 md2026_demographics.1.t:0 "Aging Population Crisis"
 md2026_demographics.1.d:0 "Our nation faces a demographic time bomb. The population is aging rapidly, with the working-age cohort shrinking year by year. Pension systems strain under mounting costs, healthcare demand surges, and military recruitment pools dry up. Without action, economic decline is inevitable. We must choose our path forward."
 md2026_demographics.1.o1:0 "Open immigration reform"
 md2026_demographics.1.o2:0 "Invest in automation and robotics"
 md2026_demographics.1.o3:0 "Launch pro-natalist policies"

 md2026_demographics.2.t:0 "Youth Bulge Instability"
 md2026_demographics.2.d:0 "A massive youth population faces bleak employment prospects. With over half the population under 30 and unemployment rampant among the young, frustration simmers in cities and towns. This demographic powder keg threatens social stability and the regime's legitimacy. We must find a way to channel this energy."
 md2026_demographics.2.o1:0 "Launch massive jobs programs"
 md2026_demographics.2.o2:0 "Military recruitment drive"
 md2026_demographics.2.o3:0 "Encourage emigration to ease pressure"

 md2026_demographics.3.t:0 "Brain Drain"
 md2026_demographics.3.d:0 "Our most talented citizens are leaving in droves. Skilled professionals, scientists, and entrepreneurs emigrate to wealthier nations offering better opportunities. This brain drain erodes our human capital and slows economic development. We must find ways to retain talent or leverage our diaspora."
 md2026_demographics.3.o1:0 "Retention incentives and salary reform"
 md2026_demographics.3.o2:0 "Diaspora engagement program"
 md2026_demographics.3.o3:0 "Accept the reality and adapt"

 md2026_demographics.10.t:0 "Urbanization Pressure"
 md2026_demographics.10.d:0 "Our megacities are bursting at the seams. Rapid urbanization strains infrastructure beyond capacity — water systems fail, traffic paralyzes streets, slums expand, and air quality deteriorates. The growth is unstoppable, but how we manage it will determine whether our cities become engines of prosperity or cauldrons of chaos."
 md2026_demographics.10.o1:0 "Smart city investments"
 md2026_demographics.10.o2:0 "Decentralization and regional development"

 md2026_demographics_news.1.t:0 "Aging Crisis Grips Developed Nations"
 md2026_demographics_news.1.d:0 "Multiple developed nations face a deepening demographic crisis as birth rates plummet and populations age rapidly. Economists warn of severe long-term consequences for pension systems, healthcare, and economic growth across the industrialized world."
 md2026_demographics_news.1.o1:0 "A slow-motion crisis"

 ### EVENTS - SPACE RACE ###
 md2026_space.1.t:0 "The New Space Race"
 md2026_space.1.d:0 "A new space race has begun. Our nation stands at the threshold of a historic achievement — returning humans to the Moon and establishing a permanent presence beyond Earth. The competition is fierce, with rival powers accelerating their own programs. This is not just about science; it is about prestige, resources, and military advantage in the ultimate high ground."
 md2026_space.1.o1:0 "Accelerate the manned lunar program"
 md2026_space.1.o2:0 "Focus on commercial space partnerships"

 md2026_space.2.t:0 "Anti-Satellite Test Incident"
 md2026_space.2.d:0 "A rival power has conducted a destructive anti-satellite weapons test, destroying one of its own satellites and creating a massive debris field in low Earth orbit. The debris threatens our satellites, the International Space Station, and commercial space operations. This provocative act demands a response."
 md2026_space.2.o1:0 "Condemn and propose space arms control"
 md2026_space.2.o2:0 "Accelerate our own ASAT capability"

 md2026_space.3.t:0 "Commercial Space Boom"
 md2026_space.3.d:0 "Private space companies are revolutionizing access to orbit. Reusable rockets have slashed launch costs, satellite constellations promise global internet coverage, and space tourism is becoming a reality. This boom presents an opportunity to leverage private innovation for national strategic advantage."
 md2026_space.3.o1:0 "Public-private space partnerships"
 md2026_space.3.o2:0 "Military space contracts"

 md2026_space.10.t:0 "Satellite Constellation Race"
 md2026_space.10.d:0 "The race to dominate low Earth orbit with massive satellite constellations has intensified. These networks provide global communications, real-time surveillance, and precision navigation — capabilities with enormous civilian and military value. Our adversaries are deploying their own constellations at breakneck speed."
 md2026_space.10.o1:0 "Deploy military satellite constellation"
 md2026_space.10.o2:0 "Invest in civilian broadband constellation"

 md2026_space_news.1.t:0 "New Space Race Begins!"
 md2026_space_news.1.d:0 "A major power has announced an accelerated program to return humans to the Moon and establish a permanent lunar base. The announcement signals the beginning of a new space race with profound implications for science, technology, and military dominance."
 md2026_space_news.1.o1:0 "To the Moon and beyond"

 md2026_space_news.2.t:0 "Anti-Satellite Test Creates Space Debris Crisis"
 md2026_space_news.2.d:0 "A destructive anti-satellite weapons test has created thousands of pieces of space debris in low Earth orbit, threatening satellites and crewed spacecraft. The international community condemns the reckless act as space becomes an increasingly contested domain."
 md2026_space_news.2.o1:0 "Space is becoming a battlefield"

 ### DECISION CATEGORIES - Internal Politics & Nuclear ###
 md2026_internal_politics_category:0 "Internal Politics"
 md2026_internal_politics_category_desc:0 "Domestic political decisions reflecting the internal struggles, policy choices, and strategic programs of major powers in 2026."
 md2026_nuclear_category:0 "Nuclear Programs"
 md2026_nuclear_category_desc:0 "Nuclear weapons development, modernization, and strategic posturing decisions available to nuclear-armed states and aspiring nuclear powers."

 ### EVENTS - SYSTEM ###
 md2026_system.1.t:0 "The World in 2026"
 md2026_system.1.d:0 "January 1st, 2026. The world stands at a crossroads. The war in Ukraine grinds into its fourth year. China flexes its military muscle across the Taiwan Strait. The Middle East remains a tinderbox. Climate change accelerates. AI reshapes economies. The old order is fracturing — and a new one has yet to take shape. The decisions made in the coming years will determine the fate of nations."
 md2026_system.1.o1:0 "The free world will prevail."
 md2026_system.1.o2:0 "A new multipolar order is emerging."
 md2026_system.1.o3:0 "We must chart our own course."
 md2026_system.2.t:0 "2027: A Year in Review"
 md2026_system.2.d:0 "One year has passed since our scenario began. The world has changed — alliances have shifted, conflicts have evolved, and the balance of power continues to transform. What will the next year bring?"
 md2026_system.2.o1:0 "Onward."
 md2026_system.3.t:0 "Global Economic Turbulence"
 md2026_system.3.d:0 "A wave of economic instability has hit our economy. Supply chain disruptions, rising debt, and geopolitical uncertainty have combined to create serious headwinds. Our economists are debating the best path forward — austerity to stabilize finances, or stimulus spending to maintain growth."
 md2026_system.3.o1:0 "Implement austerity measures"
 md2026_system.3.o2:0 "Stimulus spending"

 ### EVENTS - NATO ARTICLE 5 ###
 md2026_nato_article5.1.t:0 "NATO Under Attack!"
 md2026_nato_article5.1.d:0 "A NATO ally has been attacked by a hostile power. As the leader of the Atlantic Alliance, the United States must decide whether to invoke Article 5 — the collective defense clause that declares an attack on one member as an attack on all. The decision will define the future of the alliance."
 md2026_nato_article5.1.o1:0 "Invoke Article 5 — collective defense!"
 md2026_nato_article5.1.o2:0 "Condemn the attack but do not invoke Article 5"
 md2026_nato_article5.2.t:0 "Article 5 Invoked: Rally to the Alliance"
 md2026_nato_article5.2.d:0 "The United States has invoked NATO Article 5. As a member of the Atlantic Alliance, we are called upon to fulfill our treaty obligations and commit to the collective defense of our ally. The question is how far we are willing to go."
 md2026_nato_article5.2.o1:0 "Full commitment — mobilize our forces"
 md2026_nato_article5.2.o2:0 "Limited support only"
 md2026_nato_article5.2.o3:0 "Refuse to participate"
 md2026_nato_article5.3.t:0 "Article 5 Stand Down"
 md2026_nato_article5.3.d:0 "The conflict that triggered NATO Article 5 has ended. With peace restored, the alliance can stand down from its heightened state of readiness. Our forces served with distinction during this crisis."
 md2026_nato_article5.3.o1:0 "Stand down and return to peacetime readiness"

 ### EVENTS - ELECTIONS (New Countries) ###
 md2026_elections.30.t:0 "Germany: 2029 Federal Election"
 md2026_elections.30.d:0 "Germany's federal election is upon us. The country faces critical choices about its future direction — continued centrist governance under the CDU, a return to social democracy, a controversial shift toward the nationalist AfD, or a Green-led progressive coalition. The outcome will shape Europe's largest economy and its role in the EU and NATO."
 md2026_elections.30.o1:0 "CDU/CSU victory — Friedrich Merz continues"
 md2026_elections.30.o2:0 "SPD victory — Boris Pistorius"
 md2026_elections.30.o3:0 "AfD surge — Alice Weidel"
 md2026_elections.30.o4:0 "Green-led coalition — Robert Habeck"

 md2026_elections.40.t:0 "United Kingdom: 2029 General Election"
 md2026_elections.40.d:0 "The United Kingdom goes to the polls. After years of political turbulence, Brexit aftershocks, and economic challenges, voters must choose between Labour continuity under Starmer, a Conservative revival under Badenoch, or the populist surge of Reform UK led by Nigel Farage."
 md2026_elections.40.o1:0 "Labour re-elected — Keir Starmer continues"
 md2026_elections.40.o2:0 "Conservative victory — Kemi Badenoch"
 md2026_elections.40.o3:0 "Reform UK breakthrough — Nigel Farage"

 md2026_elections.50.t:0 "Japan: 2028 General Election"
 md2026_elections.50.d:0 "Japan holds a general election amid rising regional tensions. The long-dominant LDP seeks to retain power while navigating the delicate balance between economic reform, military modernization, and the growing threat from China and North Korea. The opposition offers an alternative vision for Japan's future."
 md2026_elections.50.o1:0 "LDP retains power — Shigeru Ishiba continues"
 md2026_elections.50.o2:0 "Opposition coalition wins — Yoshihiko Noda"
 md2026_elections.50.o3:0 "LDP hawks prevail — Takayuki Kobayashi"

 md2026_elections.60.t:0 "South Korea: 2027 Presidential Election"
 md2026_elections.60.d:0 "South Korea holds a pivotal presidential election in the aftermath of the 2024 martial law crisis that shook the nation's democratic foundations. The country must choose a leader who can heal political divisions, manage the North Korean threat, and restore institutional stability."
 md2026_elections.60.o1:0 "Liberal victory — Lee Jae-myung"
 md2026_elections.60.o2:0 "Conservative restoration — Han Dong-hoon"
 md2026_elections.60.o3:0 "Political crisis deepens — no clear winner"

 md2026_elections.70.t:0 "Brazil: 2030 Presidential Election"
 md2026_elections.70.d:0 "Brazil's presidential election arrives as the country navigates between competing visions: continued left-wing governance and social programs, a return to right-wing populism, or a centrist third way. The Amazon, BRICS membership, and economic inequality dominate the campaign."
 md2026_elections.70.o1:0 "PT continuity — Fernando Haddad"
 md2026_elections.70.o2:0 "Bolsonaro faction returns — Tarcísio de Freitas"
 md2026_elections.70.o3:0 "Centrist third way — Simone Tebet"

 md2026_elections.80.t:0 "Poland: 2027 Parliamentary Election"
 md2026_elections.80.d:0 "Poland goes to the polls with its security, EU relations, and democratic institutions at stake. The Tusk coalition seeks re-election on a platform of EU integration and democratic restoration, while PiS aims to return to power with its nationalist vision. A new center-right alternative also emerges."
 md2026_elections.80.o1:0 "Tusk coalition re-elected — Donald Tusk"
 md2026_elections.80.o2:0 "PiS returns to power — Mateusz Morawiecki"
 md2026_elections.80.o3:0 "New center-right — Rafał Trzaskowski"

 md2026_elections.90.t:0 "Italy: 2028 General Election"
 md2026_elections.90.d:0 "Italy's general election pits the ruling right-wing coalition under Giorgia Meloni against a reinvigorated center-left led by Elly Schlein and the ever-unpredictable Five Star Movement under Giuseppe Conte. Italy's role in the EU, its migration policy, and economic reforms hang in the balance."
 md2026_elections.90.o1:0 "Meloni re-elected — Fratelli d'Italia"
 md2026_elections.90.o2:0 "Center-left coalition — Elly Schlein"
 md2026_elections.90.o3:0 "Five Star Movement surge — Giuseppe Conte"

 ### EVENTS - RANDOM ###
 md2026_random.1.t:0 "Border Incident"
 md2026_random.1.d:0 "A tense incident has occurred along our border. Armed forces from a neighboring country involved in an ongoing conflict have crossed into our territory, resulting in a brief but alarming standoff. Our military is on high alert. We must decide how to respond — through diplomatic channels or with a show of force."
 md2026_random.1.o1:0 "Diplomatic response"
 md2026_random.1.o2:0 "Military posturing"

 md2026_random.2.t:0 "Natural Disaster Strikes"
 md2026_random.2.d:0 "A devastating natural disaster has struck our nation, causing widespread destruction to infrastructure and displacing thousands of citizens. The disaster has overwhelmed local response capabilities. We must decide whether to mount an emergency relief effort domestically or appeal to the international community for assistance."
 md2026_random.2.o1:0 "Emergency domestic relief"
 md2026_random.2.o2:0 "Appeal for international aid"

 md2026_random.3.t:0 "Technology Breakthrough"
 md2026_random.3.d:0 "Our researchers have achieved a significant breakthrough in advanced technology. This discovery has potential applications in both civilian and military domains. We must decide whether to invest in commercial development to boost our economy or channel the breakthrough into military applications for strategic advantage."
 md2026_random.3.o1:0 "Invest in commercialization"
 md2026_random.3.o2:0 "Military applications"

 md2026_random.4.t:0 "Terrorism Incident"
 md2026_random.4.d:0 "A terrorist attack has struck our nation, killing civilians and spreading fear. The public demands action. We can respond with a security crackdown that may erode civil liberties but boost war support, or we can emphasize national unity and resilience while maintaining our democratic values."
 md2026_random.4.o1:0 "Security crackdown"
 md2026_random.4.o2:0 "Unity and resilience"

 md2026_random.5.t:0 "Pandemic Scare"
 md2026_random.5.d:0 "A new pathogen has emerged, raising fears of a global pandemic. Health authorities warn of potential mass casualties if the disease spreads unchecked. We must decide between strict lockdown measures that will damage the economy but slow the spread, or keeping the economy open and accepting the health risks."
 md2026_random.5.o1:0 "Implement lockdown measures"
 md2026_random.5.o2:0 "Keep the economy open"

 md2026_random.6.t:0 "Market Crash"
 md2026_random.6.d:0 "A sudden and severe crash in financial markets has sent shockwaves through our economy. Major banks and corporations face potential insolvency. We must choose between a costly bailout package to stabilize the financial system, or allowing the market to correct itself — a painful but potentially cleansing process."
 md2026_random.6.o1:0 "Bailout package"
 md2026_random.6.o2:0 "Let the market correct itself"

 md2026_random.7.t:0 "Cyber Attack on Critical Infrastructure"
 md2026_random.7.d:0 "A sophisticated cyber attack has targeted our critical infrastructure — power grids, communications networks, and government systems have all been compromised. Intelligence points to a state-sponsored operation. We can invest heavily in cyber defense to prevent future attacks, or launch retaliatory cyber operations against the suspected perpetrator."
 md2026_random.7.o1:0 "Invest in cyber defense"
 md2026_random.7.o2:0 "Retaliatory cyber operations"

 md2026_random.8.t:0 "Mass Protests"
 md2026_random.8.d:0 "Mass protests have erupted across our major cities. Citizens are demanding political change, economic reform, and greater accountability from the government. The protests threaten to destabilize our nation if not addressed. We can make concessions to the protesters or crack down to restore order."
 md2026_random.8.o1:0 "Make concessions"
 md2026_random.8.o2:0 "Crack down on the protests"

 ### NATIONAL SPIRITS - Country-Specific ###
 md2026_jap_demographic_crisis:0 "Demographic Crisis"
 md2026_jap_demographic_crisis_desc:0 "Japan faces a severe demographic crisis. Birth rates have fallen to historic lows while the population ages rapidly. The shrinking workforce threatens economic productivity, strains the pension system, and creates manpower challenges for the Self-Defense Forces."
 md2026_kor_political_crisis:0 "Political Crisis"
 md2026_kor_political_crisis_desc:0 "The aftermath of the 2024 martial law incident has plunged South Korea into a deep political crisis. Public trust in institutions has been shaken, partisan divisions have deepened, and the political establishment struggles to restore stability and democratic normalcy."
 md2026_sau_vision_2030:0 "Vision 2030"
 md2026_sau_vision_2030_desc:0 "Saudi Arabia's ambitious Vision 2030 program aims to diversify the economy away from oil dependence, develop tourism and entertainment sectors, and modernize society. Massive investments in infrastructure, technology, and megaprojects like NEOM are reshaping the kingdom."
 md2026_sud_civil_war:0 "Civil War"
 md2026_sud_civil_war_desc:0 "Sudan is engulfed in a devastating civil war between the Sudanese Armed Forces and the Rapid Support Forces. The conflict has caused a humanitarian catastrophe, displaced millions, and left the country's infrastructure in ruins. Stability remains a distant hope."
 md2026_yem_houthi_division:0 "Houthi Division"
 md2026_yem_houthi_division_desc:0 "Yemen remains divided between the internationally recognized government and the Houthi movement, which controls much of the north including the capital Sana'a. The Houthis' attacks on Red Sea shipping have drawn international attention, while the humanitarian crisis deepens."
 md2026_raj_hindu_nationalism:0 "Hindu Nationalism"
 md2026_raj_hindu_nationalism_desc:0 "The BJP government promotes a vision of Hindu cultural nationalism that energizes its political base but creates social tensions. Policies emphasizing Hindu identity shape governance, foreign policy, and domestic discourse, while critics warn of democratic erosion."
 md2026_raj_digital_india:0 "Digital India"
 md2026_raj_digital_india_desc:0 "India's Digital India initiative has created one of the world's largest digital infrastructure networks. The Aadhaar system, UPI payments, and digital governance platforms have revolutionized public services and boosted economic efficiency, positioning India as a global technology hub."
 md2026_sov_shadow_economy:0 "Shadow Economy"
 md2026_sov_shadow_economy_desc:0 "Under the pressure of Western sanctions, Russia has developed an extensive shadow economy. Parallel import schemes, cryptocurrency transactions, and intermediary trade networks help circumvent restrictions, maintaining economic activity at the cost of transparency and institutional integrity."
 md2026_eth_post_tigray:0 "Post-Tigray Reconstruction"
 md2026_eth_post_tigray_desc:0 "Ethiopia is still recovering from the devastating Tigray War. While the Pretoria Agreement brought a ceasefire, deep scars remain — displaced populations, destroyed infrastructure, and unresolved political grievances continue to challenge national unity and reconstruction efforts."
 md2026_uae_economic_diversification:0 "Economic Diversification"
 md2026_uae_economic_diversification_desc:0 "The UAE has aggressively diversified its economy beyond oil, investing heavily in finance, tourism, technology, and logistics. Dubai and Abu Dhabi have become global business hubs, attracting international talent and capital while building a post-oil economic foundation."
 md2026_hun_illiberal_democracy:0 "Illiberal Democracy"
 md2026_hun_illiberal_democracy_desc:0 "Hungary under Viktor Orbán has embraced 'illiberal democracy' — consolidating political power, restricting media independence, and clashing with EU institutions over rule of law. This approach provides domestic political stability but strains relations with Western allies."

 ### NATIONAL SPIRITS - Systemic ###
 md2026_war_exhaustion_1:0 "War Exhaustion"
 md2026_war_exhaustion_1_desc:0 "The prolonged conflict is beginning to wear on our nation. Public patience is waning, economic costs mount, and the strain on our military is becoming apparent. If the war continues, conditions may deteriorate further."
 md2026_war_exhaustion_2:0 "Severe War Exhaustion"
 md2026_war_exhaustion_2_desc:0 "The war has taken a heavy toll on our nation. Casualties mount, the economy suffers, and public support for the conflict is eroding rapidly. Morale is declining and conscription is becoming increasingly difficult. A resolution must be found soon."
 md2026_war_exhaustion_3:0 "Critical War Exhaustion"
 md2026_war_exhaustion_3_desc:0 "Our nation is at the breaking point. Years of war have devastated the economy, decimated military manpower, and shattered public morale. Desertions are rising, industry is collapsing, and the population demands peace at almost any cost."
 md2026_nuclear_deterrent:0 "Nuclear Deterrent"
 md2026_nuclear_deterrent_desc:0 "Our nation has developed nuclear weapons, providing a powerful strategic deterrent against potential aggressors. While the nuclear arsenal boosts our defensive posture and international standing, maintaining it requires significant resources and heightens global tensions."
 md2026_nato_article5_active:0 "NATO Article 5 Active"
 md2026_nato_article5_active_desc:0 "NATO's Article 5 collective defense clause has been invoked. As a committed alliance member, our nation has mobilized forces and placed the military on heightened readiness. The alliance stands united in the defense of its members."
 md2026_sanctions_tier_mild:0 "Mild International Sanctions"
 md2026_sanctions_tier_mild_desc:0 "Our nation faces limited international sanctions. Trade restrictions and diplomatic penalties have been imposed, creating minor economic disruptions. The sanctions signal international disapproval but remain manageable."
 md2026_sanctions_tier_moderate:0 "Moderate International Sanctions"
 md2026_sanctions_tier_moderate_desc:0 "Significant international sanctions have been imposed on our nation. Trade volumes are declining, industrial efficiency suffers, and consumer goods are becoming scarce. The economic impact is substantial and growing."
 md2026_sanctions_tier_severe:0 "Severe International Sanctions"
 md2026_sanctions_tier_severe_desc:0 "Our nation faces severe international sanctions that are crippling the economy. Major trade partners have cut ties, industrial output has plummeted, and access to advanced technology is restricted. Research capabilities are degraded as international scientific cooperation collapses."
 md2026_sanctions_tier_total:0 "Total International Sanctions"
 md2026_sanctions_tier_total_desc:0 "Our nation is under comprehensive international sanctions amounting to near-total economic isolation. Trade has virtually ceased, industry operates at a fraction of capacity, and the technological gap with adversaries widens daily. The economy is in freefall."
 md2026_reconstruction_effort:0 "Reconstruction Effort"
 md2026_reconstruction_effort_desc:0 "With the end of hostilities, a massive reconstruction effort is underway. Resources are being channeled into rebuilding destroyed infrastructure, factories, and housing. While costly, the reconstruction brings hope for recovery and renewed stability."
 md2026_brics_development_bank:0 "BRICS Development Bank"
 md2026_brics_development_bank_desc:0 "Our nation has joined the BRICS New Development Bank, gaining access to alternative financing for infrastructure and development projects outside the Western-dominated financial system. This provides modest economic benefits and strengthens South-South cooperation."

 ### NATIONAL SPIRITS - Focus Tree Enrichment ###
 md2026_usa_labor_shortage:0 "Labor Shortage"
 md2026_usa_labor_shortage_desc:0 "The United States faces a persistent labor shortage across key industries. An aging workforce, restrictive immigration policies, and shifting employment preferences have left factories, farms, and service sectors struggling to fill positions, constraining economic output."
 md2026_usa_trade_war_tariffs:0 "Trade War Tariffs"
 md2026_usa_trade_war_tariffs_desc:0 "Sweeping tariffs have been imposed on imports from major trading partners, reshaping global trade flows. While intended to protect domestic industry and bring manufacturing home, the tariffs raise consumer prices and provoke retaliatory measures from affected nations."
 md2026_sov_war_economy:0 "War Economy"
 md2026_sov_war_economy_desc:0 "Russia has shifted to a war economy footing, redirecting industrial capacity toward military production. Arms factories operate around the clock while civilian consumption is curtailed. The economic transformation boosts military output at the cost of stability and living standards."
 md2026_sov_sanctions_evasion:0 "Sanctions Evasion Networks"
 md2026_sov_sanctions_evasion_desc:0 "Russia has established sophisticated networks to evade Western sanctions, routing trade through intermediary countries and using parallel import schemes. These networks partially offset the impact of sanctions, maintaining access to critical goods and technology."
 md2026_ukr_resistance:0 "National Resistance"
 md2026_ukr_resistance_desc:0 "The Ukrainian people have rallied in fierce resistance against the Russian invasion. A spirit of national unity and defiance permeates the armed forces and civilian population alike. Volunteer battalions, territorial defense units, and partisan networks bolster the nation's defensive capability."
 md2026_ukr_nato_candidate:0 "NATO Candidate Status"
 md2026_ukr_nato_candidate_desc:0 "Ukraine has been granted NATO candidate status, signaling the alliance's commitment to Ukraine's eventual membership. This provides diplomatic legitimacy, access to NATO standards and training, and strengthens the political resolve of the nation."
 md2026_chi_national_rejuvenation:0 "National Rejuvenation"
 md2026_chi_national_rejuvenation_desc:0 "China pursues the 'great rejuvenation of the Chinese nation' — a comprehensive modernization drive encompassing industrial upgrading, technological self-sufficiency, and military transformation. The program channels enormous resources into building a world-class economy and armed forces."
 md2026_chi_tech_self_reliance:0 "Technological Self-Reliance"
 md2026_chi_tech_self_reliance_desc:0 "China has accelerated efforts to achieve technological self-reliance, particularly in semiconductors, AI, and advanced manufacturing. Massive state investment in domestic chip production and research aims to break dependence on foreign technology and close the gap with Western competitors."

 ### IDEAS - Decision Reward Ideas ###
 md2026_sov_information_control:0 "Information Control"
 md2026_sov_information_control_desc:0 "The Russian government has implemented comprehensive information control measures — censoring independent media, blocking foreign news sources, and promoting state narratives. Domestic opinion is tightly managed, boosting regime stability at the cost of civil liberties."
 md2026_sov_shadow_fleet:0 "Shadow Fleet Operations"
 md2026_sov_shadow_fleet_desc:0 "Russia operates a shadow fleet of aging tankers to circumvent Western oil price caps and sanctions. These vessels transport Russian crude to willing buyers through obscure intermediaries, maintaining oil revenue streams despite international restrictions."
 md2026_sov_partial_mobilization:0 "Partial Mobilization"
 md2026_sov_partial_mobilization_desc:0 "Russia has declared a partial mobilization, calling up reservists and expanding conscription to bolster forces at the front. While providing desperately needed manpower, the mobilization has caused widespread public anxiety and economic disruption."
 md2026_chi_belt_road:0 "Belt and Road Initiative"
 md2026_chi_belt_road_desc:0 "China's Belt and Road Initiative continues to expand, financing infrastructure projects across Asia, Africa, and Latin America. The program extends Chinese economic and political influence while creating trade dependencies that benefit Beijing's strategic interests."
 md2026_chi_taiwan_pressure:0 "Taiwan Military Pressure"
 md2026_chi_taiwan_pressure_desc:0 "China has intensified military pressure on Taiwan through increased naval patrols, air incursions into Taiwan's ADIZ, and large-scale military exercises simulating an amphibious assault. The campaign aims to intimidate Taipei and signal resolve to Washington."
 md2026_chi_tech_self_sufficiency:0 "Tech Self-Sufficiency Campaign"
 md2026_chi_tech_self_sufficiency_desc:0 "China's technology self-sufficiency campaign channels billions into domestic semiconductor fabrication, AI development, and quantum computing research. The goal is to eliminate dependence on Western technology and establish Chinese dominance in critical tech sectors."
 md2026_raj_make_in_india_decision:0 "Make in India"
 md2026_raj_make_in_india_decision_desc:0 "India's Make in India initiative has attracted foreign manufacturers seeking alternatives to Chinese supply chains. Tax incentives, infrastructure development, and a massive labor pool are drawing investment in electronics, automotive, and defense manufacturing."
 md2026_raj_border_standoff:0 "Border Standoff"
 md2026_raj_border_standoff_desc:0 "Indian forces maintain a heightened state of readiness along the disputed border with China. The standoff in the Himalayan region has led to increased military deployments, infrastructure buildup, and raised conscription to defend territorial integrity."
 md2026_raj_space_program:0 "Space Program"
 md2026_raj_space_program_desc:0 "India's space program ISRO has achieved remarkable milestones — successful lunar and solar missions have demonstrated world-class capability. The program boosts national prestige, drives technological innovation, and positions India as a major player in the new space race."
 md2026_nko_nuclear_test_effect:0 "Nuclear Test Success"
 md2026_nko_nuclear_test_effect_desc:0 "North Korea has conducted a successful nuclear weapons test, demonstrating enhanced warhead capability. While the test provokes international condemnation and tighter sanctions, it significantly boosts the regime's strategic deterrence and domestic propaganda."
 md2026_nko_missile_provocation_effect:0 "Missile Provocation"
 md2026_nko_missile_provocation_effect_desc:0 "North Korea has launched a provocative missile test, demonstrating its ballistic missile capability to the world. The launch serves as both a military signal and a bargaining chip in the regime's pursuit of international recognition and sanctions relief."
 md2026_per_proxy_warfare:0 "Proxy Warfare"
 md2026_per_proxy_warfare_desc:0 "Iran continues to project power through its network of proxy forces across the Middle East — Hezbollah in Lebanon, militias in Iraq, and the Houthis in Yemen. These proxies extend Iranian influence but also drain resources and provoke confrontation with regional rivals."
 md2026_per_nuclear_program:0 "Nuclear Program"
 md2026_per_nuclear_program_desc:0 "Iran has accelerated its nuclear program, enriching uranium to near-weapons-grade levels. The program provides potential strategic deterrence but has triggered severe international sanctions and raised the specter of military confrontation with Israel and the United States."
 md2026_sau_vision_2030_acceleration:0 "Vision 2030 Acceleration"
 md2026_sau_vision_2030_acceleration_desc:0 "Saudi Arabia has accelerated its Vision 2030 economic transformation, pouring vast resources into megaprojects, tourism infrastructure, and industrial diversification. The crash modernization program is rapidly building new economic foundations beyond oil dependence."
 md2026_nuclear_modernization_effect:0 "Nuclear Modernization"
 md2026_nuclear_modernization_effect_desc:0 "Our nuclear arsenal is undergoing a comprehensive modernization program — new delivery systems, upgraded warheads, and improved command and control. The program ensures our nuclear deterrent remains credible and survivable for decades to come."
 md2026_sov_wartime_mobilization:0 "Wartime Mobilization"
 md2026_sov_wartime_mobilization_desc:0 "The Russian economy has been placed on a wartime mobilization footing. Military production takes priority over civilian needs, with industrial output redirected to the war effort. Arms output increases substantially, but at a steep cost to political capital and social stability."
 md2026_nuclear_posturing_effect:0 "Nuclear Posturing"
 md2026_nuclear_posturing_effect_desc:0 "Our nation has adopted an aggressive nuclear posture, signaling willingness to use nuclear weapons if our survival is threatened. While this deters conventional aggression, it raises international tensions and alarm among both allies and adversaries."

 ### DECISIONS - Internal Politics ###
 md2026_sov_war_economy_decision:0 "War Economy"
 md2026_sov_war_economy_decision_desc:0 "Shift the Russian economy to a full war footing, prioritizing military production over civilian needs."
 md2026_sov_shadow_fleet_sales:0 "Shadow Fleet Oil Sales"
 md2026_sov_shadow_fleet_sales_desc:0 "Deploy Russia's shadow fleet of tankers to sell oil outside the Western price cap, circumventing sanctions at the risk of further international isolation."
 md2026_chi_belt_road_expansion:0 "Belt and Road Expansion"
 md2026_chi_belt_road_expansion_desc:0 "Expand China's Belt and Road Initiative, financing new infrastructure projects in developing countries to extend economic and political influence."
 md2026_nko_nuclear_test:0 "Nuclear Weapons Test"
 md2026_nko_nuclear_test_desc:0 "Conduct a nuclear weapons test to demonstrate warhead capability and strengthen strategic deterrence, at the cost of international condemnation."
 md2026_nko_missile_provocation:0 "Missile Provocation"
 md2026_nko_missile_provocation_desc:0 "Launch a provocative ballistic missile test to signal military capability and pressure regional adversaries into negotiations."
 md2026_nko_diplomatic_outreach:0 "Diplomatic Outreach"
 md2026_nko_diplomatic_outreach_desc:0 "Pursue diplomatic outreach to South Korea, the US, and China, seeking negotiations on sanctions relief and security guarantees."
 md2026_per_nuclear_acceleration:0 "Nuclear Program Acceleration"
 md2026_per_nuclear_acceleration_desc:0 "Accelerate Iran's nuclear program toward weapons capability, accepting international isolation in pursuit of strategic deterrence."
 md2026_sau_vision_acceleration:0 "Accelerate Vision 2030"
 md2026_sau_vision_acceleration_desc:0 "Pour additional resources into Saudi Arabia's Vision 2030 transformation, accelerating economic diversification and mega-project construction."
 md2026_sau_normalize_israel:0 "Normalize Relations with Israel"
 md2026_sau_normalize_israel_desc:0 "Pursue a historic normalization of relations with Israel, following the Abraham Accords framework. This could reshape the Middle East but will face opposition from Iran and domestic conservative elements."

