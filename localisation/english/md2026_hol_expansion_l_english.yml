l_english:
 # HOL (Netherlands) focus names and descriptions - 25 focuses
 # Root
 MD2026_HOL_dutch_renaissance:0 "Dutch Renaissance"
 MD2026_HOL_dutch_renaissance_desc:0 "The Netherlands enters 2026 transformed. Geert Wilders' PVV-led coalition has upended decades of Dutch consensual politics; defence budgets are rising for the first time since the Cold War; ASML has become the world's most strategic technology company; and the Dutch are rediscovering their capacity for national ambition. The question is which direction that ambition will take."
 # Branch 1: Defense/NATO
 MD2026_HOL_nato_commitment:0 "NATO Commitment Renewed"
 MD2026_HOL_nato_commitment_desc:0 "After decades of defence budget cuts that left the Dutch army with barely functional equipment, the Netherlands makes a firm political commitment to meet and exceed the NATO 2% GDP target. The Royal Netherlands Army, Navy, and Air Force begin their most significant modernisation programme since the end of the Cold War."
 MD2026_HOL_f35_full:0 "F-35 Full Integration"
 MD2026_HOL_f35_full_desc:0 "The Royal Netherlands Air Force completes full integration of its F-35A Lightning II fleet - 52 aircraft replacing the retired F-16. Dutch F-35s are now fully interoperable with allied squadrons, networked into NATO's integrated air defence, and deployed on deterrence missions over the Baltic and North Sea."
 MD2026_HOL_navy_frigate:0 "HNLMS Frigate Programme"
 MD2026_HOL_navy_frigate_desc:0 "The Royal Netherlands Navy launches a new generation frigate programme - replacing the ageing De Zeven Provincien-class with next-generation Anti-Submarine Warfare frigates built to operate in the High North and North Sea. HNLMS vessels will anchor NATO's northern maritime flank alongside the Royal Navy and German Marine."
 MD2026_HOL_army_reform:0 "Ground Forces Rebuild"
 MD2026_HOL_army_reform_desc:0 "The Royal Netherlands Army undertakes its most radical restructuring since the Cold War - rebuilding disbanded units, replenishing ammunition stockpiles that were at critically low levels, and reorienting from expeditionary operations toward collective defence of NATO territory. Dutch ground forces will once again be a credible contribution to alliance deterrence."
 MD2026_HOL_special_forces:0 "SOF Expansion"
 MD2026_HOL_special_forces_desc:0 "The Netherlands Special Operations Forces Command expands its capacity - growing the 1 SOBN commando battalion and 1 SF squadron of the Royal Netherlands Air Force. Dutch SOF, with their history from the Korps Commandotroepen, will be tasked with counter-terrorism, hostage rescue, and special reconnaissance across NATO's eastern flank."
 MD2026_HOL_nato_pillar:0 "NATO Pillar State"
 MD2026_HOL_nato_pillar_desc:0 "The Netherlands has completed its transformation from a defence-spending laggard into one of NATO's most capable and reliable allies. With F-35 air power, modern frigates, rebuilt ground forces, and expanded special operations capability, the Dutch military is once again a genuine pillar of the Atlantic Alliance."
 # Branch 2: Tech/Economy
 MD2026_HOL_tech_economy:0 "Tech-Driven Economy"
 MD2026_HOL_tech_economy_desc:0 "The Dutch economy is quietly the most technologically sophisticated in Europe. ASML's semiconductor lithography monopoly, the Port of Rotterdam's logistics technology, and Philips' medical technology make the Netherlands punch far above its weight. Building on these foundations requires strategic investment and protecting these industries from geopolitical predation."
 MD2026_HOL_asml_champion:0 "ASML EUV Dominance"
 MD2026_HOL_asml_champion_desc:0 "ASML is the most strategically important company in the global semiconductor supply chain - the sole manufacturer of Extreme Ultraviolet lithography machines without which no advanced chip can be made. Designating ASML a national champion, providing state-backed R&D support, and controlling its export carefully will ensure Dutch EUV technology remains the chokepoint of the global chip economy."
 MD2026_HOL_rotterdam_hub:0 "Rotterdam Port Expansion"
 MD2026_HOL_rotterdam_hub_desc:0 "The Port of Rotterdam - Europe's largest - handles 470 million tonnes of cargo annually. An ambitious expansion programme, including new container terminal automation, LNG import capacity, hydrogen infrastructure, and digital logistics integration, will cement Rotterdam's position as the indispensable gateway to European markets for a generation."
 MD2026_HOL_chip_research:0 "Semiconductor Research Cluster"
 MD2026_HOL_chip_research_desc:0 "Build on the ASML-Eindhoven ecosystem to create Europe's premier semiconductor research cluster - Eindhoven, Leuven, and Aachen as a cross-border high-tech corridor. Dutch, Belgian, and German universities and companies, anchored by ASML and NXP Semiconductors, will create the research base for next-generation European chip sovereignty."
 MD2026_HOL_logistics_network:0 "European Logistics Hub"
 MD2026_HOL_logistics_network_desc:0 "Leverage Rotterdam's port capacity and Schiphol Airport's connectivity to build a comprehensive European logistics hub infrastructure - integrating multimodal transport, cold chain capacity, digital freight platforms, and hydrogen fuel infrastructure. The Netherlands will be the logistical spine of European trade."
 MD2026_HOL_innovation_leader:0 "European Innovation Leader"
 MD2026_HOL_innovation_leader_desc:0 "The Netherlands has cemented its position as Europe's innovation leader - combining the world's most critical semiconductor technology, the continent's largest port, and a research ecosystem of global significance. Dutch innovation sets the standard for what a small nation can achieve through strategic investment and openness to global talent and trade."
 # Branch 3: Domestic Politics
 MD2026_HOL_coalition_stability:0 "Coalition Stability"
 MD2026_HOL_coalition_stability_desc:0 "The Netherlands has always required coalition governments, but the 2023 Wilders earthquake has made coalition-building more complex than at any time since the Second World War. The PVV's anti-immigration, Eurosceptic agenda sits awkwardly with traditional Dutch consensus politics. Finding a stable governing majority will define Dutch politics for the next generation."
 MD2026_HOL_wilders_coalition:0 "PVV-Led Government"
 MD2026_HOL_wilders_coalition_desc:0 "Geert Wilders consolidates PVV leadership of the Dutch government - pushing through the most ambitious anti-immigration agenda since the formation of the modern Dutch state, pulling back from EU integration ambitions, and channelling nationalist energy into domestic political transformation. The Netherlands pivots toward the populist right."
 MD2026_HOL_centrist_coalition:0 "VVD/D66 Centrist Governance"
 MD2026_HOL_centrist_coalition_desc:0 "The centrist parties - VVD, D66, and NSC - form a governing coalition that sidelines Wilders, restoring the Netherlands' traditional liberal consensus. The centrist coalition prioritises EU engagement, immigration reform through legal channels, and the preservation of the Dutch social model against polarisation."
 MD2026_HOL_migration_reform:0 "Immigration Tightening"
 MD2026_HOL_migration_reform_desc:0 "The PVV-led government implements the Netherlands' most restrictive immigration policy in modern history - capping asylum numbers, tightening family reunification rules, and seeking an EU asylum opt-out. The policy is politically popular but legally contested and strains relations with Brussels and NGOs."
 MD2026_HOL_social_investment:0 "Social Cohesion Investment"
 MD2026_HOL_social_investment_desc:0 "The centrist coalition invests in the social infrastructure that sustains Dutch cohesion - housing construction to address the severe shortage, integration programs, public health investment, and education reform. The social investment agenda reaffirms the Dutch polder model of inclusive prosperity."
 MD2026_HOL_dutch_model:0 "Renewed Dutch Model"
 MD2026_HOL_dutch_model_desc:0 "Whether through Wilders' nationalist revolution or a centrist renaissance, the Netherlands has forged a new national consensus that addresses the pressures fracturing Dutch society. The renewed Dutch model - open economy, strong defence, managed migration, social investment - offers a template for how small democracies navigate the turbulence of the 2020s."
 # Branch 4: EU Role
 MD2026_HOL_eu_role:0 "EU Institutional Role"
 MD2026_HOL_eu_role_desc:0 "The Netherlands punches above its weight in EU institutions - the International Court of Justice and International Criminal Court are based in The Hague, Dutch officials lead key Commission directorates, and Dutch economic interests shape EU single market rules. Investing in this institutional influence is a strategic priority."
 MD2026_HOL_eu_budget_hawk:0 "EU Budget Discipline"
 MD2026_HOL_eu_budget_hawk_desc:0 "The Netherlands has historically been one of the EU's fiercest budget hawks - part of the Frugal Four alongside Austria, Denmark, and Sweden. Dutch advocacy will intensify, pushing for strict conditionality on EU funds, robust anti-fraud measures, and fiscal rules that prevent Southern European profligacy from becoming Northern European liability."
 MD2026_HOL_eu_trade_champion:0 "Free Trade Advocate"
 MD2026_HOL_eu_trade_champion_desc:0 "As Europe's most trade-dependent major economy, the Netherlands is the EU's most consistent champion of open markets. Dutch trade ministers will push for new EU free trade agreements - with the United States, ASEAN, and the Indo-Pacific - and resist protectionist impulses in European industrial policy that threaten Dutch export industries."
 MD2026_HOL_eu_hague_justice:0 "ICC and Rule of Law Champion"
 MD2026_HOL_eu_hague_justice_desc:0 "The Netherlands uses its status as host of the International Criminal Court and International Court of Justice to champion rule of law within the EU and globally. Dutch diplomats push back against democratic backsliding in member states, support ICC prosecutions of war criminals, and advocate for a stronger EU rule-of-law enforcement mechanism."
 MD2026_HOL_eu_enlargement:0 "EU Enlargement Advocate"
 MD2026_HOL_eu_enlargement_desc:0 "Despite Dutch Eurosceptic currents, the Netherlands supports EU enlargement to Ukraine, Moldova, and the Western Balkans - calculating that expanding the rule of law zone is both strategically and economically beneficial. Dutch advocacy in the Council helps overcome enlargement fatigue in Southern Europe."
 MD2026_HOL_eu_anchor:0 "EU Anchor State"
 MD2026_HOL_eu_anchor_desc:0 "The Netherlands has consolidated its role as one of the EU's most indispensable anchor states. Hosting international courts, shaping budget and trade policy, advocating for enlargement and rule of law, and providing an ASML-based chip chokepoint - Dutch influence in Europe far exceeds what its 17 million citizens might suggest."
 # HOL national spirit names
 md2026_hol_nato_reliable:0 "NATO Reliable Ally"
 md2026_hol_asml_dominance:0 "ASML Semiconductor Monopoly"
 md2026_hol_rotterdam_gateway:0 "Rotterdam Gateway"
 md2026_hol_eu_pillar:0 "EU Pillar State"
