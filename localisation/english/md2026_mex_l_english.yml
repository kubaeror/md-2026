l_english:
 md2026_mex_amlo_legacy:0 "AMLO's Legacy"
 md2026_mex_amlo_legacy_desc:0 "Claudia Sheinbaum inherits the transformationist project of Andres Manuel Lopez Obrador. The 4T experiment has reshaped Mexican politics - now we must decide how to carry it forward."
 md2026_mex_morena_consolidation:0 "MORENA Consolidation"
 md2026_mex_morena_consolidation_desc:0 "MORENA has become the dominant political force in Mexico. By deepening party structures, regional alliances, and grassroots mobilization, we can cement our hold on Mexican governance."
 md2026_mex_opposition_dialogue:0 "Opposition Dialogue"
 md2026_mex_opposition_dialogue_desc:0 "Governing Mexico requires more than electoral dominance. Opening channels to the PAN, PRI, and MC can defuse tensions and build the broader consensus needed for ambitious reforms."
 md2026_mex_anti_corruption_drive:0 "Anti-Corruption Drive"
 md2026_mex_anti_corruption_drive_desc:0 "A serious anti-corruption campaign targeting cartels, officials, and businessmen alike will be painful but transformative. The era of impunity must end."
 md2026_mex_judicial_reform:0 "Judicial Reform"
 md2026_mex_judicial_reform_desc:0 "The controversial overhaul of Mexico's Supreme Court and federal judiciary has triggered fierce debate. Critics call it democratic backsliding; supporters call it liberation from captured elites."
 md2026_mex_usmca_trade:0 "USMCA Framework"
 md2026_mex_usmca_trade_desc:0 "The United States-Mexico-Canada Agreement remains the cornerstone of Mexico's economic model. Strengthening its institutions and resolving chapter disputes will anchor growth for a decade."
 md2026_mex_nearshoring:0 "Nearshoring Boom"
 md2026_mex_nearshoring_desc:0 "US-China decoupling has made Mexico the premier nearshoring destination. Companies fleeing China are pouring into Nuevo Leon, Monterrey, and the Bajio corridor - we must be ready."
 md2026_mex_tariff_response:0 "Tariff Response"
 md2026_mex_tariff_response_desc:0 "Washington's tariff threats are a blunt instrument aimed at Mexico's manufacturing advantage. We can absorb them, retaliate carefully, or use them as leverage in a broader renegotiation."
 md2026_mex_semiconductor_hub:0 "Semiconductor Hub"
 md2026_mex_semiconductor_hub_desc:0 "The global chip shortage exposed dependency on Asian supply chains. Mexico's proximity to the US market and growing technical workforce make it a credible location for next-generation semiconductor fabs."
 md2026_mex_manufacturing_zones:0 "Manufacturing Zones"
 md2026_mex_manufacturing_zones_desc:0 "Designated Special Economic Zones for automotive and electronics manufacturing will supercharge Mexico's industrial base, offering tax incentives and streamlined permits to attract major investors."
 md2026_mex_cartel_war:0 "War on Cartels"
 md2026_mex_cartel_war_desc:0 "The cartels have metastasized into quasi-states controlling territory, taxing businesses, and corrupting institutions at every level. The question is no longer whether to fight - but how."
 md2026_mex_national_guard:0 "National Guard Expansion"
 md2026_mex_national_guard_desc:0 "The National Guard needs resources, training, and clear doctrine. Expanding its reach into cartel-dominated regions is the spine of our security strategy."
 md2026_mex_border_cooperation:0 "Border Cooperation"
 md2026_mex_border_cooperation_desc:0 "The 3,000-kilometer border with the United States is a source of both commerce and crisis. Cooperation on migration management and drug interdiction can transform it into an asset."
 md2026_mex_sinaloa_offensive:0 "Sinaloa Cartel Offensive"
 md2026_mex_sinaloa_offensive_desc:0 "The Sinaloa Cartel, weakened by internal feuding after El Chapo's sons took over, presents an opportunity. A sustained military campaign can dismantle its northern operations."
 md2026_mex_cjng_offensive:0 "CJNG Offensive"
 md2026_mex_cjng_offensive_desc:0 "The Jalisco New Generation Cartel is the most aggressive criminal organization in Mexico. Targeting El Mencho's network requires coordination across multiple states and careful intelligence preparation."
 md2026_mex_military_police:0 "Militarized Security"
 md2026_mex_military_police_desc:0 "The Army and National Guard must take primary responsibility for public security in contested territories. The scale of the cartel threat demands a decisive military response."
 md2026_mex_us_security_cooperation:0 "US Security Cooperation"
 md2026_mex_us_security_cooperation_desc:0 "A revamped Merida Initiative and expanded DEA cooperation can bring US intelligence, training, and equipment to bear on Mexico's security crisis. The price is accepting American oversight."
 md2026_mex_pemex_reform:0 "Pemex Reform"
 md2026_mex_pemex_reform_desc:0 "Pemex carries $100 billion in debt and aging infrastructure. Reform is unavoidable - whether through efficiency drives, partial privatization, or ruthless restructuring."
 md2026_mex_green_transition:0 "Green Transition"
 md2026_mex_green_transition_desc:0 "Mexico's wind corridors in Oaxaca and solar potential in the north can anchor a clean energy transition. The challenge is building the grid and storage capacity to make renewables reliable."
 md2026_mex_lithium_nationalization:0 "Lithium Nationalization"
 md2026_mex_lithium_nationalization_desc:0 "Mexico sits atop significant lithium reserves. State control of this critical battery mineral could fund the energy transition - or invite foreign investor backlash."
 md2026_mex_tourism_expansion:0 "Tourism Expansion"
 md2026_mex_tourism_expansion_desc:0 "The Maya Train project and expanded Cancun corridor represent a massive bet on tourism as a development engine. Linking Yucatan's ruins to Pacific resorts could transform southeastern Mexico."
 md2026_mex_remittance_economy:0 "Remittance Economy"
 md2026_mex_remittance_economy_desc:0 "Remittances from Mexicans abroad - over $60 billion annually - now exceed oil revenues. Building financial infrastructure to maximize their developmental impact is one of our highest-return investments."
 md2026_mex_trump_diplomacy:0 "Trump Diplomacy"
 md2026_mex_trump_diplomacy_desc:0 "Navigating the second Trump administration requires skill and patience. The tariff threats and immigration pressure are real, but so is the economic interdependence that gives Mexico leverage in Washington."
 md2026_mex_china_investment:0 "Chinese Investment"
 md2026_mex_china_investment_desc:0 "Chinese manufacturers displaced by US tariffs are looking for a new home. Mexico's proximity to American markets makes it appealing. Welcoming this investment carries geopolitical risk but economic reward."
 md2026_mex_eu_partnership:0 "EU Partnership"
 md2026_mex_eu_partnership_desc:0 "The modernized EU-Mexico Global Agreement can diversify Mexico away from dangerous dependence on the American market. European capital, technology, and institutions offer an alternative pole of gravity."
 md2026_mex_regional_power:0 "Regional Power"
 md2026_mex_regional_power_desc:0 "Mexico's economic transformation is creating the foundations of genuine regional power status. As the voice of Latin America in North America, Mexico can shape the hemisphere's future."
 md2026_mex_latin_america_leadership:0 "Latin America Leadership"
 md2026_mex_latin_america_leadership_desc:0 "As CELAC's most credible voice, Mexico can coordinate a Latin American response to US pressure, shape international trade negotiations, and offer a democratic model for the region."
 md2026_mex_aztec_century:0 "The Aztec Century"
 md2026_mex_aztec_century_desc:0 "From the ruins of the colonial legacy and the scars of NAFTA-era deindustrialization, a new Mexico is rising. The 21st century belongs to those who build - and Mexico is building."
