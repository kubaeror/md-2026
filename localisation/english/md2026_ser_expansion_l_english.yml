l_english:
 # SER focus names and descriptions
 MD2026_SER_serbian_crossroads:0 "Serbian Crossroads"
 MD2026_SER_serbian_crossroads_desc:0 "Serbia stands at a historic crossroads. Sandwiched between the EU, Russia, China, and NATO, Belgrade must navigate competing pressures while asserting its own sovereignty. The path forward will define Serbia for generations."
 MD2026_SER_kosovo_policy:0 "Kosovo Policy"
 MD2026_SER_kosovo_policy_desc:0 "The Kosovo question remains the defining issue of Serbian politics. Belgrade refuses to recognise Pristina's 2008 declaration of independence, and with over 100 countries backing Serbia's position in international forums, the dispute is far from settled."
 MD2026_SER_dialogue_continuation:0 "Brussels–Belgrade Dialogue"
 MD2026_SER_dialogue_continuation_desc:0 "Re-engage the EU-mediated Brussels–Belgrade dialogue process, seeking a negotiated framework that avoids recognition while offering Kosovo limited self-governance. Progress here is key to Serbia's EU accession path."
 MD2026_SER_kosovo_hardline:0 "Hardline Kosovo Stance"
 MD2026_SER_kosovo_hardline_desc:0 "Adopt a firm official position: Kosovo is Serbia. Reject any framework that implies recognition and rally domestic support around national sovereignty. The West may protest, but Serbia will not surrender its territorial claims."
 MD2026_SER_un_campaign:0 "UN Recognition Campaign"
 MD2026_SER_un_campaign_desc:0 "Launch a diplomatic offensive in the United Nations and Non-Aligned forums to de-recognise Kosovo, building on the 15+ countries that have already withdrawn their recognition. Every vote is a blow to Pristina's legitimacy."
 MD2026_SER_northern_kosmet:0 "Protect Northern Kosovo Serbs"
 MD2026_SER_northern_kosmet_desc:0 "Strengthen institutional and security links to the Serb community in northern Kosovo — the municipalities of Mitrovica, Leposavić, and Zubin Potok — ensuring Belgrade remains their de facto protector despite Pristina's claims."
 MD2026_SER_strategic_patience:0 "Strategic Patience"
 MD2026_SER_strategic_patience_desc:0 "Serbia will not be rushed. With diplomatic pressure building and the Serb community in Kosovo protected, Belgrade adopts a doctrine of strategic patience — the status quo is unsustainable for Pristina, and time favours Serbia."
 MD2026_SER_four_pillars:0 "Four Pillars of Foreign Policy"
 MD2026_SER_four_pillars_desc:0 "President Vučić's 'four pillars' doctrine — balancing the EU, Russia, China, and the Arab world simultaneously — has kept Serbia sovereign in an era of great-power competition. Institutionalise this balancing act as national strategy."
 MD2026_SER_eu_accession:0 "EU Accession Progress"
 MD2026_SER_eu_accession_desc:0 "Accelerate Serbia's EU membership negotiations, opening new chapters and meeting benchmarks on rule of law, media freedom, and economic alignment. Brussels offers prosperity; Belgrade must decide how much sovereignty to trade for it."
 MD2026_SER_russia_partnership:0 "Maintain Russian Partnership"
 MD2026_SER_russia_partnership_desc:0 "Despite Western pressure, Serbia maintains its historic ties to Russia — refusing to impose sanctions and continuing gas and energy cooperation. Moscow values Belgrade's neutrality and rewards it with favourable energy deals."
 MD2026_SER_china_investment:0 "Belt and Road Investment"
 MD2026_SER_china_investment_desc:0 "Deepen Serbia's partnership with China under the Belt and Road Initiative, securing infrastructure loans and investment in steel, mining, and manufacturing. The E763 motorway and Smederevo steel mill are models of Sino-Serbian partnership."
 MD2026_SER_western_engagement:0 "US and NATO Engagement"
 MD2026_SER_western_engagement_desc:0 "Engage Washington and NATO on Serbia's own terms — participating in Partnership for Peace exercises, accepting military equipment, while stopping short of membership. Strategic ambiguity gives Belgrade leverage over all sides."
 MD2026_SER_sovereign_path:0 "Serbia's Sovereign Path"
 MD2026_SER_sovereign_path_desc:0 "Serbia has mastered the art of non-alignment in the 21st century. Neither a vassal of Brussels nor Moscow, Belgrade charts its own course — sovereign, respected, and indispensable to every power that seeks influence in the Balkans."
 MD2026_SER_military_modernization:0 "Military Modernization"
 MD2026_SER_military_modernization_desc:0 "The Serbian Armed Forces are undergoing their most significant modernization since the 1990s. With a mix of Western and Russian equipment, and a revived domestic defence industry, Serbia is rebuilding its role as the Balkans' leading military power."
 MD2026_SER_rafale_purchase:0 "French Rafale Procurement"
 MD2026_SER_rafale_purchase_desc:0 "Serbia signs a landmark deal to purchase Dassault Rafale multirole fighters, following in the footsteps of Greece, Croatia, and India. The Rafale purchase signals Serbia's diversification away from Soviet-era aircraft and its growing defence relationship with France."
 MD2026_SER_su30_upgrade:0 "Su-30 Maintenance and Upgrade"
 MD2026_SER_su30_upgrade_desc:0 "Coordinate with Russia to maintain and upgrade Serbia's fleet of Su-30 fighters, ensuring operational readiness while domestically trained engineers reduce dependence on Russian technicians. The mix of East and West in Serbia's air force is intentional."
 MD2026_SER_ground_forces:0 "Ground Forces Reform"
 MD2026_SER_ground_forces_desc:0 "Restructure the Serbian Ground Forces around a more mobile, brigade-based model equipped with modern armour, artillery, and anti-tank systems. Cooperation with multiple arms suppliers ensures Serbia is not beholden to any single patron."
 MD2026_SER_defense_industry:0 "Yugoslav Arms Export Revival"
 MD2026_SER_defense_industry_desc:0 "Serbia's Yugoimport SDPR and Zastava Arms are experiencing a renaissance, exporting rifles, ammunition, and armoured vehicles to markets in Africa, the Middle East, and Asia. Belgrade is reclaiming Yugoslavia's old role as a non-aligned arms supplier."
 MD2026_SER_regional_military_power:0 "Balkans Military Power"
 MD2026_SER_regional_military_power_desc:0 "The modernization is complete. Serbia has emerged as the undisputed military power of the Western Balkans — equipped with both French jets and Russian fighters, a reformed army, and a booming arms industry that generates revenue and influence."
 MD2026_SER_economic_development:0 "Economic Development Drive"
 MD2026_SER_economic_development_desc:0 "Serbia's GDP has grown consistently, and the government is determined to transform the country into a regional economic hub. From the Belgrade waterfront to the Jadar Valley lithium fields, Serbia is open for business."
 MD2026_SER_beograd_waterfront:0 "Belgrade Waterfront Investment"
 MD2026_SER_beograd_waterfront_desc:0 "The Belgrade Waterfront project — a $3 billion UAE-financed transformation of the old Sava port into luxury apartments and commercial towers — is a symbol of Serbia's ambition. Attract further FDI and transform the capital into a regional business hub."
 MD2026_SER_mining_boom:0 "Jadar Lithium Mine"
 MD2026_SER_mining_boom_desc:0 "The Jadar Valley holds Europe's largest lithium deposit. Rio Tinto's Jadar project — revived after political controversy — will supply the EU's electric vehicle battery supply chain and give Serbia enormous strategic leverage in the green energy transition."
 MD2026_SER_infrastructure_investment:0 "Transport Corridor Investment"
 MD2026_SER_infrastructure_investment_desc:0 "Invest in Corridor 10 and Corridor 11, the motorway and rail links connecting Belgrade to Budapest, Sofia, and Thessaloniki. Modern infrastructure is the foundation of Serbia's ambition to become the logistics hub of the Western Balkans."
 MD2026_SER_industrial_zone:0 "Special Economic Zones"
 MD2026_SER_industrial_zone_desc:0 "Establish special economic zones near Kragujevac, Niš, and Novi Sad — offering tax incentives, streamlined permitting, and infrastructure support to attract European and Asian manufacturers. Serbia's low labour costs and central location are its competitive advantage."
 MD2026_SER_balkan_tiger:0 "The Balkan Tiger"
 MD2026_SER_balkan_tiger_desc:0 "Serbia has become the Balkan Tiger. Sustained growth, lithium exports, a diversified foreign investment base, and world-class infrastructure have transformed a country that once faced international isolation into one of Europe's fastest-growing economies."
