l_english:
 # SOV expansion focus names
 MD2026_SOV_power_consolidation:0 "Consolidation of Power"
 MD2026_SOV_power_consolidation_desc:0 "Eliminate internal rivals and doubters, concentrating authority in the hands of a trusted inner circle. Russia will speak with one voice — the Kremlin's."
 MD2026_SOV_siloviki_purge:0 "Purge the Siloviki"
 MD2026_SOV_siloviki_purge_desc:0 "Conduct a purge of unreliable elements within the security services, military command, and intelligence agencies, replacing them with personally loyal apparatchiks."
 MD2026_SOV_patriotic_mobilization:0 "Patriotic Mobilization"
 MD2026_SOV_patriotic_mobilization_desc:0 "Launch a comprehensive propaganda campaign portraying Russia's struggle as an existential civilizational conflict against Western decadence, galvanizing popular support for the war effort."
 MD2026_SOV_succession_planning:0 "The Succession Problem"
 MD2026_SOV_succession_planning_desc:0 "Russia's future stability depends on resolving the question of succession. Whether by identifying a chosen successor or entrenching the current leadership permanently, the Kremlin must plan ahead."
 MD2026_SOV_war_economy_2:0 "Total War Economy"
 MD2026_SOV_war_economy_2_desc:0 "Convert the Russian economy to full wartime footing, subordinating consumer production to the needs of the military-industrial complex in a mobilization unseen since the Great Patriotic War."
 MD2026_SOV_arctic_resources:0 "Arctic Resource Surge"
 MD2026_SOV_arctic_resources_desc:0 "Accelerate exploitation of Russia's vast Arctic resource deposits — oil, gas, and rare earth minerals — to fund the war effort and provide an alternative revenue stream to sanctioned exports."
 MD2026_SOV_china_energy_deal_2:0 "Expanded Sino-Russian Energy Pact"
 MD2026_SOV_china_energy_deal_2_desc:0 "Deepen the energy partnership with China, signing new long-term contracts for gas and oil deliveries that make Russia financially dependent on Beijing — but financially solvent despite Western sanctions."
 MD2026_SOV_self_sufficient_fortress:0 "Fortress Economy"
 MD2026_SOV_self_sufficient_fortress_desc:0 "Complete the construction of a fully self-sufficient Russian war economy, capable of sustaining prolonged conflict regardless of sanctions, trade restrictions, or export controls."
 MD2026_SOV_near_abroad_control:0 "Domination of the Near Abroad"
 MD2026_SOV_near_abroad_control_desc:0 "Reassert Russian dominance over the post-Soviet space, making clear to the CIS states that neutrality is not an option and alignment with Moscow is not merely preferable — it is mandatory."
 MD2026_SOV_belarusian_integration:0 "Union State Deepening"
 MD2026_SOV_belarusian_integration_desc:0 "Accelerate the integration of Belarus into the Russian state, using economic leverage and political pressure to transform the nominal Union State into functional Russian absorption."
 MD2026_SOV_missile_campaign:0 "Renewed Missile Campaign"
 MD2026_SOV_missile_campaign_desc:0 "Expand missile production and intensify strikes on enemy infrastructure, demonstrating that Russia's long-range precision strike capability is inexhaustible and the enemy's rear has no safe haven."
 MD2026_SOV_eurasian_bloc:0 "Eurasian Security Bloc"
 MD2026_SOV_eurasian_bloc_desc:0 "Formalize a security and economic bloc among Russia's aligned states, creating a coherent alternative to Western institutions that can project power across Eurasia."
 MD2026_SOV_russia_first:0 "Russia First"
 MD2026_SOV_russia_first_desc:0 "Embrace an unapologetically nationalist ideology — Russia for Russians — prioritizing ethnic Russian interests and identity over any universalist ideology, whether Soviet communism or Western liberalism."
 MD2026_SOV_soviet_revival:0 "Soviet Revival"
 MD2026_SOV_soviet_revival_desc:0 "Rehabilitate Soviet iconography and ideology, presenting the USSR as a golden age to be reclaimed. The red flag will fly again — not as communism, but as civilizational pride."
 MD2026_SOV_russian_world:0 "The Russian World"
 MD2026_SOV_russian_world_desc:0 "Embrace the Russkiy Mir concept — the idea that Russian speakers everywhere constitute a civilizational community whose protection is Russia's sacred duty and casus belli."
 MD2026_SOV_eurasianism:0 "Eurasianist Doctrine"
 MD2026_SOV_eurasianism_desc:0 "Formalize Eurasianism as Russia's state ideology, presenting Russia not as a European nation gone astray but as the heart of a distinct Eurasian civilization, fundamentally opposed to the Atlantic world."
