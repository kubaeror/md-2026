l_english:
 md2026_can_trump_crisis: "The Trump Challenge"
 md2026_can_trump_crisis_tt: "The United States under Trump has launched an unprecedented economic assault on Canada — tariffs, annexation rhetoric, and pressure on sovereignty. Canada must chart a course through this defining crisis."
 md2026_can_51st_state_rejection: "Not the 51st State"
 md2026_can_51st_state_rejection_tt: "Canada firmly rejects American calls for annexation or deeper integration. A wave of nationalist sentiment sweeps the country, rallying Canadians around sovereignty and independence. Relations with Washington will be strained, but national pride has never been higher."
 md2026_can_economic_diversification: "Economic Reorientation"
 md2026_can_economic_diversification_tt: "Rather than confronting the United States head-on, Canada pragmatically pivots its trade relationships. Europe, Japan, and Indo-Pacific partners offer new markets and economic resilience against American tariff pressure."
 md2026_can_tpp_pivot: "Trans-Pacific Leadership"
 md2026_can_tpp_pivot_tt: "Canada stakes out a leadership role in the Comprehensive and Progressive Agreement for Trans-Pacific Partnership, positioning itself as the anchor for an alternative to both American and Chinese economic blocs in the Pacific."
 md2026_can_norad_upgrade: "NORAD Modernization"
 md2026_can_norad_upgrade_tt: "Canada commits to a generational upgrade of NORAD's Arctic warning and interception capabilities. New over-the-horizon radars, interceptor bases in the High Arctic, and upgraded communication links ensure Canadian airspace remains sovereign."
 md2026_can_northern_gateway: "Northern Gateway Project"
 md2026_can_northern_gateway_tt: "A new generation of Arctic infrastructure — deep-water ports, all-season roads, and resource extraction facilities — opens Canada's northern frontier. The gateway unlocks vast mineral wealth while projecting sovereignty into the High Arctic."
 md2026_can_greenland_diplomacy: "Greenland Partnership"
 md2026_can_greenland_diplomacy_tt: "Canada offers Greenland and Denmark a framework for Arctic cooperation as an alternative to American pressure. Joint resource development, defense coordination, and infrastructure investment build a northern alliance that neither Copenhagen nor Nuuk can afford to refuse."
 md2026_can_arctic_power: "Arctic Superpower"
 md2026_can_arctic_power_tt: "Canada's sustained investment in its northern frontier pays dividends. The country emerges as the undisputed leader of Arctic governance, with world-class defense capabilities, vast resource extraction infrastructure, and a network of Arctic allies. Canada's sovereignty over its northern territories is unquestionable."
