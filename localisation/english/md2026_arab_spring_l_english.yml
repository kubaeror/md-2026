l_english:
 md2026_arab_spring.1.t:0 "Arab Spring 2.0"
 md2026_arab_spring.1.d:0 "A new wave of unprecedented protests has erupted across the country. Driven by severe economic hardship, inflation, and a lack of political freedom, millions have taken to the streets demanding the immediate resignation of the government. The situation is spiraling out of control as security forces struggle to contain the massive crowds."
 md2026_arab_spring.1.a:0 "The streets are burning."
 
 md2026_arab_spring.2.t:0 "The Regime's Crossroads"
 md2026_arab_spring.2.d:0 "The protests have reached the capital, and the demonstrators are refusing to disperse. The military and security apparatus are awaiting orders. We must decide how to handle this existential threat to the state."
 md2026_arab_spring.2.a:0 "Deploy the military. Crush the dissent."
 md2026_arab_spring.2.b:0 "Offer sweeping reforms and elections."
 
 md2026_arab_spring.3.t:0 "Civil War Erupts"
 md2026_arab_spring.3.d:0 "The situation has fractured the nation. Defecting military units have joined the protesters, and armed rebel factions have seized control of several provinces. The country has descended into a full-blown civil war."
 md2026_arab_spring.3.a:0 "A tragedy for our nation."
 
 md2026_arab_spring.4.t:0 "Order Restored"
 md2026_arab_spring.4.d:0 "Through a heavy-handed and brutal crackdown, the security forces have successfully cleared the streets. The leaders of the protest movement have been imprisoned or exiled. While the international community condemns our methods, stability has returned."
 md2026_arab_spring.4.a:0 "Stability at any cost."
 
 md2026_arab_spring.5.t:0 "A Democratic Transition"
 md2026_arab_spring.5.d:0 "The government has agreed to the protesters' demands. A transitional democratic council has been established, and free elections are being organized. The ruling party has stepped aside to allow for a peaceful transfer of power, averting a catastrophic civil war."
 md2026_arab_spring.5.a:0 "A new dawn for our people."
 
 md2026_mass_protests_unrest:0 "Mass Protests & Unrest"
 md2026_mass_protests_unrest_desc:0 "The nation is gripped by massive anti-government protests, bringing the economy to a standstill and threatening the stability of the state."
