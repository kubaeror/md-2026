l_english:
 # UKR expansion focus names
 MD2026_UKR_drone_swarm:0 "Drone Swarm Doctrine"
 MD2026_UKR_drone_swarm_desc:0 "Codify Ukraine's revolutionary drone warfare experience into official military doctrine, establishing a dedicated Drone Corps and mass-producing FPV drones, maritime drones, and long-range UAVs."
 MD2026_UKR_deep_strike:0 "Deep Strike Capability"
 MD2026_UKR_deep_strike_desc:0 "Develop the capacity to strike deep inside Russian territory — oil refineries, ammunition depots, and military-industrial facilities — degrading the enemy's ability to sustain the war."
 MD2026_UKR_domestic_arms:0 "Domestic Arms Industry"
 MD2026_UKR_domestic_arms_desc:0 "Build a robust domestic defense industry capable of producing artillery ammunition, missiles, armored vehicles, and drones at scale, reducing dependence on Western weapons deliveries."
 MD2026_UKR_iron_dome_ukraine:0 "Ukrainian Iron Dome"
 MD2026_UKR_iron_dome_ukraine_desc:0 "Construct a multi-layered air defense network capable of intercepting ballistic missiles, cruise missiles, and drone swarms, protecting Ukrainian cities and critical infrastructure from Russian bombardment."
 MD2026_UKR_marshall_plan:0 "European Marshall Plan"
 MD2026_UKR_marshall_plan_desc:0 "Secure a massive Western reconstruction commitment for Ukraine — a Marshall Plan for the 21st century — channeling hundreds of billions in grants and loans toward rebuilding shattered cities and infrastructure."
 MD2026_UKR_diaspora_return:0 "Bring the Diaspora Home"
 MD2026_UKR_diaspora_return_desc:0 "Launch programs to bring back the millions of Ukrainians who fled the war, offering financial incentives, housing support, and opportunities in the reconstruction economy."
 MD2026_UKR_digital_ukraine:0 "Digital State Rebuild"
 MD2026_UKR_digital_ukraine_desc:0 "Rebuild Ukraine as a digital-first state, accelerating the Diia e-governance platform and attracting technology companies to establish development centers in post-war Ukraine."
 MD2026_UKR_rebuilt_ukraine:0 "Ukraine Rebuilt"
 MD2026_UKR_rebuilt_ukraine_desc:0 "The reconstruction is complete. From the ruins of war, a new Ukraine has emerged — more modern, more integrated with Europe, and more resilient than the country that existed before February 2022."
 MD2026_UKR_territorial_policy:0 "Territorial Settlement Policy"
 MD2026_UKR_territorial_policy_desc:0 "Define Ukraine's official position on territorial settlement — whether to fight for every inch of pre-2014 Ukrainian territory or to pursue pragmatic peace at a cost. The choice will define Ukraine's future."
 MD2026_UKR_full_liberation:0 "Liberation of All Ukraine"
 MD2026_UKR_full_liberation_desc:0 "Ukraine will not rest until every occupied territory — Crimea, Donbas, Zaporizhzhia, Kherson — is liberated. There will be no negotiations until Russian forces leave Ukrainian soil."
 MD2026_UKR_pragmatic_peace:0 "Pragmatic Peace"
 MD2026_UKR_pragmatic_peace_desc:0 "Acknowledge the painful reality that full liberation may cost more than Ukraine can pay. A negotiated settlement that freezes the conflict and secures guaranteed Western security commitments may be the path to survival."
 MD2026_UKR_sovereign_future:0 "Sovereign Future"
 MD2026_UKR_sovereign_future_desc:0 "Regardless of where the lines are drawn, Ukraine's sovereignty and independence are inviolable. The future will be determined by Ukrainians, not in Moscow, not in Washington — in Kyiv."
 MD2026_UKR_nato_bid:0 "NATO Membership Bid"
 MD2026_UKR_nato_bid_desc:0 "Formally apply for NATO membership, triggering the Article 10 accession process and forcing every Alliance member to take a public position on Ukraine's future within the Western security architecture."
 MD2026_UKR_eu_accession:0 "EU Accession Process"
 MD2026_UKR_eu_accession_desc:0 "Accelerate Ukraine's EU accession candidacy into a full membership timeline, implementing the legislative and regulatory reforms required to integrate into the European single market."
 MD2026_UKR_transatlantic_ukraine:0 "Transatlantic Security Guarantee"
 MD2026_UKR_transatlantic_ukraine_desc:0 "Secure a bilateral security guarantee from the United States committing American military assistance — if not troops — to Ukraine's defense, providing an insurance policy against future Russian aggression."
 MD2026_UKR_europe_from_atlantic:0 "Europe from the Atlantic to the Dnieper"
 MD2026_UKR_europe_from_atlantic_desc:0 "Ukraine has completed its historic journey home to Europe — a full member of NATO and the European Union, its sovereignty guaranteed by the most powerful alliance in history. The long nightmare is over."
