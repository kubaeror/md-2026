l_english:
 MD2026_HUN_orban_legacy:0 "The Orban Legacy"
 MD2026_HUN_orban_legacy_desc:0 "Viktor Orban has transformed Hungary into Europe's most controversial democracy. His legacy divides the continent — a defender of sovereignty and Christian civilization to his supporters, an autocrat dismantling the rule of law to his critics. The choices ahead will define whether his project endures or collapses."
 MD2026_HUN_domestic_politics:0 "Domestic Consolidation"
 MD2026_HUN_domestic_politics_desc:0 "Fidesz's grip on Hungarian political life is stronger than ever, but the opposition is rebuilding. The battle for Hungary's political soul will determine the country's direction for decades."
 MD2026_HUN_fidesz_consolidation:0 "Fidesz Hegemony"
 MD2026_HUN_fidesz_consolidation_desc:0 "Entrench Fidesz's dominance across Hungary's institutions — judiciary, media, academia, and civil society. The party and the state become one."
 MD2026_HUN_opposition_crackdown:0 "Suppress the Opposition"
 MD2026_HUN_opposition_crackdown_desc:0 "Deploy the full power of the state against opposition politicians, independent media, and civil society organizations critical of the government."
 MD2026_HUN_constitutional_court:0 "Pack the Courts"
 MD2026_HUN_constitutional_court_desc:0 "Reform the Constitutional Court and appoint loyalist judges throughout the judicial hierarchy, ensuring that no legal challenge to the government can succeed."
 MD2026_HUN_managed_democracy:0 "Managed Democracy"
 MD2026_HUN_managed_democracy_desc:0 "Create the appearance of democratic competition while ensuring the outcome through media control, gerrymandering, and the systematic disadvantaging of opposition parties."
 MD2026_HUN_sovereign_hungary:0 "Sovereign Hungary Doctrine"
 MD2026_HUN_sovereign_hungary_desc:0 "Enshrine Hungarian sovereignty as the supreme constitutional principle — no EU regulation, no international court, no foreign funding can override the will of the Hungarian people as expressed through their elected government."
 MD2026_HUN_eu_policy:0 "Hungary's EU Strategy"
 MD2026_HUN_eu_policy_desc:0 "Hungary's relationship with the European Union is the central challenge of Orban's rule. Brussels sees Budapest as a threat to rule of law; Budapest sees Brussels as a threat to sovereignty."
 MD2026_HUN_eu_confrontation:0 "Confront Brussels"
 MD2026_HUN_eu_confrontation_desc:0 "Take the fight to the European Commission, vetoing budgets, blocking sanctions, and building a bloc of like-minded nations that can reshape the EU from within."
 MD2026_HUN_eu_pragmatism:0 "EU Pragmatism"
 MD2026_HUN_eu_pragmatism_desc:0 "Engage constructively with EU institutions when it serves Hungarian interests, accepting reform conditions in exchange for the release of frozen cohesion funds."
 MD2026_HUN_visegrad_leadership:0 "Visegrád Leadership"
 MD2026_HUN_visegrad_leadership_desc:0 "Lead the Visegrád Group into a coherent bloc that can veto unwanted EU legislation and present an alternative vision of Europe as a union of sovereign nation-states."
 MD2026_HUN_eu_funds_negotiation:0 "Recover EU Funds"
 MD2026_HUN_eu_funds_negotiation_desc:0 "Negotiate the release of billions in frozen EU cohesion funds by meeting the minimum rule-of-law conditions required by Brussels."
 MD2026_HUN_eu_reform_agenda:0 "Reform the EU"
 MD2026_HUN_eu_reform_agenda_desc:0 "Hungary leads the effort to reshape the EU's fundamental architecture, demanding treaty reform that entrenches national sovereignty, ends qualified majority voting on sensitive issues, and reverses federalist drift."
 MD2026_HUN_economic_sovereignty:0 "Economic Independence"
 MD2026_HUN_economic_sovereignty_desc:0 "Build a Hungarian economic model that combines openness to foreign investment with strong state direction, free from the ideological constraints of EU economic governance."
 MD2026_HUN_battery_hub:0 "Battery Manufacturing Hub"
 MD2026_HUN_battery_hub_desc:0 "Capitalize on the massive CATL and Samsung SDI battery gigafactories to make Hungary the EV battery manufacturing center of Europe."
 MD2026_HUN_eastern_opening:0 "Eastern Opening Policy"
 MD2026_HUN_eastern_opening_desc:0 "Deepen Hungary's economic ties with China, South Korea, and the Gulf states, diversifying away from dependence on the EU single market."
 MD2026_HUN_industrial_expansion:0 "Industrial Expansion"
 MD2026_HUN_industrial_expansion_desc:0 "Build on Hungary's manufacturing base to create a comprehensive industrial complex that reduces dependence on imported components and creates high-value jobs."
 MD2026_HUN_china_trade_deal:0 "China Partnership"
 MD2026_HUN_china_trade_deal_desc:0 "Sign a comprehensive economic partnership with China, welcoming BRI investment and Chinese technology companies while resisting EU attempts to screen Chinese capital."
 MD2026_HUN_economic_fortress:0 "Economic Fortress Hungary"
 MD2026_HUN_economic_fortress_desc:0 "Complete the construction of a resilient, semi-autonomous Hungarian economy that can weather EU sanctions, global recessions, and financial pressure."
 MD2026_HUN_military_development:0 "Zrínyi 2026 Program"
 MD2026_HUN_military_development_desc:0 "Hungary's military modernization program — named after the 17th century military commander Miklós Zrínyi — aims to transform the Honvéd into a modern, credible NATO force."
 MD2026_HUN_leopard_fleet:0 "Leopard 2 Tank Fleet"
 MD2026_HUN_leopard_fleet_desc:0 "Complete the acquisition and integration of Leopard 2A7 main battle tanks, giving the Honvéd a heavy armored capability it has lacked for decades."
 MD2026_HUN_airforce_modernization:0 "Air Force Modernization"
 MD2026_HUN_airforce_modernization_desc:0 "Upgrade Hungary's air force with new-generation fighters and support aircraft, replacing the aging MiG-29 fleet with Western platforms integrated into NATO air defense networks."
 MD2026_HUN_honved_reform:0 "Honvéd Reform"
 MD2026_HUN_honved_reform_desc:0 "Restructure the Hungarian Defence Forces from a hollow Cold War relic into a lean, professional army capable of territorial defense and NATO collective defense obligations."
 MD2026_HUN_defense_industry:0 "Domestic Arms Industry"
 MD2026_HUN_defense_industry_desc:0 "Establish a Hungarian domestic arms manufacturing capacity, reducing dependence on foreign suppliers for ammunition, small arms, and light vehicles."
 MD2026_HUN_regional_deterrence:0 "Regional Military Power"
 MD2026_HUN_regional_deterrence_desc:0 "Hungary emerges as a credible regional military power — a nation that its neighbors cannot ignore and that contributes meaningfully to NATO collective defense."
