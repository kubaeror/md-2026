l_english:
 MD2026_SWE_nato_integration:0 "NATO: Sweden's New Reality"
 MD2026_SWE_nato_integration_desc:0 "After 200 years of military non-alignment, Sweden joined NATO in March 2024 — a seismic shift triggered by Russia's full-scale invasion of Ukraine. The Swedish Defence Forces must now integrate into alliance structures while confronting a direct threat to Baltic Sea security."
 MD2026_SWE_nordic_security:0 "Nordic Security Architecture"
 MD2026_SWE_nordic_security_desc:0 "With both Finland and Sweden now in NATO, a coherent Nordic security architecture can be built for the first time in history — coordinating air, land, and naval forces from the Arctic to the Baltic."
 MD2026_SWE_nato_full_integration:0 "Full NATO Integration"
 MD2026_SWE_nato_full_integration_desc:0 "Complete Sweden's integration into NATO command structures, interoperability standards, and joint planning — transforming a newly-joined member into a fully capable alliance contributor."
 MD2026_SWE_nordic_battle_group:0 "Nordic Battle Group"
 MD2026_SWE_nordic_battle_group_desc:0 "Establish a permanent Nordic-Baltic joint military force capable of rapid deployment to any point on NATO's northern flank — a credible deterrent against Russian adventurism."
 MD2026_SWE_gothland_fortress:0 "Fortress Gotland"
 MD2026_SWE_gothland_fortress_desc:0 "Fortify the strategic island of Gotland with permanent military garrisons, anti-ship missiles, and air defense systems that can deny Russia control of the central Baltic Sea."
 MD2026_SWE_baltics_shield:0 "Baltic Shield"
 MD2026_SWE_baltics_shield_desc:0 "Commit Swedish forces to the defense of Estonia, Latvia, and Lithuania — making clear that any Russian attack on the Baltic states would immediately involve Sweden."
 MD2026_SWE_northern_europe_anchor:0 "Anchor of Northern Europe"
 MD2026_SWE_northern_europe_anchor_desc:0 "Sweden becomes the undisputed anchor of NATO's northern flank — a military power capable of projecting force across the Baltic Sea and coordinating the defense of Scandinavia and the Baltics."
 MD2026_SWE_defense_industry:0 "Nordic Defense Industry"
 MD2026_SWE_defense_industry_desc:0 "Sweden's defense industrial base — anchored by Saab, SAAB Kockums submarines, and BAE Systems Hägglunds — must be expanded to meet the demands of a new era of great power competition."
 MD2026_SWE_saab_expansion:0 "Saab/Gripen Expansion"
 MD2026_SWE_saab_expansion_desc:0 "Massively expand production of the JAS-39 Gripen fighter, Sweden's most successful defense export and the backbone of Nordic air power."
 MD2026_SWE_submarine_program:0 "Gotland-Class Submarine Program"
 MD2026_SWE_submarine_program_desc:0 "Expand the submarine fleet with new A26 Blekinge-class submarines, the most advanced conventional submarines in the world, essential for controlling the Baltic Sea."
 MD2026_SWE_archer_artillery:0 "Archer Artillery System"
 MD2026_SWE_archer_artillery_desc:0 "Accelerate procurement of the Archer self-propelled howitzer system — Sweden's world-class artillery platform — increasing production capacity to meet both Swedish Army needs and export demand."
 MD2026_SWE_arms_exports:0 "Defense Exports"
 MD2026_SWE_arms_exports_desc:0 "Capitalize on global demand for proven Scandinavian defense equipment, expanding arms exports to NATO partners and building defense industrial relationships."
 MD2026_SWE_defense_champion:0 "Nordic Defense Champion"
 MD2026_SWE_defense_champion_desc:0 "Sweden is established as Europe's premier mid-tier defense manufacturer — with a reputation for quality, reliability, and innovation that commands premium prices in global arms markets."
 MD2026_SWE_domestic_reform:0 "The Swedish Model — Reformed"
 MD2026_SWE_domestic_reform_desc:0 "The traditional Swedish social model is under pressure from crime, migration tensions, and welfare costs. The Moderate-led government must reform without destroying the foundations of Sweden's legendary quality of life."
 MD2026_SWE_welfare_reform:0 "Welfare State Reform"
 MD2026_SWE_welfare_reform_desc:0 "Reform Sweden's expensive welfare state to incentivize work, reduce benefit dependency, and ensure fiscal sustainability without abandoning the universal coverage that defines the Nordic model."
 MD2026_SWE_migration_policy:0 "Migration Policy Overhaul"
 MD2026_SWE_migration_policy_desc:0 "Implement Sweden's most restrictive immigration policy since World War II, reducing migration flows to levels that can be absorbed without straining integration capacity or social cohesion."
 MD2026_SWE_crime_crackdown:0 "War on Gang Crime"
 MD2026_SWE_crime_crackdown_desc:0 "Declare and execute a comprehensive crackdown on the gang violence and organized crime that has made Sweden an international outlier on gun homicides. Deploy the military if necessary."
 MD2026_SWE_economic_modernization:0 "Economic Modernization"
 MD2026_SWE_economic_modernization_desc:0 "Modernize Sweden's economy for the AI era — investing in digital infrastructure, retraining workers displaced by automation, and ensuring that Swedish companies remain globally competitive."
 MD2026_SWE_sweden_renewed:0 "Sweden Renewed"
 MD2026_SWE_sweden_renewed_desc:0 "Sweden has navigated the twin challenges of security and social cohesion — emerging stronger, more united, and more capable than it entered the 2020s."
 MD2026_SWE_green_economy:0 "Green Industrial Revolution"
 MD2026_SWE_green_economy_desc:0 "Sweden is positioned to lead Europe's green industrial revolution — with LKAB's iron ore, SSAB's fossil-free steel, and Northvolt's batteries creating a template for sustainable heavy industry."
 MD2026_SWE_nuclear_revival:0 "Nuclear Revival"
 MD2026_SWE_nuclear_revival_desc:0 "Reverse Sweden's nuclear phase-out policy and build new-generation nuclear plants, providing reliable baseload electricity for the electrification of industry and transport."
 MD2026_SWE_critical_minerals:0 "Critical Minerals Champion"
 MD2026_SWE_critical_minerals_desc:0 "Exploit Europe's largest rare earth mineral deposits, discovered in northern Sweden, to become the EU's primary source of the critical materials needed for the green transition."
 MD2026_SWE_hydrogen_economy:0 "Green Hydrogen Economy"
 MD2026_SWE_hydrogen_economy_desc:0 "Build on Sweden's renewable energy surplus to become a major green hydrogen producer, supplying Nordic and European industry with clean fuel for hard-to-decarbonize sectors."
 MD2026_SWE_northern_resources:0 "Norrland Resources"
 MD2026_SWE_northern_resources_desc:0 "Systematically develop the vast mineral wealth of Norrland — one of Europe's last great undeveloped resource frontiers — balancing extraction with indigenous Sami rights and environmental protection."
 MD2026_SWE_industrial_powerhouse:0 "Sweden: Industrial Powerhouse"
 MD2026_SWE_industrial_powerhouse_desc:0 "Sweden has transformed from a post-industrial service economy back into a manufacturing powerhouse — leading Europe in fossil-free steel, critical minerals, defense technology, and green energy."
