l_english:
 # Malaysia (MAY) focus tree localisation
 # Root
 MD2026_MAY_anwar_reform:0 "Anwar's Reform Mandate"
 MD2026_MAY_anwar_reform_desc:0 "Prime Minister Anwar Ibrahim came to power in 2022 on the promise of transformative reform -- an end to race-based politics, an assault on corruption, and a new economic model for a post-pandemic Malaysia. In 2026 he must deliver. The Madani Malaysia vision -- a civilised, compassionate, and competitive nation -- awaits its proof of concept."
 # Branch 1: Economy
 MD2026_MAY_semiconductor_hub:0 "Malaysia Semiconductor Hub"
 MD2026_MAY_semiconductor_hub_desc:0 "Malaysia is already one of the world's leading semiconductor assembly and testing centres, responsible for 13% of global chip packaging. Leveraging this position to attract advanced chip fabrication, expand skilled engineering capacity, and position Malaysia as the Southeast Asian anchor of the global semiconductor supply chain is the defining economic ambition of the decade."
 MD2026_MAY_penang_silicon:0 "Penang Silicon Island"
 MD2026_MAY_penang_silicon_desc:0 "Penang's E&E manufacturing cluster -- home to Intel, Bosch, Infineon, and dozens of the world's largest semiconductor firms -- is the beating heart of Malaysian high-tech industry. Expanding the Penang Skills Development Centre, fast-tracking the Silicon Island reclamation project, and attracting tier-one chip design firms elevates Penang into Asia's premier semiconductor hub."
 MD2026_MAY_green_economy:0 "Green Economy Transition"
 MD2026_MAY_green_economy_desc:0 "Malaysia's commitment to a green economy is not merely rhetorical -- it is economic necessity. With the EU's Carbon Border Adjustment Mechanism threatening exports and global supply chains demanding sustainability credentials, Malaysia must accelerate solar energy adoption, develop green hydrogen export infrastructure, and make the New Industrial Master Plan's sustainability pillars a commercial reality."
 MD2026_MAY_digital_asean:0 "ASEAN Digital Gateway"
 MD2026_MAY_digital_asean_desc:0 "Malaysia's digital economy -- already 23% of GDP and growing rapidly -- positions it to become the data centre hub, fintech centre, and digital infrastructure backbone of Southeast Asia. Investments in subsea cable landing stations, AI computing clusters, and the Multimedia Super Corridor 2.0 vision will make Malaysia the ASEAN digital gateway."
 MD2026_MAY_economic_titan:0 "Southeast Asian Economic Titan"
 MD2026_MAY_economic_titan_desc:0 "Malaysia has achieved what its economists once only dreamed: a high-income, technology-driven economy that leads Southeast Asia in semiconductors, digital services, and green energy. The Madani economic vision -- competitive, sustainable, and equitable -- has become the model that its ASEAN neighbours seek to emulate."
 # Branch 2: Foreign Policy
 MD2026_MAY_asean_leadership:0 "ASEAN Leadership Bid"
 MD2026_MAY_asean_leadership_desc:0 "Malaysia assumes the ASEAN chairmanship in 2025 with an ambitious agenda: revitalising the bloc's relevance in a world of great-power competition, delivering economic integration outcomes, and positioning ASEAN as a credible third force in global geopolitics. Anwar's personal ambition for Malaysian leadership aligns with a genuine opportunity to shape the region's future."
 MD2026_MAY_china_balance:0 "Calibrated China Engagement"
 MD2026_MAY_china_balance_desc:0 "Malaysia's South China Sea disputes with Beijing are a permanent feature of the relationship -- but they need not define it. A calibrated engagement strategy maintains firm positions on maritime sovereignty while deepening economic cooperation, renegotiating BRI terms in Malaysia's favour, and ensuring that Malaysia is never pressured into choosing sides in the US-China rivalry."
 MD2026_MAY_bri_reform:0 "BRI Renegotiation"
 MD2026_MAY_bri_reform_desc:0 "Malaysia successfully renegotiated the East Coast Rail Link to more favourable terms under Mahathir -- a template for a broader BRI reform agenda. Applying commercial rigour to infrastructure financing, ensuring technology transfer provisions, and restructuring onerous loan terms gives Malaysia the benefits of Chinese capital without the strategic vulnerabilities."
 MD2026_MAY_nam_tradition:0 "Non-Alignment for the 21st Century"
 MD2026_MAY_nam_tradition_desc:0 "Malaysia's Non-Aligned Movement tradition -- cultivated through decades of principled neutrality and South-South solidarity -- is a genuine strategic asset in a polarising world. Reinvigorating this tradition with a concrete Global South agenda, building coalitions around climate finance, debt relief, and reform of global economic institutions, gives Malaysia a punching weight far above its size."
 MD2026_MAY_regional_anchor:0 "ASEAN Regional Anchor"
 MD2026_MAY_regional_anchor_desc:0 "Malaysia has emerged as the indispensable regional anchor -- the country that other ASEAN members turn to for diplomatic leadership, economic partnership, and geopolitical wisdom. The combination of calibrated great-power engagement, BRI reform expertise, and Non-Aligned credibility has given Malaysia a regional influence that no other Southeast Asian nation can match."
 # Branch 3: Military
 MD2026_MAY_rmaf_modernization:0 "RMAF Modernisation Programme"
 MD2026_MAY_rmaf_modernization_desc:0 "The Royal Malaysian Air Force has long operated aging Soviet and Western platforms in an increasingly contested airspace. A comprehensive modernisation programme -- new combat aircraft, advanced radar systems, upgraded pilot training, and digital air operations infrastructure -- transforms the RMAF from a ceremonial service into a credible deterrent."
 MD2026_MAY_fa50_acquisition:0 "FA-50 Fighter Acquisition"
 MD2026_MAY_fa50_acquisition_desc:0 "Malaysia's contract for 18 FA-50 Golden Eagle fighters from Korea Aerospace Industries marks the most significant Malaysian air force procurement in a generation. The FA-50 -- a capable light combat aircraft with advanced avionics and supersonic performance -- bridges the capability gap while Malaysia determines its next-generation fighter strategy."
 MD2026_MAY_straits_security:0 "Strait of Malacca Security"
 MD2026_MAY_straits_security_desc:0 "The Strait of Malacca -- through which 40% of global maritime trade passes -- is Malaysia's most critical strategic responsibility. Enhancing the Royal Malaysian Navy's patrol capacity, upgrading coastal radar networks, and deepening cooperation with Singapore and Indonesia through the Malacca Strait Sea Patrol ensures that the world's most important waterway remains secure and open."
 MD2026_MAY_five_power:0 "Five Power Defence Revival"
 MD2026_MAY_five_power_desc:0 "The Five Power Defence Arrangements -- linking Malaysia and Singapore with Australia, New Zealand, and the United Kingdom -- are one of Asia's oldest multilateral security frameworks. Revitalising these arrangements with new exercises, updated commitments, and expanded cooperation on cyber and maritime security gives Malaysia a credible external security guarantee without compromising its non-alignment principles."
 MD2026_MAY_total_defense:0 "Total Defence Doctrine"
 MD2026_MAY_total_defense_desc:0 "Malaysia adopts a comprehensive Total Defence doctrine -- integrating military, civil, economic, social, and psychological dimensions of national resilience. Every ministry, every major corporation, and every community has a role in national security. This whole-of-nation approach transforms Malaysia's defence posture from a conventional military focused on border security into a resilient, multi-layered national defence system."
 # Branch 4: Domestic
 MD2026_MAY_madani_unity:0 "Madani Malaysia: Unity Agenda"
 MD2026_MAY_madani_unity_desc:0 "Anwar Ibrahim's Madani Malaysia framework -- built around the values of sustainability, prosperity, innovation, respect, trust, and compassion -- is the most ambitious attempt to reshape Malaysian national identity since independence. The unity agenda requires confronting the country's most difficult questions: the role of race in politics, the future of Bumiputera preferences, and what it means to be Malaysian in a diverse, modern nation."
 MD2026_MAY_anticorruption:0 "MACC Anti-Corruption Drive"
 MD2026_MAY_anticorruption_desc:0 "The 1MDB scandal -- the largest kleptocracy case in history -- permanently scarred Malaysia's international reputation and diverted billions from development. Anwar's government must demonstrate that this was an aberration, not the system. Strengthening the MACC with genuine operational independence, asset recovery mandates, and international cooperation on illicit flows sends an unambiguous signal: corruption will no longer be tolerated."
 MD2026_MAY_racial_harmony:0 "Ethnic Harmony Initiative"
 MD2026_MAY_racial_harmony_desc:0 "Malaysia's plural society -- Malay, Chinese, Indian, and the indigenous peoples of Borneo -- is its greatest social achievement and its greatest social challenge. A new Ethnic Harmony Initiative replaces the old race-based patronage model with needs-based assistance, promotes cross-ethnic civic institutions, and invests in a genuinely shared national narrative that all Malaysians can embrace."
 MD2026_MAY_federal_reform:0 "Federal-State Reform Compact"
 MD2026_MAY_federal_reform_desc:0 "Malaysia's federal system has long generated grievances from Sabah and Sarawak -- the oil-rich Borneo states that feel short-changed by Petronas revenue sharing and under-represented in federal decisions. A Federal-State Reform Compact rebalances the relationship: greater fiscal autonomy for the Borneo states, clearer federal-state competency divisions, and a genuine commitment to developing peninsular Malaysia's eastern partner states."
 MD2026_MAY_one_malaysia:0 "One Malaysia: Madani Realised"
 MD2026_MAY_one_malaysia_desc:0 "The Madani vision has been realised. Malaysia in 2026 is more united, more just, and more confident than at any point in its post-independence history. The anti-corruption drive has broken the cycle of elite impunity. The ethnic harmony initiative has replaced race-based politics with needs-based governance. The federal compact has brought Sabah and Sarawak into genuine partnership. Malaysia is one nation."
 # Malaysia national spirit names
 md2026_may_semiconductor_spirit:0 "Semiconductor Hub"
 md2026_may_semiconductor_spirit_tt:0 "Malaysia is cementing its role as the world's premier semiconductor assembly and testing hub, attracting advanced fabrication investment and skilled engineering talent."
 md2026_may_penang_spirit:0 "Penang Silicon Island"
 md2026_may_penang_spirit_tt:0 "The Penang E&E cluster has been elevated to the premier semiconductor hub in Asia, driving industrial upgrading across the entire Malaysian economy."
 md2026_may_digital_spirit:0 "ASEAN Digital Gateway"
 md2026_may_digital_spirit_tt:0 "Malaysia's data centres, fintech infrastructure, and digital connectivity make it the indispensable digital hub for Southeast Asia."
 md2026_may_economic_titan_spirit:0 "Southeast Asian Economic Titan"
 md2026_may_economic_titan_spirit_tt:0 "Malaysia has achieved high-income status, leading Southeast Asia in technology, semiconductors, and green energy exports."
 md2026_may_regional_anchor_spirit:0 "ASEAN Regional Anchor"
 md2026_may_regional_anchor_spirit_tt:0 "Malaysia is the indispensable diplomatic and economic anchor of Southeast Asia, trusted by all blocs and feared by none."
 md2026_may_fa50_spirit:0 "FA-50 Air Combat Capability"
 md2026_may_fa50_spirit_tt:0 "The Royal Malaysian Air Force's new FA-50 Golden Eagle fighters deliver a credible supersonic combat capability over the South China Sea and the Straits."
 md2026_may_straits_spirit:0 "Strait of Malacca Guardian"
 md2026_may_straits_spirit_tt:0 "Malaysia's enhanced naval patrols and Malacca Strait cooperation secure the world's most important waterway, underwriting regional commerce and security."
 md2026_may_total_defense_spirit:0 "Total Defence Nation"
 md2026_may_total_defense_spirit_tt:0 "Malaysia's whole-of-nation Total Defence doctrine integrates military, civil, and economic resilience into a comprehensive national defence posture."
 md2026_may_one_malaysia_spirit:0 "One Malaysia: Madani"
 md2026_may_one_malaysia_spirit_tt:0 "The Madani Malaysia vision has been realised -- a united, just, and prosperous nation where all ethnic communities share equitably in national success."
