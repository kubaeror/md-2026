l_english:
 # CHI expansion focus names
 MD2026_CHI_internal_security:0 "Internal Security Directorate"
 MD2026_CHI_internal_security_desc:0 "Consolidate control over the Ministry of State Security, creating an omnipresent internal surveillance apparatus that ensures no challenge to Party authority can emerge unseen."
 MD2026_CHI_common_prosperity_2:0 "Common Prosperity Drive"
 MD2026_CHI_common_prosperity_2_desc:0 "Implement Xi Jinping's vision of common prosperity, redirecting capital from tech billionaires and luxury industries toward public goods, rural development, and strategic sectors."
 MD2026_CHI_ai_surveillance:0 "AI Surveillance State"
 MD2026_CHI_ai_surveillance_desc:0 "Deploy next-generation artificial intelligence systems to monitor communications, movements, and social behavior across China, creating the world's most comprehensive surveillance network."
 MD2026_CHI_social_credit_2:0 "Social Credit 2.0"
 MD2026_CHI_social_credit_2_desc:0 "Expand and systematize the social credit scoring system, tying individual and corporate behavior to state-defined standards of trustworthiness, with automatic rewards and punishments."
 MD2026_CHI_economic_fortress:0 "Economic Fortress"
 MD2026_CHI_economic_fortress_desc:0 "Accelerate the drive to reduce China's dependence on foreign technology and markets, building self-sufficient domestic supply chains for every critical sector."
 MD2026_CHI_yuan_internationalization:0 "Petro-Yuan Initiative"
 MD2026_CHI_yuan_internationalization_desc:0 "Pursue the internationalization of the renminbi by pressuring oil exporters to price crude in yuan, undermining the petrodollar system that underpins American financial supremacy."
 MD2026_CHI_rare_earth_weapon:0 "Rare Earth Leverage"
 MD2026_CHI_rare_earth_weapon_desc:0 "Weaponize China's near-monopoly on rare earth element processing, threatening to restrict exports of the materials that underpin the global semiconductor, EV, and defense industries."
 MD2026_CHI_domestic_consumption:0 "Dual Circulation Strategy"
 MD2026_CHI_domestic_consumption_desc:0 "Implement the dual circulation economic model, prioritizing domestic consumption and internal demand to reduce vulnerability to Western decoupling and sanctions."
 MD2026_CHI_pla_reform:0 "PLA Modernization"
 MD2026_CHI_pla_reform_desc:0 "Carry out a sweeping modernization of the People's Liberation Army, professionalizing the officer corps, upgrading equipment across all branches, and purging corruption."
 MD2026_CHI_j20_expansion:0 "J-20 Stealth Expansion"
 MD2026_CHI_j20_expansion_desc:0 "Massively accelerate production of the J-20 stealth fighter, tripling the number of fifth-generation aircraft in PLA Air Force inventory to achieve qualitative parity with the United States."
 MD2026_CHI_hypersonic_2:0 "Hypersonic Strike Network"
 MD2026_CHI_hypersonic_2_desc:0 "Field a comprehensive network of hypersonic strike missiles capable of defeating American carrier groups and Taiwanese air defenses, rendering traditional deterrence concepts obsolete."
 MD2026_CHI_carrier_fleet_2:0 "Third Carrier Battle Group"
 MD2026_CHI_carrier_fleet_2_desc:0 "Commission China's third aircraft carrier battle group, extending PLA Navy power projection capability into the Indian Ocean and beyond, challenging American naval supremacy."
 MD2026_CHI_global_south_leader:0 "Voice of the Global South"
 MD2026_CHI_global_south_leader_desc:0 "Position China as the authentic representative of the developing world's interests, building a coalition of nations committed to a multipolar world order and alternatives to Western institutions."
 MD2026_CHI_brics_chair:0 "BRICS Chairmanship"
 MD2026_CHI_brics_chair_desc:0 "Leverage China's chairmanship of the BRICS bloc to establish it as the institutional alternative to the G7, expanding membership and deepening financial cooperation among member states."
 MD2026_CHI_africa_pivot_2:0 "Africa Deep Investment"
 MD2026_CHI_africa_pivot_2_desc:0 "Double down on Belt and Road investments across Africa, converting economic presence into political influence that can be mobilized in international forums against Western pressure."
 MD2026_CHI_new_world_order:0 "A New World Order"
 MD2026_CHI_new_world_order_desc:0 "The Pax Americana is over. China has built the alliances, the economic relationships, and the military power to reshape the global order on its own terms. The century of humiliation is finished."
