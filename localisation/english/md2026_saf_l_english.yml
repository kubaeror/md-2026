l_english:
 md2026_saf_eskom_crisis:0 "Eskom Crisis"
 md2026_saf_eskom_crisis_desc:0 "South Africa's state power utility Eskom is in terminal crisis. Load shedding - up to 12 hours of daily blackouts - is strangling the economy and testing the patience of the GNU coalition. Solving this is existential."
 md2026_saf_solar_revolution:0 "Solar Revolution"
 md2026_saf_solar_revolution_desc:0 "South Africa has extraordinary solar resources. An aggressive rooftop solar and utility-scale PV rollout, enabled by independent power producers, can transform the energy landscape faster than any grid upgrade."
 md2026_saf_gas_emergency:0 "Gas Emergency Imports"
 md2026_saf_gas_emergency_desc:0 "In the short term, LNG imports and emergency gas peakers can fill the power gap while structural solutions are built. It is expensive and environmentally awkward - but blackouts cost more."
 md2026_saf_grid_modernization:0 "Grid Modernization"
 md2026_saf_grid_modernization_desc:0 "A modernized transmission grid, smart metering, and battery storage infrastructure will anchor South Africa's energy future regardless of generation mix. This is the infrastructure that enables everything else."
 md2026_saf_agri_export:0 "Agricultural Exports"
 md2026_saf_agri_export_desc:0 "South Africa's wine, citrus, and grain sectors are world-class. Investing in logistics, cold chain, and market access for African and European markets can make agriculture a genuine growth engine."
 md2026_saf_gnu_cohesion:0 "GNU Coalition Cohesion"
 md2026_saf_gnu_cohesion_desc:0 "The Government of National Unity - ANC, DA, IFP, and smaller parties - is a historic experiment in South African politics. Holding it together requires constant negotiation, compromise, and managed ambition."
 md2026_saf_anti_corruption_drive:0 "Anti-Corruption Drive"
 md2026_saf_anti_corruption_drive_desc:0 "The Zondo Commission exposed the full depth of state capture under Zuma. Implementing its recommendations and prosecuting the implicated - including ANC figures - is the acid test of the GNU's seriousness."
 md2026_saf_da_influence:0 "DA Liberal Influence"
 md2026_saf_da_influence_desc:0 "The Democratic Alliance pushes for market-oriented reforms, property rights protection, and closer ties with Western economies. Their influence in the GNU could unlock foreign investment but risks alienating the ANC's left flank."
 md2026_saf_anc_dominance:0 "ANC Dominance"
 md2026_saf_anc_dominance_desc:0 "Despite its diminished mandate, the ANC remains the dominant partner in the GNU. Consolidating its control over key ministries and pushing SACP-aligned social programs reinforces the left-wing character of the governing bloc."
 md2026_saf_mk_threat:0 "MK Party Challenge"
 md2026_saf_mk_threat_desc:0 "Jacob Zuma's uMkhonto we Sizwe party emerged from the 2024 elections as a major force in KwaZulu-Natal. Navigating its populist challenge - and Zuma's personal legal battles - requires political skill and institutional resolve."
 md2026_saf_mining_revival:0 "Mining Revival"
 md2026_saf_mining_revival_desc:0 "South Africa's mining sector - gold, platinum, diamonds, chromium - remains the backbone of industrial output. Reducing regulatory uncertainty and improving energy supply could trigger a significant investment surge."
 md2026_saf_platinum_group:0 "Platinum Group Metals"
 md2026_saf_platinum_group_desc:0 "South Africa controls over 70 percent of the world's platinum group metal reserves. As hydrogen fuel cells and catalytic converters grow in importance, this geological accident of history becomes a strategic asset."
 md2026_saf_lithium_battery:0 "Battery Value Chain"
 md2026_saf_lithium_battery_desc:0 "Rather than exporting raw minerals, South Africa can capture value by building battery manufacturing capacity. The combination of local minerals, cheap solar power, and access to both EU and Chinese markets is uniquely compelling."
 md2026_saf_special_economic_zones:0 "Special Economic Zones"
 md2026_saf_special_economic_zones_desc:0 "SEZs at Coega, Richards Bay, and East London offer streamlined regulation and tax incentives. With reliable power restored, they can attract the automotive, textile, and electronics investment that South Africa needs."
 md2026_saf_brics_leadership:0 "BRICS+ Leadership"
 md2026_saf_brics_leadership_desc:0 "As a founding BRICS member and current host of its expansion, South Africa is uniquely positioned to shape the bloc's agenda. Balancing this with Western relationships requires diplomatic finesse of the highest order."
 md2026_saf_au_mediation:0 "African Union Mediation"
 md2026_saf_au_mediation_desc:0 "South Africa's diplomatic tradition - from Mandela's mediation in Burundi to the Pretoria Agreement on Ethiopia - positions it as Africa's natural peace broker. The continent's crises demand this role."
 md2026_saf_neutrality_doctrine:0 "Strategic Neutrality"
 md2026_saf_neutrality_doctrine_desc:0 "South Africa's refusal to condemn Russia's invasion of Ukraine and its participation in joint naval exercises with Russia and China reflects a principled non-alignment. We will not be a proxy for any great power."
 md2026_saf_western_pivot:0 "Western Pivot"
 md2026_saf_western_pivot_desc:0 "The economic argument for closer Western alignment is compelling: access to US markets, EU investment, and IMF flexibility. But abandoning neutrality carries a political cost within the ANC and BRICS."
 md2026_saf_sadc_security:0 "SADC Security Operations"
 md2026_saf_sadc_security_desc:0 "The SADC Mission in Mozambique targeting Al-Shabaab and the DRC crisis demand South African leadership. SANDF deployments restore regional credibility but strain an already underfunded military."
 md2026_saf_sandf_reform:0 "SANDF Reform"
 md2026_saf_sandf_reform_desc:0 "The South African National Defence Force has been chronically underfunded and poorly led for a generation. A genuine reform program - proper pay, modern doctrine, and equipment - is long overdue."
 md2026_saf_arms_industry:0 "Denel Revival"
 md2026_saf_arms_industry_desc:0 "Denel, once Africa's premier arms manufacturer, nearly collapsed under state capture. A turnaround - new management, foreign partnerships, and targeted R&D - could restore a critical strategic industrial capability."
 md2026_saf_peacekeeping_ops:0 "Peacekeeping Operations"
 md2026_saf_peacekeeping_ops_desc:0 "South Africa's peacekeeping contributions in the DRC, CAR, and Sudan have earned regional credibility. Investing in specialized peacekeeping capacity translates military capability into diplomatic influence."
 md2026_saf_nuclear_doctrine:0 "Nuclear Doctrine"
 md2026_saf_nuclear_doctrine_desc:0 "South Africa is the only country to have voluntarily dismantled its nuclear weapons. As regional pressures grow, the debate about deterrence vs. disarmament re-emerges. What role should nuclear policy play in our defense posture?"
 md2026_saf_rainbow_renaissance:0 "Rainbow Renaissance"
 md2026_saf_rainbow_renaissance_desc:0 "From Mandela's rainbow nation to the dark years of Zuma and load shedding, South Africa has survived its worst. Now, with stable power, credible institutions, and a booming mining sector, the renaissance begins."
