l_english:
 # ROOT
 md2026_phi_marcos_legacy: "Marcos Legacy"
 md2026_phi_marcos_legacy_tt: "Ferdinand Marcos Jr. consolidates political power while pursuing international legitimacy. The administration navigates between inherited controversies and reform promises."

 # BRANCH 1 — ECONOMY
 md2026_phi_bbb2_infra: "Build Better More Infrastructure"
 md2026_phi_bbb2_infra_tt: "The flagship BBM infrastructure programme enters its second phase, connecting provincial growth centres and reducing logistics bottlenecks that have long stunted Philippine economic potential."
 md2026_phi_nickel_export: "Nickel Export Drive"
 md2026_phi_nickel_export_tt: "The Philippines holds some of the world's largest nickel reserves. Expanding processing capacity and securing long-term supply contracts transforms raw ore exports into a strategic economic lever."
 md2026_phi_ofw_modernization: "OFW Modernization Programme"
 md2026_phi_ofw_modernization_tt: "Overseas Filipino Workers remit billions annually. Streamlining deployment agencies, expanding skills training, and improving financial literacy maximises the development impact of diaspora income."
 md2026_phi_tourism_revival: "Tourism Revival"
 md2026_phi_tourism_revival_tt: "Post-pandemic recovery accelerates as new resort developments, improved air connectivity, and a revamped tourist visa regime draw visitors to the archipelago's world-class beaches and cultural heritage."
 md2026_phi_economic_powerhouse: "Economic Powerhouse"
 md2026_phi_economic_powerhouse_tt: "Infrastructure, exports, remittances and tourism combine into a self-reinforcing growth engine. The Philippines claims its place among Southeast Asia's leading economies."

 # BRANCH 2 — SOUTH CHINA SEA
 md2026_phi_west_phil_sea: "West Philippine Sea"
 md2026_phi_west_phil_sea_tt: "Manila formally reaffirms its sovereign rights over the West Philippine Sea, challenging Chinese encroachment through legal, diplomatic and Coast Guard means."
 md2026_phi_us_alliance: "Reinforce the US Alliance"
 md2026_phi_us_alliance_tt: "The Mutual Defense Treaty is revitalised with enhanced access agreements, joint patrols and renewed security commitments. Washington's presence raises the cost of Chinese coercion."
 md2026_phi_asean_solidarity: "ASEAN Solidarity"
 md2026_phi_asean_solidarity_tt: "Manila builds a coalition of like-minded Southeast Asian states to present a unified front on maritime law. Vietnam, Malaysia and Brunei share overlapping claims and common concerns."
 md2026_phi_icj_victory: "Affirm the ICJ Ruling"
 md2026_phi_icj_victory_tt: "The 2016 arbitral tribunal verdict in Manila's favour is championed on the world stage. International legal legitimacy strengthens the Philippines' negotiating hand and isolates Beijing diplomatically."
 md2026_phi_maritime_zone: "Secure the Maritime Zone"
 md2026_phi_maritime_zone_tt: "With legal and diplomatic groundwork laid, the Philippine Navy and Coast Guard enforce sovereign rights across the Exclusive Economic Zone, protecting fishing communities and resource rights."

 # BRANCH 3 — MILITARY
 md2026_phi_afp_modernization: "AFP Modernization"
 md2026_phi_afp_modernization_tt: "The Armed Forces of the Philippines embarks on a multi-year modernization programme, acquiring new platforms, upgrading training standards and reforming the command structure."
 md2026_phi_f16_program: "F-16 Acquisition Programme"
 md2026_phi_f16_program_tt: "The Philippine Air Force at last secures modern multi-role fighters, ending decades of dependence on ageing aircraft. The F-16 fleet delivers credible air-defence and maritime-strike capability."
 md2026_phi_coast_guard_expansion: "Coast Guard Expansion"
 md2026_phi_coast_guard_expansion_tt: "New offshore patrol vessels, expanded recruitment and a dedicated maritime law-enforcement budget transform the Coast Guard into an effective frontline force in contested waters."
 md2026_phi_balikatan_exercises: "Balikatan Joint Exercises"
 md2026_phi_balikatan_exercises_tt: "The annual Balikatan exercises with US forces expand in scale and scope, incorporating live-fire drills, amphibious landings and cyber-warfare scenarios that sharpen interoperability."
 md2026_phi_armed_forces_capstone: "Armed Forces of the Philippines"
 md2026_phi_armed_forces_capstone_tt: "Years of sustained investment produce a modernised, battle-ready military capable of deterring aggression, responding to natural disasters and projecting stability across the archipelago."

 # BRANCH 4 — DOMESTIC
 md2026_phi_anti_dynasty: "Anti-Dynasty Legislation"
 md2026_phi_anti_dynasty_tt: "Breaking the grip of political dynasties has been a constitutional promise long unfulfilled. Landmark legislation imposes restrictions on familial office-holding, opening space for new political talent."
 md2026_phi_disaster_preparedness: "Disaster Preparedness"
 md2026_phi_disaster_preparedness_tt: "Among the world's most disaster-prone nations, the Philippines invests in early-warning systems, community resilience programmes and pre-positioned relief stockpiles to reduce the human cost of typhoons and earthquakes."
 md2026_phi_ppp_investment: "Public-Private Partnership Investment"
 md2026_phi_ppp_investment_tt: "A streamlined PPP framework reduces bureaucratic friction and guarantees investor returns, unlocking private capital for hospitals, schools, toll roads and utilities across underdeveloped regions."
 md2026_phi_federalism_reform: "Federalism Reform"
 md2026_phi_federalism_reform_tt: "Shifting power and revenue to the regions addresses decades of Metro Manila-centric governance. Mindanao and the Visayas gain the autonomy to chart their own development paths."
 md2026_phi_national_unity: "National Unity"
 md2026_phi_national_unity_tt: "Political reform, disaster resilience and shared prosperity weave together a stronger national fabric. The Philippines enters a new era of inclusive governance and social cohesion."
