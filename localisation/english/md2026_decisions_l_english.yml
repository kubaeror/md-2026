 md2026_ru_ukr_war_category:0 "Russia-Ukraine War"

 md2026_tighten_russia_sanctions:0 "Tighten Sanctions on Russia"
 md2026_tighten_russia_sanctions_desc:0 "Impose additional economic sanctions on Russia in coordination with Western allies. This will further restrict Russian access to international markets and financial systems, but may provoke retaliatory measures."
 md2026_lift_russia_sanctions:0 "Lift Sanctions on Russia"
 md2026_lift_russia_sanctions_desc:0 "Pursue the removal of Western economic sanctions on Russia. This controversial move will improve relations with Moscow but is likely to draw sharp criticism from allied nations and undermine Western unity."
 md2026_escalate_iran_sanctions:0 "Escalate Sanctions on Iran"
 md2026_escalate_iran_sanctions_desc:0 "Intensify the existing sanctions regime against Iran, further targeting its oil exports and financial sector. This will increase economic pressure on Tehran but may complicate diplomatic efforts."
 md2026_iran_nuclear_deal:0 "Negotiate Iran Nuclear Deal"
 md2026_iran_nuclear_deal_desc:0 "Pursue a comprehensive nuclear agreement with Iran to limit its uranium enrichment program in exchange for sanctions relief. This will face opposition from Israel and Saudi Arabia."
 md2026_counter_sanctions:0 "Impose Counter-Sanctions"
 md2026_counter_sanctions_desc:0 "Retaliate against Western economic sanctions by imposing counter-measures targeting Western businesses and restricting exports of critical resources. This will stabilize domestic morale but deepen international isolation."

 md2026_increase_defense_spending:0 "Increase Defense Spending"
 md2026_increase_defense_spending_desc:0 "Commit to increasing defense expenditure to meet NATO's spending targets. This will bolster military readiness and war support, but requires redirecting funds from other priorities."
 md2026_deploy_nato_battlegroup:0 "Deploy NATO Battlegroup"
 md2026_deploy_nato_battlegroup_desc:0 "Deploy a multinational NATO battlegroup to Eastern European member states as a deterrent against potential aggression. This forward deployment will provoke a strong reaction from Russia."
 md2026_nato_joint_exercises:0 "Conduct NATO Joint Exercises"
 md2026_nato_joint_exercises_desc:0 "Organize large-scale joint military exercises with NATO allies to improve interoperability and demonstrate collective defense resolve. Participating forces will gain valuable combat experience."
 md2026_request_nato_consultation:0 "Request NATO Consultation"
 md2026_request_nato_consultation_desc:0 "Invoke Article 4 of the NATO Treaty to request formal consultations with allies regarding threats to territorial integrity and national security. This will rally allied support and solidarity."

 md2026_apply_brics_membership:0 "Apply for BRICS+ Membership"
 md2026_apply_brics_membership_desc:0 "Submit a formal application to join the BRICS+ bloc of emerging economies. Membership will improve relations with China, Russia, India, and Brazil, and signal a shift away from Western alignment."
 md2026_escalate_trade_war:0 "Escalate Trade War with China"
 md2026_escalate_trade_war_desc:0 "Impose a new round of tariffs on Chinese imports to address the trade deficit and protect domestic industries. China will retaliate with counter-tariffs, disrupting bilateral trade."
 md2026_recognize_taiwan:0 "Recognize Taiwan"
 md2026_recognize_taiwan_desc:0 "Extend formal diplomatic recognition to Taiwan as a sovereign state. This will dramatically improve relations with Taipei but provoke a severe response from Beijing and risk destabilizing the region."
 md2026_military_aid_ukraine:0 "Provide Military Aid to Ukraine"
 md2026_military_aid_ukraine_desc:0 "Send weapons and military equipment to Ukraine to support its defense against Russian aggression. This will anger Moscow but strengthen ties with Kyiv and demonstrate alliance solidarity."
 md2026_propose_ceasefire:0 "Propose Ukraine Ceasefire"
 md2026_propose_ceasefire_desc:0 "Launch a diplomatic initiative to broker a ceasefire between Russia and Ukraine. Success is uncertain, but the effort may create an opening for peace negotiations."

 md2026_procure_drones:0 "Procure Drone Systems"
 md2026_procure_drones_desc:0 "Invest in the procurement and development of unmanned aerial systems for reconnaissance and combat operations. Drone warfare capabilities have proven decisive in modern conflicts."
 md2026_cyber_warfare_program:0 "Establish Cyber Warfare Program"
 md2026_cyber_warfare_program_desc:0 "Create a dedicated offensive and defensive cyber warfare capability. This program will enable the conduct of cyber operations against adversaries and protect critical national infrastructure from digital attacks."
 md2026_military_ai_development:0 "Develop Military AI Systems"
 md2026_military_ai_development_desc:0 "Launch a research program to integrate artificial intelligence into military command, control, and weapons systems. This will provide significant technological advantages and research bonuses."
 md2026_expand_special_forces:0 "Expand Special Forces"
 md2026_expand_special_forces_desc:0 "Increase the size and capability of special operations forces through expanded recruitment and advanced training programs. These elite units provide asymmetric advantages in modern warfare."
 md2026_fortify_borders:0 "Fortify Border Regions"
 md2026_fortify_borders_desc:0 "Construct defensive fortifications along vulnerable border areas in response to nearby armed conflicts. Border defenses will improve territorial security and bolster war support."

 md2026_energy_independence:0 "Pursue Energy Independence"
 md2026_energy_independence_desc:0 "Launch a comprehensive program to reduce dependence on foreign energy imports through renewable energy development, nuclear power expansion, and diversification of supply sources."
 md2026_infrastructure_investment:0 "National Infrastructure Investment"
 md2026_infrastructure_investment_desc:0 "Allocate funds for the construction and modernization of critical national infrastructure, including transportation networks, utilities, and communications systems."
 md2026_digital_economy:0 "Digital Economy Initiative"
 md2026_digital_economy_desc:0 "Launch a national strategy to accelerate digital transformation across the economy, investing in computing technology, digital infrastructure, and workforce retraining."
 md2026_arms_export_program:0 "Establish Arms Export Program"
 md2026_arms_export_program_desc:0 "Develop a formal defense export strategy to market domestically produced weapons systems to international buyers. This will generate revenue, strengthen defense industry, and build strategic partnerships."
 md2026_anti_corruption:0 "Anti-Corruption Campaign"
 md2026_anti_corruption_desc:0 "Launch a comprehensive anti-corruption initiative targeting government institutions and the private sector. While initially disruptive, the campaign will ultimately improve governance and public trust."

 md2026_sov_war_economy_decision:0 "Transition to War Economy"
 md2026_sov_war_economy_decision_desc:0 "Shift the Russian economy onto a wartime footing, redirecting civilian production toward military output. This will boost arms manufacturing but reduce domestic stability."
 md2026_sov_shadow_fleet_sales:0 "Shadow Fleet Oil Sales"
 md2026_sov_shadow_fleet_sales_desc:0 "Circumvent Western oil price caps by using a shadow fleet of aging tankers to sell crude oil above sanctioned prices on the black market. This generates vital revenue but further antagonizes Western nations."

 md2026_chi_belt_road_expansion:0 "Expand Belt and Road Initiative"
 md2026_chi_belt_road_expansion_desc:0 "Accelerate investment in Belt and Road infrastructure projects across developing nations. This will expand Chinese economic influence globally and improve relations with non-aligned countries."
 md2026_chi_tech_self_sufficiency:0 "Technology Self-Sufficiency Campaign"
 md2026_chi_tech_self_sufficiency_desc:0 "Launch a massive state-backed effort to achieve technological independence in semiconductor manufacturing, artificial intelligence, and other critical sectors currently dependent on Western supply chains."

 md2026_raj_space_program:0 "Expand Space Program"
 md2026_raj_space_program_desc:0 "Accelerate India's space exploration and satellite development capabilities through increased funding for ISRO. A successful program will yield technological dividends but may intensify competition with other space powers."

 md2026_nko_nuclear_test:0 "Conduct Nuclear Test"
 md2026_nko_nuclear_test_desc:0 "Carry out an underground nuclear weapons test to demonstrate the regime's nuclear deterrent capability. This will provoke universal condemnation but bolster the regime's military posture."
 md2026_nko_missile_provocation:0 "Ballistic Missile Launch"
 md2026_nko_missile_provocation_desc:0 "Conduct a provocative ballistic missile test launch, demonstrating advancing delivery capabilities. This will anger South Korea, Japan, and the United States, but reinforce domestic propaganda narratives."
 md2026_nko_diplomatic_outreach:0 "Diplomatic Outreach"
 md2026_nko_diplomatic_outreach_desc:0 "Initiate rare diplomatic overtures toward South Korea, the United States, and China. This shift from belligerence to engagement may yield improved relations and domestic stability."

 md2026_per_nuclear_acceleration:0 "Accelerate Nuclear Program"
 md2026_per_nuclear_acceleration_desc:0 "Escalate uranium enrichment activities and advance weapons-grade nuclear development. This will provoke severe international backlash and further sanctions but move Iran toward nuclear deterrent capability."

 md2026_sau_vision_acceleration:0 "Accelerate Vision 2030"
 md2026_sau_vision_acceleration_desc:0 "Fast-track Saudi Arabia's ambitious economic diversification program, investing heavily in megaprojects, industrial zones, and entertainment infrastructure to reduce dependence on oil revenues."
 md2026_sau_normalize_israel:0 "Normalize Relations with Israel"
 md2026_sau_normalize_israel_desc:0 "Pursue a historic normalization agreement with Israel, establishing full diplomatic relations. This will strengthen ties with Washington and Jerusalem but provoke fierce opposition from Iran and domestic conservatives."

 md2026_nuclear_modernization:0 "Nuclear Arsenal Modernization"
 md2026_nuclear_modernization_desc:0 "Undertake a comprehensive modernization of the nuclear weapons arsenal, upgrading warheads, delivery systems, and command and control infrastructure to maintain credible deterrence."
 md2026_nuclear_posturing:0 "Nuclear Posturing"
 md2026_nuclear_posturing_desc:0 "Publicly signal willingness to employ nuclear weapons in the current conflict through heightened alert levels and threatening rhetoric. This dangerous escalation will intimidate adversaries but risks catastrophic miscalculation."
 md2026_develop_nuclear_weapons:0 "Develop Nuclear Weapons"
 md2026_develop_nuclear_weapons_desc:0 "Embark on a clandestine nuclear weapons development program to acquire an independent nuclear deterrent. This will draw universal condemnation from the international community if discovered."

 md2026_cyber_attack_infrastructure:0 "Cyber Attack on Enemy Infrastructure"
 md2026_cyber_attack_infrastructure_desc:0 "Launch a sophisticated cyber operation targeting enemy industrial facilities and critical infrastructure. Success will damage enemy production capacity, but there is a significant risk of detection and retaliation."
 md2026_cyber_steal_technology:0 "Cyber Espionage Operation"
 md2026_cyber_steal_technology_desc:0 "Conduct a covert cyber espionage campaign to steal advanced technology and research data from rival nations. If successful, this will yield valuable research bonuses. Discovery will have diplomatic consequences."
 md2026_cyber_defense_upgrade:0 "Upgrade Cyber Defenses"
 md2026_cyber_defense_upgrade_desc:0 "Invest in strengthening national cybersecurity infrastructure, deploying advanced intrusion detection systems and hardening critical networks against foreign cyber attacks."

 md2026_proxy_support_sov:0 "Russian Proxy Operations"
 md2026_proxy_support_sov_desc:0 "Deploy Russian military advisors and supply weapons to proxy forces in regional conflicts to extend strategic influence. This will strain relations with the United States and France."
 md2026_proxy_support_usa:0 "American Proxy Operations"
 md2026_proxy_support_usa_desc:0 "Provide covert military support to allied proxy forces in ongoing regional conflicts to counter adversarial influence. This will provoke backlash from Russia and Iran."
 md2026_proxy_support_per:0 "Iranian Proxy Operations"
 md2026_proxy_support_per_desc:0 "Expand support to Iranian-backed militia networks across the Middle East to project power and confront regional rivals. This will further deteriorate relations with Israel, Saudi Arabia, and the United States."

 md2026_ukr_drone_strikes:0 "Drone Strikes on Russian Territory"
 md2026_ukr_drone_strikes_desc:0 "Launch long-range drone strikes against Russian industrial and military infrastructure behind the front lines. These operations will damage enemy production capacity and undermine Russian civilian morale."
 md2026_sov_convict_mobilization:0 "Convict Mobilization"
 md2026_sov_convict_mobilization_desc:0 "Recruit prisoners from the penal system into military service in exchange for reduced sentences. This provides desperately needed manpower but severely damages domestic stability and military discipline."
 md2026_eu_artillery_initiative:0 "European Artillery Production Initiative"
 md2026_eu_artillery_initiative_desc:0 "Coordinate with European partners to ramp up artillery ammunition production and deliver supplies to Ukraine. This will boost domestic arms production while providing critical support to the Ukrainian front."
