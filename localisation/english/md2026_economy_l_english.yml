l_english:
 md2026_economy_boom:0 "Economic Boom"
 md2026_economy_boom_desc:0 "Our economy is experiencing a period of rapid growth and high consumer confidence."
 md2026_economy_stable:0 "Stable Economy"
 md2026_economy_stable_desc:0 "Our economy is stable, with moderate growth and manageable inflation."
 md2026_economy_recession:0 "Economic Recession"
 md2026_economy_recession_desc:0 "We are currently in a recession. Industrial output is down, and consumer confidence is shaken."
 md2026_economy_crisis:0 "Economic Crisis"
 md2026_economy_crisis_desc:0 "Our economy is in a severe crisis, severely impacting our industrial capacity and national stability."
 
 md2026_stimulus_package:0 "Economic Stimulus Package"
 md2026_stimulus_package_desc:0 "Inject massive amounts of government capital into the economy to stimulate growth and bring us out of the current downturn."
 
 md2026_austerity_measures:0 "Implement Austerity Measures"
 md2026_austerity_measures_desc:0 "Cut government spending and social programs to regain political capital and stabilize our financial reserves, despite the unpopularity."
 
 md2026_quantitative_easing:0 "Quantitative Easing"
 md2026_quantitative_easing_desc:0 "Increase the money supply to encourage lending and investment, pushing our stable economy into a boom at the cost of slight inflation and instability."
