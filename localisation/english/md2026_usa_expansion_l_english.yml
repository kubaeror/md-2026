 l_english:
 MD2026_USA_reindustrialize:0 "American Reindustrialization"
 MD2026_USA_reindustrialize_desc:0 "Launch a comprehensive program to rebuild America's manufacturing base, incentivizing domestic production of critical goods and reversing decades of offshoring."
 MD2026_USA_chips_act_2:0 "CHIPS Act 2.0"
 MD2026_USA_chips_act_2_desc:0 "Massively expand funding for domestic semiconductor manufacturing, establishing the United States as the world's leading producer of advanced chips and reducing dependence on Taiwan."
 MD2026_USA_ai_frontier:0 "AI Frontier Initiative"
 MD2026_USA_ai_frontier_desc:0 "Channel federal investment into artificial intelligence research and development, ensuring American dominance in the technology that will define the 21st century."
 MD2026_USA_infrastructure_2:0 "Infrastructure Decade"
 MD2026_USA_infrastructure_2_desc:0 "Launch the most ambitious infrastructure investment program since the Interstate Highway System, modernizing roads, bridges, rail, and the electric grid."
 MD2026_USA_reagan_buildup_2:0 "Reagan Buildup 2.0"
 MD2026_USA_reagan_buildup_2_desc:0 "Embark on the largest peacetime military buildup in American history, modernizing every branch of the armed forces and re-establishing overwhelming military superiority."
 MD2026_USA_sixth_gen_fighter:0 "Sixth-Generation Fighter Program"
 MD2026_USA_sixth_gen_fighter_desc:0 "Accelerate development of the next-generation air superiority fighter — designated F-47 — incorporating stealth, AI co-pilots, and directed-energy weapons to dominate future air combat."
 MD2026_USA_navy_600_ships:0 "600-Ship Navy"
 MD2026_USA_navy_600_ships_desc:0 "Resurrect Reagan's vision of a 600-ship Navy, commissioning new carriers, destroyers, and submarines to maintain American naval supremacy across all ocean theaters."
 MD2026_USA_hypersonic_program:0 "Hypersonic Weapons Program"
 MD2026_USA_hypersonic_program_desc:0 "Develop and field hypersonic missiles capable of defeating any existing defense system, closing the gap with Russia and China in this critical emerging technology."
 MD2026_USA_americas_first:0 "Americas First"
 MD2026_USA_americas_first_desc:0 "Assert American primacy across the Western Hemisphere, treating the Americas as an exclusive sphere of US influence and pushing back against Chinese and Russian inroads."
 MD2026_USA_canada_51st_state:0 "Canada: The 51st State"
 MD2026_USA_canada_51st_state_desc:0 "Intensify pressure on Canada to consider political union with the United States, leveraging economic dependency and tariff threats to bring Ottawa to the negotiating table."
 MD2026_USA_monroe_doctrine_2:0 "Monroe Doctrine Revival"
 MD2026_USA_monroe_doctrine_2_desc:0 "Formally revive and expand the Monroe Doctrine for the 21st century, declaring that foreign powers — especially China and Russia — have no place in the Western Hemisphere."
 MD2026_USA_latin_america_pressure:0 "Latin America Pressure Campaign"
 MD2026_USA_latin_america_pressure_desc:0 "Apply sustained economic and diplomatic pressure on left-wing governments in Latin America, undermining regimes hostile to American interests."
 MD2026_USA_western_hemisphere_pact:0 "Western Hemisphere Security Pact"
 MD2026_USA_western_hemisphere_pact_desc:0 "Establish a formal multilateral security framework for the Americas, uniting democratic nations under American leadership against external threats and internal instability."
 MD2026_USA_democracy_crossroads:0 "Democracy at the Crossroads"
 MD2026_USA_democracy_crossroads_desc:0 "American democracy faces its greatest test since the Civil War. The choices made now — to restore institutions or consolidate executive power — will determine the character of the republic for generations."
 MD2026_USA_restore_institutions:0 "Restore the Institutions"
 MD2026_USA_restore_institutions_desc:0 "Reverse the erosion of democratic norms, restoring the independence of the judiciary, civil service, and free press. America will recommit to the rule of law at home and abroad."
 MD2026_USA_consolidate_power:0 "Consolidate Executive Power"
 MD2026_USA_consolidate_power_desc:0 "Bend the institutions to the will of the executive, placing loyalists throughout the federal bureaucracy and judiciary to ensure the agenda faces no institutional resistance."
 MD2026_USA_supreme_court_reform:0 "Supreme Court Reform"
 MD2026_USA_supreme_court_reform_desc:0 "Restructure the Supreme Court and the federal judiciary to reflect the political priorities of the current administration, resolving the long-running battle over the courts."
