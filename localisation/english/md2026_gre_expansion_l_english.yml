l_english:
 # Greece (GRE) focus tree localisation
 # Root
 MD2026_GRE_hellenic_revival:0 "Hellenic Revival"
 MD2026_GRE_hellenic_revival_desc:0 "Greece has endured a decade of economic pain, a migration crisis, and an increasingly aggressive Turkey. Yet Greece endures — and now, from this crucible, a genuine Hellenic revival is possible. The question is whether Athens will seize the moment."
 # Branch 1: Turkey Tensions
 MD2026_GRE_aegean_sovereignty:0 "Aegean Sovereignty"
 MD2026_GRE_aegean_sovereignty_desc:0 "Turkey's increasingly aggressive posture in the Aegean — challenging Greek airspace, disputing maritime boundaries, and threatening military action — demands a comprehensive Greek response that secures Hellenic sovereignty over the Aegean."
 MD2026_GRE_air_defense_upgrade:0 "Hellenic Air Force Upgrade"
 MD2026_GRE_air_defense_upgrade_desc:0 "Greece's commitment to purchase F-35A Lightning II fighters will transform the Hellenic Air Force into a first-rate NATO air power. Combined with upgraded Patriot and SAMP/T air defence systems, Greece's skies will be impenetrable."
 MD2026_GRE_naval_expansion:0 "Hellenic Navy Expansion"
 MD2026_GRE_naval_expansion_desc:0 "The Hellenic Navy's frigate modernisation program — new FDI HN frigates from France — combined with submarine upgrades will give Greece credible naval deterrence in the Aegean and Eastern Mediterranean, matching Turkey hull for hull."
 MD2026_GRE_aegean_patrol:0 "Aegean Maritime Patrol"
 MD2026_GRE_aegean_patrol_desc:0 "Establish a permanent Aegean Maritime Patrol capability — coordinating coast guard, navy, and air force assets to monitor and respond to Turkish provocations, enforce Greek sovereign rights, and protect the islands."
 MD2026_GRE_eastern_med_partnership:0 "Eastern Mediterranean Partnership"
 MD2026_GRE_eastern_med_partnership_desc:0 "Build a strategic trilateral energy and security partnership with Egypt, Israel, and Cyprus. This Eastern Mediterranean axis provides Greece with strategic depth, shared energy infrastructure, and a network of aligned interests against Turkish expansionism."
 MD2026_GRE_hellenic_deterrent:0 "Hellenic Regional Deterrent"
 MD2026_GRE_hellenic_deterrent_desc:0 "Greece has achieved genuine regional deterrence — a military capability that forces Turkey to calculate very carefully before any provocative action. Backed by NATO membership and regional partnerships, Greece has never been more secure."
 # Branch 2: Economic Recovery
 MD2026_GRE_economic_reform:0 "Economic Reform Program"
 MD2026_GRE_economic_reform_desc:0 "Greece's economy is finally growing again after the catastrophic years of the debt crisis. Building on this fragile recovery requires structural reforms, investment attraction, and a clear economic strategy that moves Greece beyond its historic weaknesses."
 MD2026_GRE_debt_restructuring:0 "EU Debt Relief"
 MD2026_GRE_debt_restructuring_desc:0 "Negotiate a final European debt relief package that provides Greece with sustainable debt levels, lower interest payments, and the fiscal space to invest in the future — finally closing the chapter on the sovereign debt crisis."
 MD2026_GRE_tourism_powerhouse:0 "Premium Tourism"
 MD2026_GRE_tourism_powerhouse_desc:0 "Greece attracts over 30 million tourists per year — but most are budget visitors. A strategic pivot toward premium and sustainable tourism will maximise revenue while protecting the natural and cultural assets that make Greece irreplaceable."
 MD2026_GRE_shipping_industry:0 "Expand Merchant Shipping"
 MD2026_GRE_shipping_industry_desc:0 "Greek shipowners control the world's largest commercial fleet. Leverage this unparalleled maritime strength — supporting Greek-flagged vessels, expanding Piraeus as a global logistics hub, and developing ship maintenance and repair capacity."
 MD2026_GRE_tech_greece:0 "Greek Tech Ecosystem"
 MD2026_GRE_tech_greece_desc:0 "Athens has quietly developed a growing tech startup scene, driven by the Greek diaspora returning home and international companies establishing regional hubs. Accelerate this trend with targeted investment, talent programs, and infrastructure."
 MD2026_GRE_mediterranean_economy:0 "Mediterranean Economic Hub"
 MD2026_GRE_mediterranean_economy_desc:0 "Greece has transformed its economy from a cautionary tale of debt and austerity into a genuine Mediterranean economic hub — gateway to the Balkans, anchor of Eastern Mediterranean trade, and home to world-class maritime and technology industries."
 # Branch 3: Energy
 MD2026_GRE_energy_hub:0 "Energy Hub Strategy"
 MD2026_GRE_energy_hub_desc:0 "Greece sits at the intersection of European energy needs and Eastern Mediterranean gas reserves. A coherent energy hub strategy could transform Greece from a gas importer into a regional energy broker — with all the geopolitical and economic benefits that entails."
 MD2026_GRE_eastmed_pipeline:0 "East Med Gas Pipeline"
 MD2026_GRE_eastmed_pipeline_desc:0 "Revive the EastMed Pipeline project — a proposed undersea pipeline bringing Israeli and Cypriot natural gas through Greek territory to European markets. Despite setbacks, the energy security imperative has never been stronger."
 MD2026_GRE_renewables:0 "Solar and Wind Expansion"
 MD2026_GRE_renewables_desc:0 "Greece enjoys over 300 days of sunshine per year and powerful Aegean winds. Massively expanding solar and wind generation capacity will reduce energy costs, achieve energy independence, and position Greece as a renewable energy exporter."
 MD2026_GRE_lng_terminal:0 "LNG Terminal Expansion"
 MD2026_GRE_lng_terminal_desc:0 "Expand the Revithoussa LNG terminal near Athens and build new regasification facilities, giving Greece the capacity to import LNG from the United States, Qatar, and other producers — ending dependence on Russian pipeline gas and creating an export business."
 MD2026_GRE_greece_eu_energy:0 "EU Energy Broker"
 MD2026_GRE_greece_eu_energy_desc:0 "Position Greece as the European Union's energy broker for the Eastern Mediterranean — the conduit through which Israeli gas, Egyptian LNG, and Greek renewables reach energy-hungry European markets."
 MD2026_GRE_energy_champion:0 "Southeast Europe Energy Champion"
 MD2026_GRE_energy_champion_desc:0 "Greece has achieved its ambition — a fully realised energy hub for Southeast Europe and the Eastern Mediterranean. Gas pipelines, LNG terminals, and renewable exports flow through Greece to fuel European economies and secure Hellenic influence."
 # Branch 4: Balkans and Migration
 MD2026_GRE_balkan_strategy:0 "Balkan Strategy"
 MD2026_GRE_balkan_strategy_desc:0 "Greece is the southernmost anchor of the Balkans — a NATO and EU member surrounded by states at various stages of integration with Western institutions. A coherent Balkan strategy can expand Greek influence and stabilise Greece's most volatile neighbourhood."
 MD2026_GRE_border_control:0 "Evros Border Wall"
 MD2026_GRE_border_control_desc:0 "Extend and reinforce the Evros border barrier along the Greek-Turkish land border — the primary entry point for illegal migration into the EU. Combined with enhanced coast guard patrols, Greece will finally control its borders."
 MD2026_GRE_eu_solidarity:0 "EU Migration Solidarity"
 MD2026_GRE_eu_solidarity_desc:0 "Greece has borne a disproportionate share of Europe's migration burden for a decade. Secure a genuine EU solidarity mechanism — mandatory burden sharing, external processing centres, and financial support — that finally treats Greece's border as Europe's border."
 MD2026_GRE_balkan_cooperation:0 "Balkan Stability Initiative"
 MD2026_GRE_balkan_cooperation_desc:0 "Launch a Hellenic-led Balkan stability initiative — supporting EU accession for Western Balkans states, mediating bilateral disputes, and extending Greek economic influence northward into a more stable, more prosperous neighbourhood."
 MD2026_GRE_diaspora_investment:0 "Greek Diaspora Investment"
 MD2026_GRE_diaspora_investment_desc:0 "Tap into the enormous wealth and talent of the global Greek diaspora — estimated at seven million people worldwide with significant concentrations in the United States, Australia, Germany, and the United Kingdom — to drive investment and innovation at home."
 MD2026_GRE_hellenic_influence:0 "Hellenic Regional Influence"
 MD2026_GRE_hellenic_influence_desc:0 "Greece has established itself as the preeminent Hellenic power in the Eastern Mediterranean and Balkans — a respected voice in European councils, a stable anchor in a turbulent region, and a nation whose diaspora, history, and geography give it influence far beyond its size."
