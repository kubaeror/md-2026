 ### MD2026 Elections 2025 - Polish Localisation ###

 ### EVENTS ###

 ## Polska: Zwyciestwo Nawrockiego ##
 md2026_elections_2025.1.t:0 "Polska: Nawrocki wygrywa wybory prezydenckie"
 md2026_elections_2025.1.d:0 "W zaskakujacym zwrocie, ktory wstrzasnal polska polityka, Karol Nawrocki — kandydat popierany przez PiS i byly dyrektor IPN — wygral wybory prezydenckie z wynikiem 50,89% glosow, pokonujac Rafala Trzaskowskiego z Platformy Obywatelskiej. Polska wchodzi w bezprecedensowy okres kohabitacji: prezydent zwiazany z PiS dysponuje prawem weta wobec legislacji, a liberalny rzad Tuska posiada wiekszosc parlamentarna. Trybunal Konstytucyjny, reforma sadownictwa i relacje z UE wiszą na wlosku."
 md2026_elections_2025.1.o1:0 "Musimy nauczyc sie z nim wspolpracowac."
 md2026_elections_2025.1.o2:0 "Nie ugniemy sie przed obstrukcja PiS!"
 md2026_elections_2025.1.o3:0 "Niech narod zdecyduje — oglosmy przedterminowe wybory."

 ## Polska: Kryzys weta budzetowego ##
 md2026_elections_2025.2.t:0 "Polska: Kryzys weta prezydenckiego"
 md2026_elections_2025.2.d:0 "Prezydent Nawrocki skorzystal z konstytucyjnego prawa weta wobec kluczowych ustaw rzadowych, w tym budzetu panstwa i reformy sadownictwa. Rzad Tuska stoi przed krytycznym wyborem: szukac kompromisu, ktory rozwodni program rzadu, probowac obalic weto wiekszoscia trzech piatych, ktorej moze nie posiadac, lub porzucic sporne ustawy. Impas sparalizowal proces legislacyjny i wyslal fale szoku przez UE."
 md2026_elections_2025.2.o1:0 "Negocjujmy kompromis budzetowy."
 md2026_elections_2025.2.o2:0 "Obalmy weto — konfrontacja konstytucyjna."
 md2026_elections_2025.2.o3:0 "Porzucmy sporne ustawy."

 ## Polska: Rozwiazanie kohabitacji ##
 md2026_elections_2025.3.t:0 "Polska: Pytanie o kohabitacje"
 md2026_elections_2025.3.d:0 "Miesiace politycznej gry na krawedzi miedzy prezydentem Nawrockim a premierem Tuskiem postawily Polske na rozdrożu. Ciagle weta i kontrruchy wyczerpaly obie strony i cierpliwosc opinii publicznej. Jedni wzywaja do pragmatycznego wspolistnienia, inni widza szanse na przejecie inicjatywy. UE i sojusznicy z NATO obserwuja z niepokojem, swiadomi, ze wewnetrzna stabilnosc Polski jest kluczowa dla bezpieczenstwa Europy Wschodniej."
 md2026_elections_2025.3.o1:0 "Pragmatyczne wspolistnienie — obie strony ustepuja."
 md2026_elections_2025.3.o2:0 "Nawrocki dominuje — agenda PiS posuwa sie naprzod."
 md2026_elections_2025.3.o3:0 "Rzad upada pod ciezarem kryzysu."

 ## Polska: Przedterminowe wybory parlamentarne ##
 md2026_elections_2025.4.t:0 "Polska: Przedterminowe wybory parlamentarne"
 md2026_elections_2025.4.d:0 "Impas polityczny okazal sie nie do przezwyciezenia. Poniewaz rzad nie jest w stanie przeforsowac ustaw, a zaufanie publiczne do instytucji spada, ogłoszono przedterminowe wybory parlamentarne. Kampania jest zacieta — PiS, uskrzydlony prezydentura Nawrockiego, dazy do jednolitego rzadu. Platforma Obywatelska walczy o utrzymanie wladzy pod przywodztwem Tuska, a mniejsze partie wycuwaja szanse w chaosie."
 md2026_elections_2025.4.o1:0 "PiS wygrywa — wreszcie jednolity rzad."
 md2026_elections_2025.4.o2:0 "Platforma utrzymuje sie — Tusk zwycięza."
 md2026_elections_2025.4.o3:0 "Powstaje nowa centrowa koalicja."

 ## Niemcy: Napięcia w Wielkiej Koalicji ##
 md2026_elections_2025.5.t:0 "Niemcy: Wielka Koalicja pod presja"
 md2026_elections_2025.5.d:0 "Wielka koalicja CDU/SPD kanclerza Friedricha Merza, utworzona po przyspieszonych wyborach w lutym 2025, juz wykazuje oznaki napiec. SPD, sprowadzona do roli mlodszego partnera po najgorszym wyniku od dziesiecioleci, niecierpliwi sie pod dominacja CDU w polityce fiskalnej i migracyjnej. Tymczasem AfD z 20,8% glosow nadal wplywa na dyskurs polityczny spoza koalicji. Merz musi zdecydowac, jak rzadzic: forsowac konserwatywne reformy, isc na kompromis z SPD, czy skoncentrowac energie koalicji na walce z zagrożeniem skrajnej prawicy."
 md2026_elections_2025.5.o1:0 "Forsujmy reformy CDU — mamy mandat."
 md2026_elections_2025.5.o2:0 "Kompromis z SPD — stabilnosc przede wszystkim."
 md2026_elections_2025.5.o3:0 "Zjednoczmy sie przeciwko zagrożeniu AfD."

 ## Niemcy: Debata o funduszu infrastrukturalnym ##
 md2026_elections_2025.6.t:0 "Niemcy: Debata o inwestycjach infrastrukturalnych"
 md2026_elections_2025.6.d:0 "Kanclerz Merz zaproponowal potezny Sondervermogen — specjalny fundusz infrastrukturalny warty setki miliardow euro — na modernizacje zniszczonych drog, mostow, kolei i infrastruktury cyfrowej Niemiec. Propozycja wymaga zmiany konstytucji, by ominac hamulec dlugu — te sama zasade, ktora Merz wczesniej bronil jako polityk opozycji. SPD entuzjastycznie popiera wydatki, ale domaga sie rowniez inwestycji spolecznych. Konserwatyści fiskalni ostrzegaja przed przyszlym obciazeniem dlugiem, podczas gdy liderzy przemyslu nalegaja na natychmiastowe dzialanie."
 md2026_elections_2025.6.o1:0 "Zatwierdzmy pelny fundusz infrastrukturalny."
 md2026_elections_2025.6.o2:0 "Okrojona, fiskalnie odpowiedzialna wersja."
 md2026_elections_2025.6.o3:0 "Zablokujmy fundusz — hamulec dlugu musi obowiazywac."

 ### NATIONAL SPIRITS ###
 md2026_pol_cohabitation:0 "Kryzys kohabitacji"
 md2026_pol_cohabitation_desc:0 "Wybor popieranego przez PiS prezydenta Nawrockiego pogrążyl Polske w erze kohabitacji — konserwatywno-nacjonalistyczny prezydent dysponuje prawem weta wobec liberalno-centrowego rzadu. Paraliz legislacyjny, konfrontacje konstytucyjne i spadek zaufania publicznego do instytucji charakteryzuja ten burzliwy okres."
 md2026_pol_nawrocki_presidency:0 "Prezydentura Nawrockiego"
 md2026_pol_nawrocki_presidency_desc:0 "Prezydent Karol Nawrocki, wspierany przez aparat partyjny PiS, wywiera znaczacy wplyw na kierunek polityczny Polski. Choc prezydentura jest konstytucyjnie ograniczona, agresywne korzystanie z prawa weta przez Nawrockiego i jego rola jako zwierzchnika sil zbrojnych ksztaltuja polityke obronna i stosunki zagraniczne."
 md2026_ger_grand_coalition:0 "Rzady Wielkiej Koalicji"
 md2026_ger_grand_coalition_desc:0 "Wielka koalicja CDU/SPD pod przywodztwem kanclerza Merza zapewnia stabilnosc polityczna, ale kosztem dynamizmu legislacyjnego. Kompromisy miedzy konserwatywna CDU a socjaldemokratyczna SPD spowalniaja reformy, choc szeroka baza koalicyjna pomaga chronic Niemcy przed presjami populistycznymi."
 md2026_ger_economic_recovery:0 "Ożywienie napedzane infrastruktura"
 md2026_ger_economic_recovery_desc:0 "Potezny fundusz infrastrukturalny Sondervermogen uruchomil odrodzenie gospodarcze Niemiec. Nowe inwestycje w drogi, koleje, infrastrukture cyfrowa i zielona energie tworza miejsca pracy i przywracaja zaufanie do niemieckiego modelu gospodarczego."
 md2026_ger_economic_malaise:0 "Stagnacja gospodarcza"
 md2026_ger_economic_malaise_desc:0 "Niemiecka gospodarka tkwi w przedluzajacym sie zastoju. Nieudane inicjatywy inwestycyjne, wysokie koszty energii, upadek przemyslu i pat polityczny podkopaly zaufanie biznesu. Kraj, ktory byl niegdys silnikiem gospodarczym Europy, z trudem odzyskuje rownowage."
