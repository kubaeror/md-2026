 ### Iran-Israel Escalation Event Chain ###

 # Event .23 - Israel: Strikes on Iranian Nuclear Facilities
 md2026_mideast.23.t:0 "Operacja: irańskie obiekty nuklearne"
 md2026_mideast.23.d:0 "Oceny wywiadowcze wskazują, że irański program nuklearny osiągnął krytyczny próg. Zdjęcia satelitarne ujawniają przyspieszone wzbogacanie uranu w Natanz, Fordow i Isfahan, a inspektorzy MAEA nie mają wstępu. Izraelski gabinet bezpieczeństwa zwołał nadzwyczajne posiedzenie. IAF przygotowało pakiety uderzeń na irańskie obiekty nuklearne — pytanie brzmi, jak daleko się posunąć."
 md2026_mideast.23.o1:0 "Pełnoskalowy atak — zniszczyć całą znaną infrastrukturę nuklearną."
 md2026_mideast.23.o2:0 "Ograniczone precyzyjne uderzenie — tylko zakład wzbogacania w Natanz."

 # Event .24 - Iran: Retaliation After Israeli Strike
 md2026_mideast.24.t:0 "Izraelski atak na nasze obiekty nuklearne"
 md2026_mideast.24.d:0 "Izraelskie samoloty zaatakowały nasze obiekty nuklearne, powodując poważne szkody w zdolnościach wzbogacania Iranu. Atak upokorzył Gwardię Rewolucyjną i rozjuszył społeczeństwo. Najwyższy Przywódca żąda odpowiedzi. Przed nami trzy drogi: bezpośredni odwet rakietowy na Izrael, eskalacja przez sieć proxy w całym regionie, lub strategiczna cierpliwość — odbudowa przy jednoczesnym wykorzystaniu międzynarodowej sympatii."
 md2026_mideast.24.o1:0 "Odpalić rakiety balistyczne na Izrael."
 md2026_mideast.24.o2:0 "Aktywować proxy — Hezbollah, Huti, irackie milicje."
 md2026_mideast.24.o3:0 "Strategiczna cierpliwość — odbudować i pozwolić światu potępić Izrael."

 # Event .25 - USA: Response to Israeli Strike on Iran
 md2026_mideast.25.t:0 "Izrael zaatakował Iran"
 md2026_mideast.25.d:0 "Izrael przeprowadził poważny atak wojskowy na irańskie obiekty nuklearne. Atak wywołał wstrząsy w regionie i na rynkach światowych. Ceny ropy gwałtownie rosną w obliczu potencjalnego zakłócenia Cieśniny Ormuz. Rada Bezpieczeństwa Narodowego obraduje — prezydent musi zdecydować o postawie Ameryki. Nasza odpowiedź ukształtuje trajektorię tego kryzysu i nasze zobowiązania sojusznicze na Bliskim Wschodzie."
 md2026_mideast.25.o1:0 "Pełne wsparcie — Izrael ma prawo się bronić."
 md2026_mideast.25.o2:0 "Wezwać do powściągliwości wszystkie strony."
 md2026_mideast.25.o3:0 "Potępić atak — to była lekkomyślna eskalacja."

 # Event .26 - Iran: Strait of Hormuz Blockade Threat
 md2026_mideast.26.t:0 "Cieśnina Ormuz"
 md2026_mideast.26.d:0 "W następstwie naszego odwetu rakietowego i ciągłej izraelskiej agresji, Siły Morskie Gwardii Rewolucyjnej zaproponowały blokadę Cieśniny Ormuz — wąskiego gardła, przez które przepływa 20% światowej ropy. Blokada sparaliżowałaby globalną gospodarkę i dałaby Iranowi ogromną dźwignię, ale zjednoczyłaby też społeczność międzynarodową przeciwko Teheranowi i sprowokowała bezpośrednią amerykańską interwencję wojskową."
 md2026_mideast.26.o1:0 "Zablokować Cieśninę — przyciągnąć świat do stołu negocjacyjnego."
 md2026_mideast.26.o2:0 "Ograniczone minowanie i nękanie — zakłócenia bez pełnej blokady."
 md2026_mideast.26.o3:0 "Wycofać się — nie możemy walczyć z całym światem."

 # Event .27 - USA: Persian Gulf Military Response
 md2026_mideast.27.t:0 "Blokada Ormuz: odpowiedź wojskowa"
 md2026_mideast.27.d:0 "Iran spełnił groźbę zablokowania Cieśniny Ormuz. Rozmieszczono miny morskie, a szybkie łodzie szturmowe IRGC nękają statki handlowe. Ceny ropy podwoiły się z dnia na dzień. Piąta Flota jest na pozycji, a grupy uderzeniowe lotniskowców zbiegają się w Zatoce Perskiej. Połączeni Szefowie Sztabów przedstawili opcje od pełnej operacji morskiej po przełamanie blokady, po presję dyplomatyczną w Radzie Bezpieczeństwa ONZ."
 md2026_mideast.27.o1:0 "Przełamać blokadę — Operacja Perska Wolność."
 md2026_mideast.27.o2:0 "Ultimatum 48-godzinne — usunąć miny albo ponieść konsekwencje."
 md2026_mideast.27.o3:0 "Reakcja multilateralna przez ONZ."

 # Event .28 - NEWS: Israeli Strike on Iran
 md2026_mideast.28.t:0 "PILNE: Izrael uderza w irańskie obiekty nuklearne"
 md2026_mideast.28.d:0 "W dramatycznej eskalacji długotrwałego konfliktu między Izraelem a Iranem, Izraelskie Siły Powietrzne przeprowadziły uderzenia na irańskie obiekty nuklearne. Atak stanowi najpoważniejszą akcję wojskową między tymi narodami w historii. Iran przysiągł odwet, światowi przywódcy wzywają do powściągliwości, a rynki ropy są w zamęcie. Bliski Wschód stoi na krawędzi szerszego konfliktu."
 md2026_mideast.28.o1:0 "Sytuacja jest dramatyczna."

 ### National Spirit Localisation ###

 md2026_isr_wartime_escalation:0 "Eskalacja wojenna"
 md2026_isr_wartime_escalation_desc:0 "Izraelski atak na irańskie obiekty nuklearne postawił naród w stanie podwyższonej gotowości wojskowej. Front domowy jest zmobilizowany, siły powietrzne w ciągłej gotowości, a gospodarka obciążona wymaganiami potencjalnej wojny na wielu frontach."

 md2026_per_nuclear_setback:0 "Niepowodzenie programu nuklearnego"
 md2026_per_nuclear_setback_desc:0 "Izraelskie uderzenia zadały poważne szkody irańskiej infrastrukturze nuklearnej. Lata postępów w wzbogacaniu uranu zostały zniszczone. Środowisko naukowe jest zdemoralizowane, izolacja międzynarodowa pogłębia się, a reżim stoi przed trudnymi pytaniami o swoją pozycję strategicznego odstraszania."

 md2026_per_hormuz_blockade:0 "Blokada Cieśniny Ormuz"
 md2026_per_hormuz_blockade_desc:0 "Iran zablokował Cieśninę Ormuz, odcinając 20% globalnych dostaw ropy. Choć daje to Iranowi ogromną dźwignię, zjednoczyło to również społeczność międzynarodową przeciwko Teheranowi, zdewastowało własny handel Iranu i sprowadziło amerykańskie siły zbrojne pod drzwi Iranu."

 md2026_usa_persian_gulf_deployment:0 "Rozmieszczenie w Zatoce Perskiej"
 md2026_usa_persian_gulf_deployment_desc:0 "Stany Zjednoczone rozmieściły dodatkowe zasoby morskie w Zatoce Perskiej w odpowiedzi na kryzys irańsko-izraelski. Grupy uderzeniowe lotniskowców patrolują Cieśninę Ormuz, demonstrując amerykańską potęgę, ale obciążając zasoby wojskowe i cierpliwość społeczeństwa."
