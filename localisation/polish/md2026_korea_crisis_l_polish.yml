 ### South Korea Political Crisis Event Chain ###

 # Event 1 - Constitutional Court: Yoon Impeachment Verdict
 md2026_korea_crisis.1.t:0 "Trybunał Konstytucyjny: werdykt w sprawie impeachmentu Yoona"
 md2026_korea_crisis.1.d:0 "Trybunał Konstytucyjny Korei Południowej podjął decyzję w sprawie impeachmentu prezydenta Yoon Suk-yeola, który wstrząsnął narodem, ogłaszając stan wojenny 3 grudnia 2024 roku — pierwszy od demokratyzacji w 1987 roku. Zgromadzenie Narodowe jednogłośnie zniosło stan wojenny w ciągu kilku godzin, a postępowanie impeachmentowe rozpoczęło się natychmiast. Werdykt trybunału zdecyduje, czy koreańska demokracja wyjdzie z kryzysu silniejsza."
 md2026_korea_crisis.1.a:0 "Konstytucja zwycięża — Yoon zostaje usunięty."
 md2026_korea_crisis.1.b:0 "Trybunał nie może osiągnąć werdyktu."

 # Event 2 - Military Accountability: Martial Law Generals
 md2026_korea_crisis.2.t:0 "Odpowiedzialność wojskowa: generałowie stanu wojennego"
 md2026_korea_crisis.2.d:0 "Po rozwiązaniu kryzysu politycznego uwaga kieruje się na oficerów wojskowych, którzy wykonali rozkaz Yoona o stanie wojennym. Kilku generałów wysłało wojsko do Zgromadzenia Narodowego w próbie uniemożliwienia parlamentarzystom głosowania nad zniesieniem stanu wojennego. Kwestia odpowiedzialności dzieli naród — czy powinni stanąć przed sądem, czy amnestia powinna zachować spójność armii?"
 md2026_korea_crisis.2.a:0 "Postawić ich przed sądem — nikt nie jest ponad prawem."
 md2026_korea_crisis.2.b:0 "Cicha amnestia — armia musi pozostać zjednoczona."

 # Event 3 - Democratic Renewal: Constitutional Reform Debate
 md2026_korea_crisis.3.t:0 "Demokratyczna odnowa: reforma konstytucyjna"
 md2026_korea_crisis.3.d:0 "Kryzys stanu wojennego odsłonił fundamentalne słabości konstytucyjnych ram Korei Południowej. Rosną głosy za reformami mającymi zapobiec przyszłym próbom podważenia demokracji. Propozycje obejmują ograniczenie uprawnień nadzwyczajnych, wzmocnienie roli kontrolnej Zgromadzenia Narodowego i reformę systemu prezydenckiego."
 md2026_korea_crisis.3.a:0 "Przeprowadzić gruntowne reformy — ograniczyć władzę prezydenta."
 md2026_korea_crisis.3.b:0 "Skromne reformy wystarczą."
 md2026_korea_crisis.3.c:0 "Partyjny pat blokuje wszelkie reformy."

 # Event 4 - Political Polarization Deepens
 md2026_korea_crisis.4.t:0 "Polaryzacja polityczna się pogłębia"
 md2026_korea_crisis.4.d:0 "Brak jasnego werdyktu Trybunału Konstytucyjnego w sprawie impeachmentu Yoona pogrążył Koreę Południową w głębszym kryzysie. Masowe protesty wybuchają w całym Seulu, ze starciami między zwolennikami i przeciwnikami Yoona na ulicach. Paraliż instytucjonalny zagraża pozycji międzynarodowej kraju i zdolności reagowania na północnokoreańskie prowokacje."
 md2026_korea_crisis.4.a:0 "Protesty wymuszają rozwiązanie."
 md2026_korea_crisis.4.b:0 "Impas trwa — demokracja w zawieszeniu."

 # Event 5 - US-ROK Alliance Reassurance
 md2026_korea_crisis.5.t:0 "Potwierdzenie sojuszu USA-Korea"
 md2026_korea_crisis.5.d:0 "Po politycznych wstrząsach Waszyngton stara się zapewnić Seul o trwałości sojuszu USA-Korea. Zaproponowano wspólne ćwiczenia wojskowe, aby zademonstrować jedność wobec zagrożeń ze strony Korei Północnej i zasygnalizować ciągłe amerykańskie zaangażowanie w obronę Półwyspu Koreańskiego."
 md2026_korea_crisis.5.a:0 "Potwierdzić sojusz — zaplanować wspólne ćwiczenia."
 md2026_korea_crisis.5.b:0 "Dążyć do większej autonomii strategicznej."

 # Event 6 - North Korea Tests the Waters
 md2026_korea_crisis.6.t:0 "Korea Północna testuje granice"
 md2026_korea_crisis.6.d:0 "Pjongjang nie przeoczył politycznego chaosu ogarniającego Koreę Południową. Reżim Kim Dzong Una wykorzystuje moment słabości, przeprowadzając prowokacyjne testy rakietowe i intensyfikując propagandowe audycje. Kryzys w Seulu stworzył okno możliwości, które Korea Północna chętnie wykorzystuje."
 md2026_korea_crisis.6.a:0 "Zdecydowana odpowiedź — podwyższona gotowość bojowa."
 md2026_korea_crisis.6.b:0 "Okazać powściągliwość — unikać eskalacji."

 ### National Spirit Localisation ###

 md2026_kor_democratic_renewal:0 "Demokratyczna odnowa"
 md2026_kor_democratic_renewal_desc:0 "Gruntowne reformy konstytucyjne przeprowadzone po próbie stanu wojennego Yoona wzmocniły instytucje demokratyczne. Uprawnienia nadzwyczajne prezydenta zostały ograniczone, rola kontrolna Zgromadzenia Narodowego wzmocniona, a ochrona praw obywatelskich rozszerzona."
