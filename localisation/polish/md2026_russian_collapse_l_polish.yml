l_polish:
 md2026_rus_collapse.1.t:0 "The Brink of Collapse"
 md2026_rus_collapse.1.d:0 "The catastrophic casualties and economic devastation brought upon by the prolonged conflict have broken the back of the Russian state. Mass protests have erupted across major cities, and the central government's authority is evaporating. Regional governors are withholding tax revenues, and several military units have outright refused orders to deploy to the front."
 md2026_rus_collapse.1.a:0 "The federation is falling apart!"
 
 md2026_rus_collapse.2.t:0 "The Generals' Ultimatum"
 md2026_rus_collapse.2.d:0 "With the state unraveling, a cadre of top military brass has arrived at the Kremlin. Blaming the civilian leadership and intelligence apparatus for the disastrous war, they demand the immediate transfer of executive power to a transitional military council. They promise to restore order, end the unpopular war, and preserve the territorial integrity of the Federation. Refusing them could fracture the armed forces."
 md2026_rus_collapse.2.a:0 "Arrest them! We will not yield!"
 md2026_rus_collapse.2.b:0 "We have failed. Hand over control."
 
 md2026_rus_collapse.3.t:0 "The Second Russian Civil War"
 md2026_rus_collapse.3.d:0 "The attempt to purge the disloyal generals has backfired spectacularly. Major commands across the country have declared the government illegitimate, seizing control of local arsenals and strategic assets. Loyalists, military rebels, and regional separatists are now engaging in open combat. Russia has descended into a full-scale civil war."
 md2026_rus_collapse.3.a:0 "God save Russia."
 
 md2026_rus_collapse.4.t:0 "State of Emergency Declared"
 md2026_rus_collapse.4.d:0 "The loyal security forces have successfully neutralized the ringleaders of the impending coup. In the aftermath, a draconian state of emergency has been declared. Drastic measures are being implemented to suppress dissent, centralize control, and force the nation to weather the storm."
 md2026_rus_collapse.4.a:0 "Order must be maintained."
 
 md2026_rus_collapse_news.1.t:0 "Unrest Sweeps Across Russia"
 md2026_rus_collapse_news.1.d:0 "Reports from inside Russia indicate that the country is experiencing an unprecedented wave of anti-government protests and structural failures. The burden of the ongoing war appears to have pushed the state to the breaking point, with rumors of military insubordination and regional defiance."
 md2026_rus_collapse_news.1.a:0 "The bear is stumbling."
 
 md2026_rus_collapse_news.2.t:0 "Russia Descends into Civil War"
 md2026_rus_collapse_news.2.d:0 "Shocking footage is emerging from Russia as heavily armed military factions clash in major cities. Following a failed purge of top generals, the chain of command has fractured. The Russian Federation is now in a state of open civil war, raising terrifying questions about the security of its vast nuclear arsenal."
 md2026_rus_collapse_news.2.a:0 "A geopolitical nightmare."
