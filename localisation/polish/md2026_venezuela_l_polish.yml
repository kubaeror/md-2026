 ### Venezuela Crisis Event Chain ###

 # Event 1 - USA: Caribbean Military Buildup
 md2026_venezuela.1.t:0 "Operacja Południowa Tarcza: rozmieszczenie na Karaibach"
 md2026_venezuela.1.d:0 "Departament Obrony zaproponował duże rozmieszczenie wojskowe na południowych Karaibach. Oficjalnie opisywane jako operacja antynarkotykowa, przerzut pozycjonowałby okręty wojenne, w tym grupę uderzeniową lotniskowca USS Gerald R. Ford, na wodach w pobliżu Wenezueli. Raporty wywiadowcze potwierdzają, że reżim Maduro nadal wykorzystuje aparat państwowy do przemytu narkotyków przez sieć „Kartelu Słońc". Rozmieszczenie miałoby podwójny cel — przechwytywanie narkotyków i wywieranie presji na reżim Maduro."
 md2026_venezuela.1.o1:0 "Pełne rozmieszczenie — maksymalna presja na reżim."
 md2026_venezuela.1.o2:0 "Tylko ograniczony patrol antynarkotykowy."

 # Event 2 - USA: Cartel of the Suns FTO Designation
 md2026_venezuela.2.t:0 "Kartel Słońc: oznaczenie jako FTO"
 md2026_venezuela.2.d:0 "Na podstawie obszernych danych wywiadowczych Departament Stanu zalecił oznaczenie wenezuelskiego „Kartelu Słońc" — siatki handlu narkotykami rzekomo kierowanej przez samego prezydenta Nicolása Maduro — jako Zagranicznej Organizacji Terrorystycznej. To bezprecedensowe oznaczenie najbliższego otoczenia urzędującego szefa państwa jako terrorystów upoważniłoby do działań wojskowych, zamrożenia aktywów na całym świecie i zasadniczo zmieniłoby nasze relacje z Wenezuelą."
 md2026_venezuela.2.o1:0 "Oznaczyć jako FTO i przygotować opcje wojskowe."
 md2026_venezuela.2.o2:0 "Tylko sankcje — bez eskalacji wojskowej."

 # Event 3 - Venezuela: Response to FTO Designation
 md2026_venezuela.3.t:0 "Imperium kontratakuje"
 md2026_venezuela.3.d:0 "Stany Zjednoczone oznaczyły Kartel Słońc jako Zagraniczną Organizację Terrorystyczną, faktycznie nazywając prezydenta Maduro i jego otoczenie terrorystami. To akt bezprecedensowej agresji wobec naszej suwerenności. Rewolucja Boliwariańska stoi na rozdrożu — możemy zmobilizować sojuszników i stawić czoła imperialistom, lub spróbować negocjować z pozycji szybko słabnącej siły."
 md2026_venezuela.3.o1:0 "Przeciwstawić się imperialistom — zmobilizować Kubę, Rosję i Chiny."
 md2026_venezuela.3.o2:0 "Szukać negocjacji — zaproponować ograniczone ustępstwa."

 # Event 4 - USA: Operation Caracas
 md2026_venezuela.4.t:0 "Operacja Caracas"
 md2026_venezuela.4.d:0 "Nadszedł moment decyzji. Siły amerykańskie rozmieszczone na południowych Karaibach zidentyfikowały wywiad dotyczący lokalizacji Maduro. Połączeni Szefowie Sztabów przygotowali Operację Caracas — pakiet precyzyjnych uderzeń na kluczową infrastrukturę reżimu w wenezuelskiej stolicy, połączony z misją sił specjalnych mającą na celu schwytanie Maduro. Operacja niesie ogromne ryzyko geopolityczne, ale może zdekapitować aparat narko-państwa jednym uderzeniem."
 md2026_venezuela.4.o1:0 "Wykonać Operację Caracas — schwytać Maduro."
 md2026_venezuela.4.o2:0 "Wstrzymać się — kontynuować operacje tajne i sankcje."

 # Event 5 - Venezuela: Post-Maduro Transition
 md2026_venezuela.5.t:0 "Upadek Maduro"
 md2026_venezuela.5.d:0 "Siły amerykańskie schwytały Nicolása Maduro. Reżim boliwariański, który rządził Wenezuelą ponad dwie dekady, jest w rozsypce. Wiceprezydent Delcy Rodríguez została zaprzysiężona jako tymczasowa prezydent, ale jej władza jest kwestionowana. Wojsko się fragmentuje — niektórzy generałowie popierają demokratyczną transformację, inni chcą zachować system chawistowski. Ogromne rezerwy ropy Wenezueli wiszą na szali, gdy kraj stoi przed najbardziej krytycznym momentem od Rewolucji Boliwariańskiej."
 md2026_venezuela.5.o1:0 "Transformacja demokratyczna — współpraca ze społecznością międzynarodową."
 md2026_venezuela.5.o2:0 "Rewolucja trwa — chawiści będą stawiać opór."

 # Event 6 - Regional Reaction
 md2026_venezuela.6.t:0 "Amerykańskie uderzenia wojskowe w Wenezueli"
 md2026_venezuela.6.d:0 "Stany Zjednoczone przeprowadziły uderzenia wojskowe na Caracas, schwytując wenezuelskiego prezydenta Nicolása Maduro. Operacja wywołała wstrząsy w Ameryce Łacińskiej i społeczności międzynarodowej. Podczas gdy niektóre narody chwalą usunięcie autorytarnego narko-reżimu, inne potępiają to, co postrzegają jako nagi amerykański imperializm i naruszenie suwerenności narodowej."
 md2026_venezuela.6.o1:0 "Usunięcie Maduro służy stabilności regionu."
 md2026_venezuela.6.o2:0 "To naruszenie suwerenności — potępić interwencję."
 md2026_venezuela.6.o3:0 "To nas nie dotyczy."

 ### National Spirit Localisation ###

 md2026_usa_caribbean_deployment:0 "Rozmieszczenie wojskowe na Karaibach"
 md2026_usa_caribbean_deployment_desc:0 "Stany Zjednoczone rozmieściły grupę uderzeniową lotniskowca i wspierające zasoby morskie na południowych Karaibach w operacji o podwójnym celu — antynarkotykowym i presji na reżim. Rozmieszczenie demonstruje amerykańską potęgę, ale wiąże się z ciągłymi kosztami."

 md2026_ven_siege_mentality:0 "Mentalność oblężenia"
 md2026_ven_siege_mentality_desc:0 "W obliczu amerykańskiej presji wojskowej i międzynarodowej izolacji reżim Maduro przyjął mentalność oblężenia. Zasoby są przekierowywane na gotowość wojskową, stosunki handlowe cierpią, a polityczna paranoja ogarnia rząd."

 md2026_ven_post_maduro_transition:0 "Demokratyczna transformacja po Maduro"
 md2026_ven_post_maduro_transition_desc:0 "Po schwytaniu Maduro i upadku reżimu chawistowskiego Wenezuela rozpoczęła kruchą demokratyczną transformację. Pomoc międzynarodowa napływa, ale dekady rozkładu instytucjonalnego, złego zarządzania gospodarką i polaryzacji politycznej czynią drogę naprzód zdradliwą."

 md2026_ven_power_vacuum:0 "Próżnia władzy po Maduro"
 md2026_ven_power_vacuum_desc:0 "Maduro upadł, ale chawiści odmówili oddania władzy. Wenezuela jest podzielona — frakcje wojskowe rywalizują o kontrolę, gospodarka jest w swobodnym spadku, a ludność cywilna jest uwięziona między konkurującymi grupami zbrojnymi. Widmo państwa upadłego się zbliża."
