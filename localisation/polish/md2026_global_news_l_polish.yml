 md2026_global_news.1.t:0 "Nuclear Test Shocks the World"
 md2026_global_news.1.d:0 "Seismic monitors across the globe have detected a massive underground tremor. Intelligence agencies have confirmed our worst fears: [From.GetNameDef] has successfully detonated a nuclear device. This dramatic escalation alters the balance of power and risks plunging the region into a devastating arms race."
 md2026_global_news.1.a:0 "A dark day for humanity."
 
 md2026_global_news.2.t:0 "A Major Alliance Shattered"
 md2026_global_news.2.d:0 "In a shocking geopolitical realignment, [From.GetNameDef] has officially announced their withdrawal from their premier security and economic bloc. This historic rupture fundamentally changes the international order and leaves analysts scrambling to predict the fallout."
 md2026_global_news.2.a:0 "The world order shifts."
 
 md2026_global_news.3.t:0 "A New Economic Superpower Emerges"
 md2026_global_news.3.d:0 "Driven by relentless industrial expansion and rapid technological adoption, [From.GetNameDef] has crossed a historic threshold in economic output. Surpassing legacy powers, they have cemented their status as a tier-one global economic superpower, demanding a new seat at the table of international leadership."
 md2026_global_news.3.a:0 "An impressive achievement."
