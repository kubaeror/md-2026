 ### New Syria Event Chain ###

 # Event 1 - Western Sanctions Partially Lifted
 md2026_new_syria.1.t:0 "Częściowe zniesienie sankcji zachodnich"
 md2026_new_syria.1.d:0 "Współpraca tymczasowego rządu syryjskiego z międzynarodowymi inspektorami i zobowiązanie do reform politycznych przekonały kluczowe państwa zachodnie do rozpoczęcia łagodzenia sankcji nałożonych za czasów Asada. Choć pełna normalizacja pozostaje odległa, częściowe zniesienie sankcji otwiera drogę do tak potrzebnych zagranicznych inwestycji i pomocy humanitarnej."
 md2026_new_syria.1.a:0 "Nowy rozdział dla Syrii."
 md2026_new_syria.1.b:0 "Nie ugniemy się pod zachodnimi warunkami."

 # Event 2 - HTS Legitimacy: From Militia to Government
 md2026_new_syria.2.t:0 "Legitymizacja HTS: od milicji do rządu"
 md2026_new_syria.2.d:0 "Hajat Tahrir asz-Szam, frakcja zbrojna, która doprowadziła do obalenia reżimu Asada, stoi przed definiującym momentem. Ahmad al-Szaraa musi zdecydować, czy przebranzować HTS w legalny ruch polityczny — porzucając militarną przeszłość — czy zachować rewolucyjną tożsamość, która wyniosła ich do władzy."
 md2026_new_syria.2.a:0 "Jesteśmy teraz rządem wszystkich Syryjczyków."
 md2026_new_syria.2.b:0 "Rewolucja nie jest jeszcze ukończona."

 # Event 3 - Arab League Readmission
 md2026_new_syria.3.t:0 "Syria ponownie przyjęta do Ligi Arabskiej"
 md2026_new_syria.3.d:0 "Po latach zawieszenia w związku z wojną domową, Syria została formalnie ponownie przyjęta do Ligi Arabskiej. Głosowanie, prowadzone przez Arabię Saudyjską i ZEA, sygnalizuje szerszą normalizację stosunków z rządem post-Asadowskim i otwiera nowe kanały dyplomatyczne i gospodarcze w regionie."
 md2026_new_syria.3.a:0 "Syria wraca na łono wspólnoty."
 md2026_new_syria.3.b:0 "Nie potrzebujemy ich ligi."

 # Event 4 - Syria Stability Crisis
 md2026_new_syria.4.t:0 "Kryzys stabilności w Syrii"
 md2026_new_syria.4.d:0 "Pomimo upadku Asada, syryjska transformacja osiągnęła krytyczny punkt. Rywalizujące frakcje, załamanie gospodarcze i blizny wojny domowej grożą ponownym rozerwaniem kraju. Rząd musi działać zdecydowanie — poprzez rząd jedności narodowej lub siłowe przywrócenie porządku."
 md2026_new_syria.4.a:0 "Utworzyć rząd jedności narodowej."
 md2026_new_syria.4.b:0 "Przywrócić porządek siłą."

 # Event 5 - International Recognition Wave
 md2026_new_syria.5.t:0 "Fala międzynarodowego uznania"
 md2026_new_syria.5.d:0 "Po częściowym zniesieniu zachodnich sankcji, fala międzynarodowego uznania przetoczyła się przez krajobraz dyplomatyczny. Główne potęgi formalnie uznają tymczasowy rząd syryjski, otwierają ambasady i wznawiają stosunki dyplomatyczne. To oznacza powrót Syrii do społeczności międzynarodowej."
 md2026_new_syria.5.a:0 "Świat uznaje naszą legitymację."

 # Event 6 - Refugee Return Begins
 md2026_new_syria.6.t:0 "Początek powrotu uchodźców"
 md2026_new_syria.6.d:0 "Wraz z poprawą stabilności i złagodzeniem sankcji, pierwsza znacząca fala syryjskich uchodźców zaczęła wracać do domu. Miliony ludzi, którzy uciekli do Turcji, Jordanii, Libanu i Europy, ostrożnie podejmują podróż powrotną, przynosząc ze sobą umiejętności i determinację do odbudowy. Napływ obciąża zasoby, ale obiecuje długoterminową odbudowę demograficzną i gospodarczą."
 md2026_new_syria.6.a:0 "Powitajmy naszych ludzi w domu."
 md2026_new_syria.6.b:0 "Nie jesteśmy jeszcze w stanie ich przyjąć."

 ### National Spirit Localisation ###

 md2026_syr_transitional_government:0 "Rząd tymczasowy"
 md2026_syr_transitional_government_desc:0 "Rząd tymczasowy pod kierownictwem HTS przebranzował się w legalny ruch narodowy, porzucając swoją wojskową przeszłość. Choć stabilność pozostaje krucha, nowa struktura rządząca przyniosła pewien porządek i międzynarodową wiarygodność."

 md2026_syr_sanctions_relief:0 "Złagodzenie sankcji"
 md2026_syr_sanctions_relief_desc:0 "Częściowe zniesienie zachodnich sankcji otworzyło nowe kanały handlowe i przyciągnęło zagraniczne inwestycje do zniszczonej syryjskiej gospodarki. Odbudowa jest teraz możliwa na znaczącą skalę."
