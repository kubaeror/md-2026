l_polish:
 ### MD2026 Wydarzenia Europejskie ###

 ## Hiszpania ##
 md2026_europe.1.t:0 "Kryzys koalicyjny w Hiszpanii"
 md2026_europe.1.d:0 "Rząd mniejszościowy Pedro Sáncheza stoi w obliczu krytycznego głosowania zaufania, gdy napięcia z partnerem koalicyjnym Sumar narastają w kwestii priorytetów budżetowych. Katalońskie partie niepodległościowe, których poparcie jest niezbędne dla większości parlamentarnej, żądają ustępstw w sprawie samostanowienia w zamian za dalsze wsparcie."
 md2026_europe.1.o1:0 "Zaakceptuj żądania koalicji"
 md2026_europe.1.o2:0 "Staw czoła opozycji"

 md2026_europe.2.t:0 "Debata o autonomii Katalonii"
 md2026_europe.2.d:0 "Kwestia autonomii katalońskiej powróciła na pierwszy plan hiszpańskiej polityki. Nowe negocjacje między Madrytem a Barceloną oferują szansę na rozwiązanie napięć terytorialnych."
 md2026_europe.2.o1:0 "Przyznaj rozszerzoną autonomię"
 md2026_europe.2.o2:0 "Broń jedności konstytucyjnej"

 md2026_europe.3.t:0 "Sagrada Família ukończona!"
 md2026_europe.3.d:0 "Po 144 latach budowy arcydzieło Antoniego Gaudíego w Barcelonie zostało wreszcie ukończone. Bazylika Sagrada Família jest symbolem ludzkiej ambicji i wytrwałości."
 md2026_europe.3.o1:0 "Triumf ludzkiego ducha!"

 ## Wielka Brytania ##
 md2026_europe.4.t:0 "Szczyt reset UE-UK"
 md2026_europe.4.d:0 "Rząd Starmera osiągnął przełomowe spotkanie z liderami UE, dążąc do odbudowy relacji uszkodzonych przez Brexit."
 md2026_europe.4.o1:0 "Podpisz nowe porozumienie partnerskie"
 md2026_europe.4.o2:0 "Warunki nie są wystarczająco korzystne"

 md2026_europe.5.t:0 "Strategiczny Przegląd Obronny"
 md2026_europe.5.d:0 "Rząd UK opublikował Strategiczny Przegląd Obronny, najobszerniejszą ocenę brytyjskiej polityki obronnej od dekad."
 md2026_europe.5.o1:0 "Wdrożyć pełny przegląd"
 md2026_europe.5.o2:0 "Bardziej umiarkowane podejście"

 md2026_europe.6.t:0 "Dziesięcioletni plan reformy NHS"
 md2026_europe.6.d:0 "Rząd przedstawił ambitny dziesięcioletni plan reformy Narodowej Służby Zdrowia."
 md2026_europe.6.o1:0 "Zainwestuj w zdrowie narodu"
 md2026_europe.6.o2:0 "Nie stać nas na takie wydatki"

 md2026_europe.7.t:0 "Biała Księga Imigracji"
 md2026_europe.7.d:0 "Ministerstwo Spraw Wewnętrznych opublikowało kompleksową Białą Księgę Imigracji proponującą daleko idące zmiany w systemie imigracyjnym Wielkiej Brytanii."
 md2026_europe.7.o1:0 "Wdrożyć zrównoważone podejście"
 md2026_europe.7.o2:0 "Zaostrzyć kontrole"

 md2026_europe.8.t:0 "Wzrost poparcia Reform UK"
 md2026_europe.8.d:0 "Reform UK osiągnął zaskakujące wyniki w wyborach lokalnych w Anglii, wykorzystując frustrację wyborców."
 md2026_europe.8.o1:0 "Uznaj zmianę polityczną"
 md2026_europe.8.o2:0 "Podwoić wysiłki na naszej platformie"

 ## Francja ##
 md2026_europe.9.t:0 "Macron rozszerza doktrynę nuklearną"
 md2026_europe.9.d:0 "Prezydent Macron ogłosił dramatyczne rozszerzenie francuskiej doktryny odstraszania nuklearnego, oferując rozszerzenie parasola nuklearnego na europejskich sojuszników."
 md2026_europe.9.o1:0 "Europa potrzebuje naszej tarczy nuklearnej"
 md2026_europe.9.o2:0 "Zachowaj tradycyjną doktrynę"

 md2026_europe.10.t:0 "Kryzys polityczny: trzeci premier w 12 miesięcy"
 md2026_europe.10.d:0 "Francja przeżywa bezprecedensową niestabilność polityczną — trzeci premier w ciągu dwunastu miesięcy zostaje mianowany."
 md2026_europe.10.o1:0 "Przetrwać paraliż polityczny"
 md2026_europe.10.o2:0 "Wezwać do jedności narodowej"

 md2026_europe.11.t:0 "Budżet obronny: cel 3,5% PKB"
 md2026_europe.11.d:0 "Francja ogłosiła plany zwiększenia wydatków wojskowych do 3,5% PKB — znacznie przekraczając cel NATO 2%."
 md2026_europe.11.o1:0 "Uzbroić Republikę"
 md2026_europe.11.o2:0 "Skupić się na priorytetach gospodarczych"

 md2026_europe.12.t:0 "Francja gospodarzem szczytu G7 2026"
 md2026_europe.12.d:0 "Francja gości szczyt G7 w 2026 roku, łącząc przywódców największych demokracji świata."
 md2026_europe.12.o1:0 "Niech żyje dyplomacja francuska!"

 ## Niemcy ##
 md2026_europe.13.t:0 "Wspólna deklaracja Merz-Macron"
 md2026_europe.13.d:0 "Kanclerz Friedrich Merz i Prezydent Emmanuel Macron wydali historyczną wspólną deklarację potwierdzającą partnerstwo francusko-niemieckie."
 md2026_europe.13.o1:0 "Wzmocnić oś francusko-niemiecką"
 md2026_europe.13.o2:0 "Niemcy muszą wytyczyć własny kurs"

 md2026_europe.14.t:0 "Sondervermögen - Fundusz Infrastruktury"
 md2026_europe.14.d:0 "Bundestag zatwierdził masowy fundusz specjalny w wysokości 100 mld euro na modernizację infrastruktury."
 md2026_europe.14.o1:0 "Zainwestować w przyszłość Niemiec"
 md2026_europe.14.o2:0 "Dyscyplina fiskalna musi zostać zachowana"

 md2026_europe.15.t:0 "Wybory landowe 2026: AfD rośnie"
 md2026_europe.15.d:0 "Wybory landowe we wschodnich Niemczech przyniosły silne wyniki dla Alternatywy dla Niemiec."
 md2026_europe.15.o1:0 "Sygnał ostrzegawczy dla demokracji"
 md2026_europe.15.o2:0 "Centrum się utrzymuje — na razie"

 ## Włochy ##
 md2026_europe.16.t:0 "Zimowe Igrzyska Olimpijskie Milano-Cortina 2026"
 md2026_europe.16.d:0 "XXV Zimowe Igrzyska Olimpijskie otwierają się w Mediolanie i Cortina d'Ampezzo."
 md2026_europe.16.o1:0 "Forza Italia!"

 md2026_europe.17.t:0 "Ostrzeżenie o kryzysie budżetowym"
 md2026_europe.17.d:0 "Komisja Europejska wydała formalne ostrzeżenie dotyczące trajektorii fiskalnej Włoch."
 md2026_europe.17.o1:0 "Przyjąć środki oszczędnościowe"
 md2026_europe.17.o2:0 "Przeciwstawić się Brukseli"

 md2026_europe.18.t:0 "Reforma systemu wyborczego"
 md2026_europe.18.d:0 "Rząd Meloni zaproponował daleko idące zmiany w systemie wyborczym Włoch."
 md2026_europe.18.o1:0 "Przepchnąć reformy"
 md2026_europe.18.o2:0 "Szukać szerszego konsensusu"

 ## Wydarzenia ogólnoeuropejskie ##
 md2026_europe.19.t:0 "Europejski wzrost wydatków obronnych"
 md2026_europe.19.d:0 "Dramatyczna zmiana zachodzi w całej Europie, gdy rządy zobowiązują się do bezprecedensowego wzrostu wydatków obronnych."
 md2026_europe.19.o1:0 "Europa musi się uzbroić"

 md2026_europe.20.t:0 "Europejska inicjatywa wydatków obronnych"
 md2026_europe.20.d:0 "Nasi europejscy sojusznicy rozpoczęli skoordynowany wzrost wydatków obronnych."
 md2026_europe.20.o1:0 "Zwiększyć wydatki obronne"
 md2026_europe.20.o2:0 "Utrzymać obecny poziom"

 md2026_europe.21.t:0 "Zamówienia obronne EU SAFE"
 md2026_europe.21.d:0 "Unia Europejska uruchomiła inicjatywę SAFE — program zamówień obronnych o wartości 150 mld euro."
 md2026_europe.21.o1:0 "Budować europejski przemysł obronny"

 md2026_europe.22.t:0 "Propozycja europejskiego parasola nuklearnego"
 md2026_europe.22.d:0 "Po rozszerzeniu francuskiej doktryny nuklearnej pojawiła się formalna propozycja europejskiego parasola nuklearnego."
 md2026_europe.22.o1:0 "Zaproponować europejski odstraszacz"
 md2026_europe.22.o2:0 "To zbyt prowokacyjne"

 md2026_europe.23.t:0 "Oferta francuskiego parasola nuklearnego"
 md2026_europe.23.d:0 "Francja zaproponowała rozszerzenie swojego odstraszacza nuklearnego na nasz kraj."
 md2026_europe.23.o1:0 "Przyjąć gwarancję nuklearną"
 md2026_europe.23.o2:0 "Odrzucić — polegamy na NATO"

 ## Polska ##
 md2026_europe.24.t:0 "Sukces prezydencji w Radzie UE"
 md2026_europe.24.d:0 "Polska prezydencja w Radzie UE w pierwszej połowie 2025 roku zakończyła się sukcesem."
 md2026_europe.24.o1:0 "Moment Polski na europejskiej scenie"

 md2026_europe.25.t:0 "Postępy megaprojektu CPK"
 md2026_europe.25.d:0 "Centralny Port Komunikacyjny — ambitny projekt transportowy Polski za 40 mld dolarów — osiągnął kluczowy kamień milowy."
 md2026_europe.25.o1:0 "Pełna para z CPK"
 md2026_europe.25.o2:0 "Zmniejszyć skalę projektu"

