 ### TRUMPONOMICS & DOGE ###

 ## Events ##
 md2026_trumponomics.1.t:0 "Departament Efektywności Rządu"
 md2026_trumponomics.1.d:0 "Prezydent Trump ogłosił utworzenie Departamentu Efektywności Rządu (DOGE), kierowanego przez Elona Muska. Inicjatywa ma na celu drastyczne cięcia wydatków federalnych poprzez identyfikację marnotrawstwa, oszustw i nieefektywności we wszystkich agencjach rządowych. Musk obiecuje bilionowe oszczędności, ale krytycy ostrzegają przed katastrofalnymi skutkami dla usług publicznych."
 md2026_trumponomics.1.a:0 "Puśćmy DOGE!"
 md2026_trumponomics.1.b:0 "To zbyt radykalne."

 md2026_trumponomics.2.t:0 "Globalny Szok Celny"
 md2026_trumponomics.2.d:0 "Stany Zjednoczone nałożyły powszechne 10% cło na cały import na mocy Sekcji 122 Ustawy Handlowej, po wyroku Sądu Najwyższego, który uznał cła oparte na IEEPA za niezgodne z konstytucją. Ten radykalny krok dotyka wszystkich partnerów handlowych i wstrząsnął światowymi rynkami."
 md2026_trumponomics.2.a:0 "Światowa gospodarka drży."

 md2026_trumponomics.3.t:0 "Amerykańskie Cła Uderzają w Kanadę"
 md2026_trumponomics.3.d:0 "Stany Zjednoczone nałożyły 25% cła na import kanadyjski, powołując się na bezpieczeństwo narodowe. Cła dotyczą szerokiej gamy towarów, w tym energii, drewna i produktów przemysłowych. Gospodarka Kanady, głęboko zintegrowana z rynkiem amerykańskim, stoi w obliczu poważnych zakłóceń."
 md2026_trumponomics.3.a:0 "Odpowiedzieć tym samym."
 md2026_trumponomics.3.b:0 "Szukać rozwiązania negocjacyjnego."

 md2026_trumponomics.4.t:0 "Amerykańskie Cła Uderzają w Meksyk"
 md2026_trumponomics.4.d:0 "Stany Zjednoczone nałożyły 25% cła na import meksykański, rzekomo w celu wywarcia presji na Meksyk w kwestii bezpieczeństwa granicy i handlu narkotykami. Umowa USMCA jest faktycznie zawieszona. Gospodarka Meksyku, zależna od eksportu, stoi w obliczu poważnego kryzysu."
 md2026_trumponomics.4.a:0 "Nie ulegniemy presji!"
 md2026_trumponomics.4.b:0 "Spełnić żądania Ameryki."

 md2026_trumponomics.5.t:0 "Sąd Najwyższy Odrzuca Cła IEEPA"
 md2026_trumponomics.5.d:0 "Sąd Najwyższy orzekł, że wykorzystanie przez prezydenta Ustawy o Nadzwyczajnych Uprawnieniach Ekonomicznych do nakładania szerokich ceł jest niezgodne z konstytucją. Orzeczenie unieważnia cła na Kanadę, Meksyk i Chiny nałożone na mocy IEEPA. Administracja musi znaleźć nową podstawę prawną."
 md2026_trumponomics.5.a:0 "Przejść na Sekcję 122."
 md2026_trumponomics.5.b:0 "Zignorować wyrok!"

 md2026_trumponomics.6.t:0 "Sekcja 122: Powszechne 10% Cło"
 md2026_trumponomics.6.d:0 "Po wyroku Sądu Najwyższego administracja zwróciła się ku Sekcji 122 Ustawy Handlowej, nakładając powszechne 10% cło na cały import. Choć niższe od poprzednich ceł IEEPA, środek ten jest szerszy w zakresie, dotykając jednocześnie wszystkich partnerów handlowych."
 md2026_trumponomics.6.a:0 "America First — reszta płaci."
 md2026_trumponomics.6.b:0 "Strategia celna zawiodła."

 md2026_trumponomics.7.t:0 "Stany Zjednoczone Żądają Grenlandii"
 md2026_trumponomics.7.d:0 "Waszyngton formalnie zażądał od Danii przekazania suwerenności nad Grenlandią Stanom Zjednoczonym, powołując się na strategiczne interesy w Arktyce i potrzebę przeciwdziałania rosyjskim i chińskim wpływom. Prezydent Trump zagroził konsekwencjami gospodarczymi, w tym cłami i ograniczeniem współpracy w dziedzinie bezpieczeństwa."
 md2026_trumponomics.7.a:0 "Grenlandia nie jest na sprzedaż!"
 md2026_trumponomics.7.b:0 "Może powinniśmy negocjować..."

 md2026_trumponomics.8.t:0 "Kryzys Grenlandzki Wygasa"
 md2026_trumponomics.8.d:0 "Kryzys wokół Grenlandii ucichł. Na Światowym Forum Ekonomicznym w Davos sygnały z Waszyngtonu sugerują, że administracja wycofuje się z żądań terytorialnych."
 md2026_trumponomics.8.a:0 "Witamy powrót do normalności."

 md2026_trumponomics.9.t:0 "Kanał Panamski: Władze Przejmują Kontrolę"
 md2026_trumponomics.9.d:0 "Władze Kanału Panamskiego przejęły bezpośrednią kontrolę nad kluczowymi terminalami portowymi, wcześniej obsługiwanymi przez hongkoński konglomerat, potwierdzając pełną suwerenność nad kanałem. Ogłoszono plan modernizacji o wartości 8,5 miliarda dolarów."
 md2026_trumponomics.9.a:0 "Kanał jest nasz. Zmodernizujmy go."
 md2026_trumponomics.9.b:0 "Zezwolić na dalszy międzynarodowy nadzór."

 md2026_trumponomics.10.t:0 "Reakcja na DOGE"
 md2026_trumponomics.10.d:0 "Radykalne cięcia Departamentu Efektywności Rządu wywołały gwałtowny sprzeciw. Pracownicy federalni protestują przeciwko masowym zwolnieniom, podstawowe usługi są zakłócone, a sądy zaczęły blokować niektóre z najbardziej agresywnych działań."
 md2026_trumponomics.10.a:0 "Podwoić wysiłki. Ciąć głębiej."
 md2026_trumponomics.10.b:0 "Wycofać się z cięć."

 md2026_trumponomics.11.t:0 "Spór o Suwerenność Kanału Panamskiego"
 md2026_trumponomics.11.d:0 "Panama potwierdziła pełną kontrolę nad kluczowymi terminalami Kanału, usuwając operatorów powiązanych z Chinami. Waszyngton uważa to za niewystarczające i domaga się większego amerykańskiego nadzoru nad tym strategicznie ważnym szlakiem wodnym."
 md2026_trumponomics.11.a:0 "Wywrzeć presję dyplomatyczną."
 md2026_trumponomics.11.b:0 "Uszanować suwerenność Panamy."

 ## National Spirits ##
 md2026_usa_doge_cuts:0 "DOGE: Cięcia Efektywności Rządu"
 md2026_usa_doge_cuts_desc:0 "Departament Efektywności Rządu pod kierownictwem Elona Muska dokonuje cięć wydatków federalnych we wszystkich agencjach. Choć zmniejsza deficyt, cięcia zakłócają usługi rządowe i tworzą niestabilność polityczną."
 md2026_usa_doge_deep_cuts:0 "DOGE: Głębokie Cięcia Rządowe"
 md2026_usa_doge_deep_cuts_desc:0 "DOGE drastycznie eskalował operacje, wdrażając radykalne cięcia, które niszczą całe agencje federalne. Programy badawcze, organy regulacyjne i usługi publiczne zostały zdziesiątkowane."
 md2026_usa_section122_tariff:0 "Powszechne Cło Sekcji 122"
 md2026_usa_section122_tariff_desc:0 "Powszechne 10% cło na cały import nałożone na mocy Sekcji 122 Ustawy Handlowej. Krajowy przemysł korzysta z mniejszej konkurencji zagranicznej, ale ceny konsumenckie rosną."
 md2026_can_us_tariff_impact:0 "Wpływ Amerykańskich Ceł"
 md2026_can_us_tariff_impact_desc:0 "Stany Zjednoczone nałożyły dotkliwe cła na eksport kanadyjski, dewastując branże zależne od handlu transgranicznego."
 md2026_mex_us_tariff_impact:0 "Wpływ Amerykańskich Ceł"
 md2026_mex_us_tariff_impact_desc:0 "Druzgocące amerykańskie cła zdewastowały sektor eksportowy Meksyku. Fabryki przygraniczne zwalniają masowo pracowników."
 md2026_pan_canal_modernization:0 "Program Modernizacji Kanału"
 md2026_pan_canal_modernization_desc:0 "Program modernizacji o wartości 8,5 miliarda dolarów przekształca Kanał Panamski, poprawiając infrastrukturę i potwierdzając pełną suwerenność narodową."

 ## Focus Tree ##
 MD2026_USA_doge:0 "Utworzenie DOGE"
 MD2026_USA_doge_desc:0 "Utworzenie Departamentu Efektywności Rządu pod kierownictwem Elona Muska w celu identyfikacji marnotrawstwa i redukcji wydatków federalnych."
 MD2026_USA_doge_federal_cuts:0 "Cięcia Wydatków Federalnych"
 MD2026_USA_doge_federal_cuts_desc:0 "DOGE wdraża radykalne cięcia w agencjach federalnych, eliminując programy uznane za marnotrawne i redukując zatrudnienie w sektorze publicznym."
 MD2026_USA_doge_deregulation:0 "Masowa Deregulacja"
 MD2026_USA_doge_deregulation_desc:0 "Eliminacja tysięcy regulacji federalnych w celu uwolnienia amerykańskiej przedsiębiorczości. Regulacje środowiskowe, finansowe i pracownicze są wycofywane."
 MD2026_USA_territorial_ambitions:0 "Ambicje Terytorialne"
 MD2026_USA_territorial_ambitions_desc:0 "Administracja sygnalizuje zainteresowanie rozszerzeniem terytorialnych wpływów Ameryki, od Arktyki po Karaiby, powołując się na Doktrynę Monroe."
 MD2026_USA_greenland_demand:0 "Żądanie Grenlandii"
 MD2026_USA_greenland_demand_desc:0 "Formalnie zażądać od Danii przekazania Grenlandii, powołując się na interesy strategiczne w Arktyce i złoża minerałów ziem rzadkich."
 MD2026_USA_panama_canal:0 "Suwerenność Kanału Panamskiego"
 MD2026_USA_panama_canal_desc:0 "Potwierdzić amerykański interes strategiczny w Kanale Panamskim, wywierając presję na Panamę w celu ograniczenia chińskich wpływów."

 ## Decisions ##
 md2026_trumponomics_category:0 "Trumponomika"
 md2026_trumponomics_category_desc:0 "Agenda ekonomiczna i geopolityczna administracji Trumpa: cła, cięcia DOGE i ambicje terytorialne."
 md2026_tariff_canada:0 "Nałożyć Cła na Kanadę"
 md2026_tariff_canada_desc:0 "Nałożyć 25% cła na import kanadyjski powołując się na bezpieczeństwo narodowe. Poważnie zakłóci to relacje handlowe USA-Kanada."
 md2026_tariff_mexico:0 "Nałożyć Cła na Meksyk"
 md2026_tariff_mexico_desc:0 "Nałożyć 25% cła na import meksykański, wywierając presję na Meksyk w kwestii bezpieczeństwa granicy i handlu narkotykami."
 md2026_demand_greenland:0 "Żądać Grenlandii od Danii"
 md2026_demand_greenland_desc:0 "Formalnie zażądać od Danii przekazania suwerenności nad Grenlandią. Grozić konsekwencjami ekonomicznymi w razie odmowy."
 md2026_pressure_panama:0 "Wywrzeć Presję na Panamę"
 md2026_pressure_panama_desc:0 "Zastosować presję dyplomatyczną i ekonomiczną na Panamę w celu zapewnienia amerykańskiego dostępu strategicznego do Kanału."
 md2026_deepen_doge:0 "Pogłębić Cięcia DOGE"
 md2026_deepen_doge_desc:0 "Rozszerzyć mandat Departamentu Efektywności Rządu w celu wdrożenia jeszcze głębszych cięć wydatków federalnych."
 md2026_dismantle_doge:0 "Zlikwidować DOGE"
 md2026_dismantle_doge_desc:0 "Rozwiązać Departament Efektywności Rządu i cofnąć jego najbardziej szkodliwe cięcia. Stabilność musi zostać przywrócona."

